<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 Grand Family Reunion</title>
    <style>
        /* 1. VIBRANT HD BACKGROUND SETUP */
        #marzon-bg {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            /* High-definition gradient to make the hotel photo pop */
            background: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2)), 
                        url('marzon-hotel.jpg') no-repeat center/cover !important;
            z-index: -1 !important;
            display: block !important;
        }

        /* 2. THE TRANSPARENCY FIX (CRITICAL) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent !important; /* Removed the black wall */
            overflow-x: hidden;
            color: white;
            text-align: center;
        }

        /* 3. FESTIVE ATI-ATIHAN ANIMATIONS */
        @keyframes pulse-breathe {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .festive-icon {
            width: 60px;
            height: auto;
            animation: pulse-breathe 3s infinite ease-in-out;
            margin: 10px;
        }

        /* 4. GRAND BUTTON STYLING */
        .btn-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .grand-btn {
            display: block;
            width: 280px;
            padding: 18px;
            text-decoration: none;
            color: #000;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
            border: 2px solid #fff;
        }

        .grand-btn:active {
            transform: scale(0.95);
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .grand-btn { width: 85%; }
        }
    </style>
</head>
<body>

    <div id="marzon-bg"></div>

    <div style="padding: 50px 20px;">
        <h1 style="text-transform: uppercase; letter-spacing: 5px; color: #FFD700; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">
            We Are Sazon
        </h1>
        
        <p style="font-size: 1.5rem; font-style: italic;">See you in Kalibo!</p>

        <div>
            <img src="drum-icon.png" class="festive-icon" alt="Ati-Atihan Drum">
            <img src="feather-icon.png" class="festive-icon" alt="Feathers">
        </div>

        <div class="btn-container">
            <a href="#" class="grand-btn">
                SAVE THE DATE <br> <span style="font-size: 0.8rem;">July 23-24, 2027</span>
            </a>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=dialog" 
               class="grand-btn" 
               style="background: #fff; color: #000;">
                REGISTER HERE
            </a>
        </div>
    </div>

</body>
</html>
