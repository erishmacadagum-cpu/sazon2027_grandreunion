<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 Grand Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght=0,700;1,700&display=swap" rel="stylesheet">
    <style>
        /* 1. Reset & Global Setup */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            overflow: hidden; /* We want the main card locked in the center */
        }

        /* 2. Background Layer - Aerial Sunset View */
        body {
            background-color: #333; /* Fallback */
            /* Crucial: You will need to upload an aerial image to your repo for this to work.
               For now, this code creates the exact layout. We will link the image in the next step. */
            background-image: url('YOUR_AERIAL_IMAGE_FILENAME_HERE.jpg');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes card center, footer bottom */
        }

        /* 3. Main Central Glass Container */
        .master-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1; /* Occupies central space */
            padding: 20px;
        }

        .frosted-glass-card {
            background: rgba(255, 255, 255, 0.2); /* Semi-transparent */
            backdrop-filter: blur(15px); /* The "Glass" effect */
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 4. Text Styling - Main Titles */
        .title-top {
            font-family: 'Montserrat', sans-serif; /* Placeholder for 'happy' puff font */
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.1;
            margin: 0;
            /* Placeholder wavy/puff styling: colorful wavy gradient */
            background: linear-gradient(90deg, #ff7e5f, #feb47b, #ff7e5f, #7f7fd5, #86a8e7, #91eae4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Animation to make the wave effect active */
            animation: waveFlow 4s linear infinite;
        }

        @keyframes waveFlow {
            0% { background-position: 200% center; }
            100% { background-position: 0% center; }
        }

        .leading-script {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            color: #4ac9c6; /* Electric Teal */
            font-size: 1.5rem;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .gold-block-text {
            color: #d4af37; /* Sunwashed Gold */
            font-weight: 900;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .gold-sub-block {
            color: #d4af37;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* 5. Icon Stack Styling */
        .icons-stack {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        /* Basic SVG placeholder support until custom icons are added */
        .svg-icon {
            width: 50px;
            height: 50px;
            fill: #d4af37; /* Gold */
        }

        /* 6. Countdown Section - Luggage Tags */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .luggage-tag {
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-width: 130px;
            position: relative; /* for tag details */
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Luggage Tag Details (loop hole) */
        .luggage-tag::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .tag-red {
            background-color: #ff6f61; /* Bright Coral/Red */
            color: white;
        }
        .tag-turquoise {
            background-color: #4ac9c6; /* Electric Teal */
            color: white;
        }
        .tag-gold {
            background-color: #d4af37; /* Sunwashed Gold */
            color: #333;
        }

        .count-number {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
        }

        .combined-fields {
            font-size: 2.5rem; /* Min/Sec smaller in same tag */
            font-weight: 700;
        }

        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* 7. Action Buttons Section */
        .buttons-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .cta-button {
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-save {
            border: 3px solid #d4af37; /* Gold Outline */
            color: #d4af37;
            background: transparent;
        }

        .btn-save:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        .btn-register {
            background-color: #d4af37; /* Solid Gold */
            color: #333;
            border: 3px solid #d4af37;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-register:hover {
            transform: scale(1.05);
            background-color: #e5c14d;
        }

        /* 8. Thematic Black Footer */
        .footer-bar {
            background-color: #000;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer-highlight {
            color: #d4af37; /* Gold highlighting */
        }
    </style>
</head>
<body>

    <div class="master-container">
        
        <div class="frosted-glass-card">
            
            <h1 class="title-top">MAGTIPON KITA!</h1>

            <div class=" leading-script">Coz we are</div>
            <h2 class="gold-block-text">SAZON!</h2>
            <div class="gold-sub-block">SEE YOU IN KALIBO!</div>

            <div class="icons-stack">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M11 11h-1l-.5-1.5L8 9v1l-1-1v1l-.5-.5L5 11h1l.5-1.5L8 13v-1l1 1v-1l.5.5L11 11zm11 11h-1l-.5-1.5L18 20v1l-1-1v1l-.5-.5L15 22h1l.5-1.5L18 24v-1l1 1v-1l.5.5L22 22z"/></svg>
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5z"/></svg>
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2v2m0 16v2M2 12h2m16 0h2m-4.41-5.59l1.41-1.41m-9.17 9.17l-1.41 1.41"/></svg>
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 3.34 5 5v14c0 1.66 3.13 3 7 3s7-1.34 7-3V5c0-1.66-3.13-3-7-3z"/></svg>
            </div>

            <div class="countdown-container">
                <div class="luggage-tag tag-red">
                    <p class="count-number">19</p>
                    <p class="label">DAYS</p>
                </div>
                <div class="luggage-tag tag-turquoise">
                    <p class="count-number">15</p>
                    <p class="label">HOURS</p>
                </div>
                <div class="luggage-tag tag-gold">
                    <p class="count-number combined-fields">36:23</p>
                    <p class="label">MIN / SEC</p>
                </div>
            </div>

            <div class="buttons-group">
                <a href="#" class="cta-button btn-save">Save The Date</a>
                <a href="#" class="cta-btn btn-register">Register Here</a>
            </div>

        </div>
    </div>

    <div class="footer-bar">
        Sazon Family Production | Marzon Hotel Kalibo | 
        <span class="footer-highlight">#Sazon2027GrandReunion</span> | 
        <span class="footer-highlight">Gikan sa Gamut, Tubtob sa Langit</span> | 
        To God Be All The Glory
    </div>

</body>
</html>
