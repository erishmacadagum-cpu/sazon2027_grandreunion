<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Exclusive Teaser</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* 1. Global Setup */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #030508;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            width: 100%;
        }

        /* 2. Audio Interactive Curtain */
        #curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .enter-btn {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s ease;
        }

        .enter-btn:hover {
            transform: scale(1.05);
        }

        /* 3. Opening Credit Text (Timeline 0:00 - 0:05) */
        #opening-credits {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
            opacity: 0;
            display: none;
            pointer-events: none;
            width: 90%;
            max-width: 800px;
        }

        .credit-line {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin: 15px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: block;
        }

        .credit-sazon {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            background: linear-gradient(135deg, #ffccd5, #fbc4b6, #e8b0b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credit-hotel {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-style: italic;
            text-transform: none;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9, #b2dfdb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credit-date {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 400;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #e1f5fe, #e8eaf6, #e1bee7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credit-present {
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin-top: 30px !important;
            background: linear-gradient(135deg, #fff9c4, #f0e693, #ffe082);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 4. Main Teaser Canvas Container */
        #main-content {
            opacity: 0;
            display: none;
            transition: opacity 1.5s ease;
            width: 100%;
        }

        /* 5. Full Edge-to-Edge Cover Banner (Gaps Completely Eliminated) */
        .hero-banner {
            width: 100vw;
            margin: 0;
            padding: 0;
            display: block;
            transition: opacity 1s ease, transform 1s ease;
        }

        .hero-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 6. Immersive Full-Screen Marzon Background Visual Wall */
        .marzon-showcase {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-image: url('images/marzon-hotel.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            box-sizing: border-box;
        }

        .marzon-showcase::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; 
            z-index: 1;
        }

        /* 7. Scream-O-Graphics Component Groups */
        .scream-group {
            position: relative;
            z-index: 2;
            text-align: center;
            margin: 40px 0;
            width: 100%;
        }

        .scream-group h2 {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
        }

        /* 8. The Climax Grand Finale Drop (Timeline 0:25) */
        .climax-section {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 40px;
            display: none; 
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .cta-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-register {
            background: #D4AF37;
            color: #030508;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* 9. Premium Production Footer Styling */
        .sazon-teaser-footer {
            width: 100%;
            background: rgba(3, 5, 8, 0.85);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding: 25px 10px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .footer-content {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 600;
            letter-spacing: 2px;
            color: #e0e0e0;
            line-height: 1.8;
        }

        .footer-highlight {
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
        }

        /* Scream-O-Graphics Engines */
        .scream-beat { animation: heartBeat 0.6s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1); display: inline-block; }
        @keyframes heartBeat { 0% { transform: scale(0.95); } 100% { transform: scale(1.15); } }

        .scream-bounce { animation: rapidBounce 0.4s infinite ease-in-out alternate; display: inline-block; }
        @keyframes rapidBounce { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }

        .scream-vibrate { animation: heavyVibrate 0.15s infinite linear; display: inline-block; }
        @keyframes heavyVibrate {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .scream-burst { animation: dynamicBurst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes dynamicBurst { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="sfx-opening" src="audio/credits_sfx.mp3" preload="auto"></audio>
    <audio id="family-jingle" src="audio/teaser-jingle.mp3" preload="auto"></audio>

    <div id="curtain">
        <button class="enter-btn" onclick="startTeaserCommercial()">Experience The Reveal</button>
    </div>

    <div id="opening-credits">
        <span class="credit-line credit-sazon">A Sazon Family Production</span>
        <span class="credit-line credit-hotel">at Marzon Hotel Kalibo</span>
        <span class="credit-line credit-date">July 23-24, 2027</span>
        <span class="credit-line credit-present">PRESENT</span>
    </div>

    <div id="main-content">
        
        <div id="disappearing-cover" class="hero-banner">
            <img src="images/teaser-cover.jpg" alt="Sazon 2027 Grand Reunion Banner">
        </div>

        <div class="marzon-showcase">
            
            <div class="scream-group">
                <h2 class="scream-vibrate" style="color: #ffffff; text-shadow: 0 4px 20px rgba(0,0,0,0.95);">The Grand Reunion</h2>
            </div>

            <div class="scream-group">
                <h2 class="scream-bounce" style="color: #fcf6ba; text-shadow: 0 4px 20px rgba(0,0,0,0.95);">Kalibo, Aklan</h2>
            </div>

            <div id="climax-reveal" class="climax-section scream-burst">
                <h2 class="scream-beat" style="color: #D4AF37; text-shadow: 0 4px 20px rgba(0,0,0,0.95);">ARE YOU READY?</h2>
                
                <div class="button-group">
                    <a href="#" class="cta-btn btn-save">Save The Date</a>
                    <a href="#" class="cta-btn btn-register">Register Here</a>
                </div>
            </div>

        </div>

        <footer class="sazon-teaser-footer">
            <div class="footer-content">
                Sazon Family Production &nbsp;|&nbsp; Marzon Hotel Kalibo &nbsp;|&nbsp; 
                <span class="footer-highlight">#Sazon2027GrandReunion</span> &nbsp;|&nbsp; 
                <span class="footer-highlight">Gikan sa Gamut, Tubtob sa Langit</span> &nbsp;|&nbsp; 
                To God Be All The Glory
            </div>
        </footer>
    </div>

    <script>
        function startTeaserCommercial() {
            const curtain = document.getElementById('curtain');
            const credits = document.getElementById('opening-credits');
            const mainContent = document.getElementById('main-content');
            const cover = document.getElementById('disappearing-cover');
            const climax = document.getElementById('climax-reveal');
            
            const sfx = document.getElementById('sfx-opening');
            const jingle = document.getElementById('family-jingle');

            // 0:00 - Close Curtain & Fire Sweeping SFX
            if (curtain) {
                curtain.style.opacity = '0';
                setTimeout(() => curtain.style.display = 'none', 1000);
            }
            if (sfx) sfx.play().catch(e => console.log(e));
            if (credits) {
                credits.style.display = 'block';
                setTimeout(() => credits.style.opacity = '1', 200);
            }

            // 0:05 - The Main Reveal (Credits disappear, Cover shows, Music kicks in)
            setTimeout(() => {
                if (credits) {
                    credits.style.opacity = '0';
                    setTimeout(() => credits.style.display = 'none', 1000);
                }
                if (jingle) jingle.play().catch(e => console.log(e));
                if (mainContent) {
                    mainContent.style.display = 'block';
                    setTimeout(() => mainContent.style.opacity = '1', 100);
                }
            }, 5000);

            // 0:12 - Cover Banner Disappears cleanly to expose full-screen background
            setTimeout(() => {
                if (cover) {
                    cover.style.opacity = '0';
                    setTimeout(() => cover.style.display = 'none', 1000);
                }
            }, 12000);

            // 0:25 - The Climax Drop (Reveal Registration Action)
            setTimeout(() => {
                if (climax) {
                    climax.style.display = 'block';
                    climax.scrollIntoView({ behavior: 'smooth' });
                }
            }, 25000);
        }
    </script>

</body>
</html>
