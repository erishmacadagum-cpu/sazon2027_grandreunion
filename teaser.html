<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Exclusive Teaser</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* 1. Global Setup */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #030508;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 2. Audio Interactive Curtain */
        #curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .enter-btn {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s ease;
        }

        .enter-btn:hover {
            transform: scale(1.05);
        }

        /* 3. Opening Credit Text (Timeline 0:00 - 0:05) */
        #opening-credits {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
            opacity: 0;
            display: none;
            pointer-events: none;
        }

        .credit-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-style: italic;
            letter-spacing: 3px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 4. Main Teaser Container */
        #main-content {
            opacity: 0;
            display: none;
            transition: opacity 1.5s ease;
        }

        /* 5. Pure Hero Banner Cover (No overlapping elements) */
        .hero-banner {
            width: 100%;
            display: block;
        }

        .hero-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 6. Marzon Hotel Visual Wall */
        .marzon-showcase {
            position: relative;
            width: 100%;
            min-height: 80vh;
            background-image: url('marzon-hotel.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Parallax Effect */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        /* CORRECTED: Changed overlay from #000 (dark black) to transparent */
        .marzon-showcase::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; 
            z-index: 1;
        }

        /* 7. Scream-O-Graphics Groups over Background */
        .scream-group {
            position: relative;
            z-index: 2;
            text-align: center;
            margin: 30px 0;
            width: 100%;
        }

        .scream-group h2 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
        }

        /* 8. The Climax Section (Timeline 0:25 - 0:30) */
        .climax-section {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 60px;
            display: none; 
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .cta-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
        }

        .btn-register {
            background: #D4AF37;
            color: #030508;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Scream-O-Graphics Keyframes */
        .scream-beat {
            animation: heartBeat 0.6s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
            display: inline-block;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        @keyframes heartBeat {
            0% { transform: scale(0.95); filter: brightness(0.9); }
            100% { transform: scale(1.15); filter: brightness(1.3); }
        }

        .scream-bounce {
            animation: rapidBounce 0.4s infinite ease-in-out alternate;
            display: inline-block;
        }

        @keyframes rapidBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }

        .scream-vibrate {
            animation: heavyVibrate 0.15s infinite linear;
            display: inline-block;
        }

        @keyframes heavyVibrate {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .scream-burst {
            animation: dynamicBurst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes dynamicBurst {
            0% { opacity: 0; transform: scale(0.4); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="sfx-opening" src="intro-sfx.mp3" preload="auto"></audio>
    <audio id="family-jingle" src="sazon-jingle.mp3" preload="auto"></audio>

    <div id="curtain">
        <button class="enter-btn" onclick="startTeaserCommercial()">Experience The Reveal</button>
    </div>

    <div id="opening-credits">
        <p class="credit-text">A Gathering of Generations...</p>
    </div>

    <div id="main-content">
        
        <div class="hero-banner">
            <img src="teaser-cover.jpg" alt="Sazon 2027 Grand Reunion Banner">
        </div>

        <div class="marzon-showcase">
            
            <div class="scream-group">
                <h2 class="scream-vibrate" style="color: #ffffff;">The Grand Reunion</h2>
            </div>

            <div class="scream-group">
                <h2 class="scream-bounce" style="color: #fcf6ba;">Kalibo, Aklan</h2>
            </div>

            <div id="climax-reveal" class="climax-section scream-burst">
                <h2 class="scream-beat" style="color: #D4AF37;">ARE YOU READY?</h2>
                
                <div class="button-group">
                    <a href="#" class="cta-btn btn-save">Save The Date</a>
                    <a href="#" class="cta-btn btn-register">Register Here</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function startTeaserCommercial() {
            const curtain = document.getElementById('curtain');
            const credits = document.getElementById('opening-credits');
            const mainContent = document.getElementById('main-content');
            const climax = document.getElementById('climax-reveal');
            
            const sfx = document.getElementById('sfx-opening');
            const jingle = document.getElementById('family-jingle');

            // 0:00 - Close Curtain & Fire Suspense SFX
            curtain.style.opacity = '0';
            setTimeout(() => curtain.style.display = 'none', 1000);
            
            sfx.play().catch(e => console.log("Audio play blocked"));
            
            // Fade In Opening Credits
            credits.style.display = 'block';
            setTimeout(() => credits.style.opacity = '1', 500);

            // 0:05 - The Main Reveal (Drop Credits, Start Jingle, Show Canvas)
            setTimeout(() => {
                credits.style.opacity = '0';
                setTimeout(() => credits.style.display = 'none', 1000);
                
                // Fire Main 30s Jingle
                jingle.play().catch(e => console.log("Jingle play blocked"));
                
                // Reveal Banner and Hotel Background
                mainContent.style.display = 'block';
                setTimeout(() => mainContent.style.opacity = '1', 100);
            }, 5000);

            // 0:25 - The Climax Drop (Reveal Grand Finale Actions & Pulsating Text)
            setTimeout(() => {
                climax.style.display = 'block';
                climax.scrollIntoView({ behavior: 'smooth' });
            }, 25000);
        }
    </script>

</body>
</html>
