<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        /* Essential Reset for Mobile Consistency */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. RESPONSIVE CINEMATIC BANNER --- */
        .banner {
            position: relative;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Modern mobile-friendly dynamic viewport height */
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 5px solid var(--accent);
        }

        /* Parallax Background Optimized for Performance */
        .banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110%; 
            background: 
                radial-gradient(circle, rgba(26, 44, 163, 0.1) 0%, rgba(10, 10, 10, 0.6) 100%),
                url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
            will-change: transform;
        }

        /* Framing Vignette */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- 2. REALISTIC MOON (OPTIMIZED FOR MOBILE) --- */
        .moon-container {
            position: absolute;
            top: 5vh;
            left: 5vw;
            width: clamp(100px, 20vw, 180px); /* Responsive sizing */
            aspect-ratio: 1/1;
            z-index: 10;
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset {
            width: 100%;
            height: auto;
            border-radius: 50%;
        }

        /* --- 3. DYNAMIC FIREWORKS DISPLAY --- */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 20px;
            border-radius: 4px;
            opacity: 0;
            animation: sparkBurst 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0) scale(0); opacity: 1; }
            40% { opacity: 1; height: 30px; }
            100% { transform: rotate(var(--rot)) translateY(min(300px, 40vh)) scale(0.5); opacity: 0; }
        }

        /* --- 4. SCALABLE TIMER (IPHONE/ANDROID SAFE) --- */
        .timer-container {
            margin-bottom: clamp(30px, 8vh, 60px);
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* iOS Support */
            padding: 15px clamp(20px, 5vw, 40px);
            border-radius: 12px;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid rgba(255, 183, 3, 0.3);
            width: fit-content;
        }

        .time-box {
            text-align: center;
            min-width: clamp(60px, 15vw, 85px);
        }

        .time-box span { 
            display: block; 
            font-size: clamp(1.4rem, 4vw, 2.2rem); 
            color: var(--accent); 
            font-weight: bold; 
            font-family: 'Cinzel', serif;
        }

        .time-box label { 
            font-size: clamp(0.55rem, 1.5vw, 0.7rem); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--surface); 
            opacity: 0.7; 
        }

        @keyframes moonFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* iOS/Safari specific fixes */
        @supports (-webkit-touch-callout: none) {
            .banner-bg { background-attachment: scroll; } /* Fixed bg can lag on older iPhones */
        }
    </style>
</head>
<body>

    <header class="banner">
        <div class="banner-bg" id="parallax-bg"></div>
        <div class="vignette"></div>

        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>

        <div class="fireworks-stage" id="fireworks"></div>

        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        // Efficient Parallax for Mobile
        let lastKnownScrollPosition = 0;
        let ticking = false;

        function doParallax(scrollPos) {
            const bg = document.getElementById('parallax-bg');
            if (window.innerWidth > 768) {
                bg.style.transform = `translateY(${scrollPos * 0.3}px)`;
            }
        }

        window.addEventListener('scroll', function() {
            lastKnownScrollPosition = window.scrollY;
            if (!ticking) {
                window.requestAnimationFrame(function() {
                    doParallax(lastKnownScrollPosition);
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Mobile-Balanced Fireworks Burst
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';

            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.boxShadow = `0 0 8px ${color}`;
                spark.style.setProperty('--rot', (i * (360/count)) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.8) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        // Optimized count for mobile performance
        createBurst(15, 10, '#FFD700', 18, 0);   
        createBurst(25, 25, '#FF4500', 15, 1.2); 
        createBurst(40, 15, '#FFFFFF', 12, 2.5); 

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            if (gap < 0) return;
            document.getElementById("days").innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById("mins").innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById("secs").innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }
        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
