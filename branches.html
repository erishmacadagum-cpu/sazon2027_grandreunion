<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 13 Branches | Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
        }
        body { margin: 0; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; }
        
        header { text-align: center; padding: 60px 20px; }
        h1 { font-family: 'Prata', serif; font-size: 2.8rem; color: var(--gold); margin: 0; }
        p.tagline { letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem; margin-top: 10px; color: white; opacity: 0.8; }

        .branch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* THE GLOWING BUTTONS YOU LOVE */
        .branch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
            text-decoration: none;
            color: white;
            font-family: 'Prata', serif;
            font-size: 1.5rem;
            border-radius: 15px;
            position: relative;
            background: var(--navy);
            border: 2px solid transparent;
            /* Multi-color Animated Border */
            background-image: linear-gradient(var(--navy), var(--navy)), 
                              linear-gradient(90deg, #ff00ea, #00e5ff, #7000ff, #ffcc00);
            background-origin: border-box;
            background-clip: content-box, border-box;
            animation: moveGlow 4s linear infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        @keyframes moveGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .branch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        footer { text-align: center; padding: 50px; font-size: 0.8rem; letter-spacing: 2px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>The 13 Branches</h1>
    <p class="tagline">Gikan sa Gamut, Tubtob sa Langit</p>
</header>

<div class="branch-grid">

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform" class="branch-btn">Estrella</a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform" class="branch-btn">Regino</a>
