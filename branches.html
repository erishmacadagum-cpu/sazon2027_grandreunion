<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Grand Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
   <style>
        :root {
            --bg-deep: #050812;
            --bg-accent: #0A1128;
            --accent-vibrant: #FF7F50;
            --gold-leaf: #FFD700;
            --silver-mist: #F0F0F0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html { margin: 0; padding: 0; background: var(--bg-deep); color: var(--silver-mist); font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        .branded-moon { 
            position: absolute !important;
            top: 20px !important;
            left: 20px !important;
            width: 170px !important;
            height: 170px !important;
            z-index: 100 !important;
            border-radius: 50% !important;
            overflow: hidden !important;
            border: none !important;
            box-shadow: 0 0 40px var(--gold-leaf) !important;
        }
        .branded-moon img { width: 100%; height: 100%; object-fit: cover; }

        .banner { position: relative; height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; opacity: 0; animation: revealBanner 2s ease forwards; animation-delay: 1s; }
        @keyframes revealBanner { to { opacity: 1; } }

        .banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.6);
            transform: scale(1.1);
            transition: transform 6s ease;
            box-shadow: inset 0 0 100px 50px rgba(0,0,0,0.8);
        }

        .timer-container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 20px; text-transform: uppercase; letter-spacing: 4px; }
        
        .legacy-title { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold-leaf); text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); margin: 0; }
        .location-sub { font-size: 1rem; color: var(--silver-mist); opacity: 0.8; margin-top: -15px; }

        .countdown { display: flex; gap: 25px; font-family: 'Cinzel', serif; }
        .time-box { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--gold-leaf); 
            backdrop-filter: blur(10px); 
            padding: 20px; 
            border-radius: 50%; 
            width: 130px;
            height: 130px;
          
       }
        .time-val { display: block; font-size: 2.2rem; color: var(--gold-leaf); font-weight: 300; }
        }
        .time-val { display: block; font-size: 2.2rem; color: var(--gold-leaf); font-weight: 300; }
        .time-label { display: block; font-size: 0.7rem; color: var(--silver-mist); letter-spacing: 2px; }
        footer { background: #02040a; padding: 60px 20px; border-top: 1px solid rgba(255,215,0,0.2); text-align: center; }
        .footer-credits { font-size: 0.8rem; letter-spacing: 2px; color: var(--silver-mist); opacity: 0.6; }
        h2 { font-family: 'Cinzel', serif; color: var(--gold-leaf); }
    </style>
</head>
<body>

    <div id="intro-curtain" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-deep); z-index:1000; display:flex; justify-content:center; align-items:center;">
        <h1 id="motto-text" style="font-family:'Cinzel', serif; color:var(--gold-leaf); text-align:center; opacity:0; letter-spacing:6px;">GIKAN SA GAMUT,<br>TUBTOB SA LANGIT</h1>
        <script>
            // Fade-in the motto, then reveal the banner
            window.onload = () => {
                const motto = document.getElementById('motto-text');
                motto.style.transition = 'opacity 3s ease, transform 3s ease';
                motto.style.opacity = '1';
                motto.style.transform = 'scale(1.1)';
                
                setTimeout(() => {
                    document.getElementById('intro-curtain').style.display = 'none';
                    document.getElementById('snd-anthem').play(); // Try to play audio after interaction if allowed
                }, 4000);
            }
        </script>
    </div>

    <audio id="snd-anthem" src="audio/anthem.mp3" loop></audio>
    <audio id="fw-launch" src="audio/launch.mp3"></audio>
    <audio id="fw-burst" src="audio/burst.mp3"></audio>

    <section class="banner">
       <div class="banner-bg"></div>
        <div class="branded-moon">
            <img src="images/moon.png" alt="Sazon Logo">
        </div>
        <div class="timer-container">
            
            
           
                <div class="time-box"><span class="time-val" id="hours">00</span><span class="time-label">Hrs</span></div>
               <div class="countdown" id="countdown" style="justify-content: center;">
                <div class="time-box"><span class="time-val" id="secs">00</span><span class="time-label">Secs</span></div>
            </div>
        </div>
    </section>

    <section style="height:100vh; padding: 100px 20px; text-align: center;">
        <h2>The 13 Branches</h2>
        <p>Gikan sa Gamut, Tubtob sa Langit</p>
        </section>

    <footer>
        <p class="footer-credits">© 2027 Sazon Grand Reunion | Kalibo, Aklan</p>
    </footer>

    <script>
        // --- COUNTDOWN LOGIC ---
        // Set the reunion date: July 23, 2027    
        const reunionDate = new Date("July 23, 2027 08:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = reunionDate - now;

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Update DOM with leading zeros
            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("mins").innerText = String(minutes).padStart(2, '0');
            document.getElementById("secs").innerText = String(seconds).padStart(2, '0');

            // Optional: Action when countdown finishes
            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").innerHTML = "<h2>The Legacy Has Begun</h2>";
            }
        };

        // Update every second
        updateCountdown(); // Call once immediately
        const countdownInterval = setInterval(updateCountdown, 1000);

    </script>
</body>
</html>
