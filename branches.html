<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 13 Branches | Sazon Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
        }
        
        body { 
            margin: 0; 
            background: var(--navy); 
            color: white; 
            font-family: 'Montserrat', sans-serif;
        }

        header { 
            text-align: center; 
            padding: 80px 20px 40px; 
        }

        h1 { 
            font-family: 'Prata', serif; 
            font-size: clamp(2.2rem, 8vw, 3.5rem); 
            color: var(--gold); 
            margin: 0;
            letter-spacing: 2px;
        }

        .tagline { 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            margin-top: 15px; 
            color: rgba(255,255,255,0.8); 
        }

        .branch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* THE ORIGINAL GLOWING BUTTONS */
        .branch-link {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 85px;
            text-decoration: none;
            color: white;
            font-family: 'Prata', serif;
            font-size: 1.6rem;
            border-radius: 15px;
            position: relative;
            background: var(--navy);
            z-index: 1;
            border: 2px solid transparent;
            /* Animated Rainbow Border */
            background-image: linear-gradient(var(--navy), var(--navy)), 
                              linear-gradient(90deg, #ff00ea, #00e5ff, #7000ff, #ffcc00, #ff00ea);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 200% 100%;
            animation: rainbowFlow 4s linear infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .branch-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        footer { 
            text-align: center; 
            padding: 60px 20px; 
            font-size: 0.75rem; 
            letter-spacing: 4px; 
            color: var(--gold);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>

    <p class="tagline">Gikan sa Gamut, Tubtob sa Langit</p>
</header>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform" class="branch-link">Gregorio</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform" class="branch-link">Regino</a>
