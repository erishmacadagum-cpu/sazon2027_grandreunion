<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--primary);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; }

        /* --- 1. BRIGHTER CINEMATIC BANNER --- */
        .banner {
            position: relative;
            height: 100vh;
            /* Brighter linear gradient for clear visuals */
            background: 
                linear-gradient(rgba(26, 44, 163, 0.2), rgba(10, 10, 10, 0.6)), 
                url('images/cover.jpeg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Lowers the timer content */
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--accent);
            overflow: hidden;
            padding-bottom: 50px; /* Space for the lowered timer */
        }

        /* --- 2. REALISTIC MOON (NO BLACK RIM) --- */
        .moon-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 180px;
            height: 180px;
            z-index: 10;
            /* Using drop-shadow instead of a border/rim for realism */
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset {
            width: 100%;
            height: auto;
            border-radius: 50%;
            /* Ensures no black edges from the original image file are visible */
            mix-blend-mode: screen; 
        }

        /* --- 3. FLOURISHING TEXT (ROOTS TO BRANCHES) --- */
        .tree-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .motto {
            display: block;
            opacity: 0;
            animation: flourishUp 2.5s ease-out forwards;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }

        .motto.gamut {
            font-size: 1.8rem;
            color: var(--highlight);
            margin-top: 200px; /* Aligns with roots */
            animation-delay: 0.5s;
        }

        .motto.langit {
            font-size: 2.5rem;
            color: var(--accent);
            margin-top: -350px; /* Aligns with branches */
            animation-delay: 1.5s;
        }

        @keyframes flourishUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* --- 4. LOWERED TIMER --- */
        .timer-container {
            display: flex;
            gap: 15px;
            z-index: 20;
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .time-box {
            border: 1px solid rgba(255, 183, 3, 0.5);
            padding: 10px;
            min-width: 70px;
        }

        .time-box span { display: block; font-size: 1.8rem; color: var(--accent); font-weight: bold; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Top Right: Fireworks Peg */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 50%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 15px;
            border-radius: 2px;
            opacity: 0;
            animation: sparkBurst 3.5s infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0); opacity: 1; }
            100% { transform: rotate(var(--rot)) translateY(150px); opacity: 0; }
        }

        @keyframes moonFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <header class="banner">
        <!-- Realistic Moon -->
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>

        <!-- Burst Fireworks -->
        <div class="fireworks-stage" id="fireworks"></div>

        <!-- Flourishing Motto along the Tree -->
        <div class="tree-text-container">
            <span class="cinzel motto gamut">Gikan sa Gamut,</span>
            <span class="cinzel motto langit">Tubtob sa Langit</span>
        </div>

        <!-- Lowered Timer Highlight -->
        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';

            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.setProperty('--rot', (i * (360/count)) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.5) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        createBurst(20, 15, '#FFB703', 15, 0); 
        createBurst(30, 25, '#FB8500', 12, 1); 

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
