<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--primary);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; }

        .banner {
            position: relative;
            height: 90vh;
            background: 
                linear-gradient(rgba(26, 44, 163, 0.45), rgba(10, 10, 10, 0.9)), 
                url('images/cover.jpeg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--accent);
            overflow: hidden;
        }

        /* Top Left: 3D Celestial Moon with Logo */
        .moon-container {
            position: absolute;
            top: 30px;
            left: 40px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #a5ccff 20%, #4a90e2 60%, #102a4d 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset -10px -10px 30px rgba(0,0,0,0.8),
                inset 10px 10px 30px rgba(255,255,255,0.4),
                0 0 50px rgba(165, 204, 255, 0.5);
            animation: moonBreathing 8s ease-in-out infinite;
            z-index: 15;
        }

        .logo-inside-moon {
            width: 85px;
            filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.5));
            opacity: 0.8;
        }

        /* Top Right: Advanced Burst Fireworks */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 50%;
            pointer-events: none;
        }

        .firework-burst {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* Creating the "Sparks" effect */
        .spark {
            position: absolute;
            width: 2px;
            height: 15px;
            border-radius: 2px;
            opacity: 0;
            animation: sparkBurst 2.5s infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0); opacity: 1; height: 5px; }
            50% { opacity: 1; height: 20px; }
            100% { transform: rotate(var(--rot)) translateY(120px); opacity: 0; height: 2px; }
        }

        @keyframes moonBreathing {
            0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 0 40px rgba(165, 204, 255, 0.4); }
            50% { transform: scale(1.05) translateY(-10px); box-shadow: 0 0 70px rgba(165, 204, 255, 0.7); }
        }

        .banner-content { z-index: 20; }
        
        .timer-container {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-box {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--accent);
            padding: 15px;
            min-width: 80px;
            border-radius: 2px;
            backdrop-filter: blur(8px);
        }

        .time-box span { display: block; font-size: 2rem; color: var(--accent); font-weight: bold; }

        .roots-section { padding: 80px 20px; text-align: center; background: var(--black); border-bottom: 2px solid var(--highlight); }

        footer { padding: 40px; text-align: center; background: var(--black); }
    </style>
</head>
<body onclick="playJingleOnce()">

    <audio id="openSound" src="open.mp3"></audio>
    <audio id="jingle" src="sazon-full-anthem.mp3"></audio>

    <header class="banner">
        <!-- Top Left: 3D Moon -->
        <div class="moon-container">
            <img src="images/logo.png" alt="Sazon Logo" class="logo-inside-moon">
        </div>

        <!-- Top Right: Burst Fireworks -->
        <div class="fireworks-stage" id="fireworks"></div>

        <div class="banner-content">
            <h1 class="cinzel" style="color: var(--accent); font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 15px #000;">Sazon 2027</h1>
            <p class="cinzel" style="letter-spacing: 12px; color: var(--surface);">1st GRAND FAMILY REUNION</p>

            <div class="timer-container" id="countdown">
                <div class="time-box"><span id="days">00</span><label>Days</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
                <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
            </div>
        </div>
    </header>

    <section class="roots-section">
        <h2 class="cinzel" style="color: var(--accent); font-size: 2.5rem; margin:0;">Gikan sa Gamut, Tubtob sa Langit</h2>
        <p style="color: var(--highlight); font-style: italic;">From the Roots, Toward the Sky</p>
    </section>

    <footer>
        <p class="cinzel" style="color: var(--accent); margin:0;">Sazon Clan • Marzon Hotel, Kalibo, Aklan</p>
        <p style="font-size: 0.8rem; opacity: 0.7;">July 23-24, 2027</p>
    </footer>

    <script>
        // Generate Dynamic Spark Bursts for the Top Right
        function createFirework(top, right, color) {
            const container = document.getElementById('fireworks');
            const burst = document.createElement('div');
            burst.className = 'firework-burst';
            burst.style.top = top + '%';
            burst.style.right = right + '%';
            
            for(let i=0; i<12; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.setProperty('--rot', (i * 30) + 'deg');
                spark.style.animationDelay = (Math.random() * 2) + 's';
                burst.appendChild(spark);
            }
            container.appendChild(burst);
        }

        // Initialize multiple bursts like in your image
        createFirework(20, 15, '#FFB703'); // Gold
        createFirework(35, 25, '#FB8500'); // Orange
        createFirework(15, 35, '#4CAF50'); // Green
        createFirework(40, 10, '#ffffff'); // White

        window.onload = function() {
            document.getElementById('openSound').play().catch(e => {});
        };

        let anthemPlayed = false;
        function playJingleOnce() {
            if (!anthemPlayed) {
                document.getElementById('jingle').play();
                anthemPlayed = true;
            }
        }

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
