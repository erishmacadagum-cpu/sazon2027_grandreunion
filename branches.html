<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        /* Prevent unwanted mobile horizontal scrolling */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- 1. BRIGHTER PARALLAX BANNER --- */
        .banner {
            position: relative;
            height: 100dvh; /* Dynamic Viewport for mobile browsers */
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            border-bottom: 5px solid var(--accent);
        }

        .banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110%;
            /* Lightened for clarity of the tree and people */
            background: 
                linear-gradient(rgba(26, 44, 163, 0.1), rgba(10, 10, 10, 0.4)),
                url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
            will-change: transform;
        }

        /* --- 2. REALISTIC MOON (NO BLACK RIM) --- */
        .moon-container {
            position: absolute;
            top: 4vh;
            left: 4vw;
            width: clamp(100px, 18vw, 180px);
            aspect-ratio: 1/1;
            z-index: 10;
            mix-blend-mode: screen; /* Strips black rim from png */
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset { width: 100%; height: auto; border-radius: 50%; }

        /* --- 3. MOBILE-OPTIMIZED FIREWORKS --- */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 15px;
            border-radius: 2px;
            opacity: 0;
            animation: sparkBurst 4s infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0) scale(0); opacity: 1; }
            100% { transform: rotate(var(--rot)) translateY(min(300px, 35vh)) scale(0.5); opacity: 0; }
        }

        /* --- 4. ANCHORED TIMER (BOTTOM HIGHLIGHT) --- */
        .timer-container {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            z-index: 20;
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid rgba(255, 183, 3, 0.3);
            border-radius: 10px;
        }

        .time-box { text-align: center; min-width: 65px; }
        .time-box span { display: block; font-size: 1.6rem; color: var(--accent); font-weight: bold; font-family: 'Cinzel', serif; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        @keyframes moonFloat { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .timer-container { gap: 5px; padding: 10px; margin-bottom: 25px; }
            .time-box { min-width: 55px; }
            .time-box span { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <header class="banner">
        <div class="banner-bg" id="parallax-bg"></div>
        
        <div class="moon-container">
            <img src="images/moon.png" alt="Sazon Moon" class="moon-asset">
        </div>

        <div class="fireworks-stage" id="fireworks"></div>

        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        // High-Vibrance Firework Bursts
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';

            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.boxShadow = `0 0 8px ${color}`;
                spark.style.setProperty('--rot', (i * (360/count)) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.8) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        createBurst(20, 15, '#FFD700', 20, 0);   
        createBurst(35, 30, '#FB8500', 16, 1.2); 
        createBurst(10, 25, '#FFFFFF', 12, 0.5); 

        // Parallax Logic
        window.addEventListener('scroll', () => {
            const offset = window.pageYOffset;
            document.getElementById('parallax-bg').style.transform = `translateY(${offset * 0.3}px)`;
        });

        // Countdown Logic for July 23, 2027
        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }, 1000);
    </script>
</body>
</html>
