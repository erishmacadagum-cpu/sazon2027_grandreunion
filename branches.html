<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3; /* Indigo Night */
            --accent: #FFB703;  /* Festival Gold */
            --highlight: #FB8500; /* Vivid Orange */
            --surface: #F5F5F5;   /* Soft White */
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--primary);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; }

        /* The "Stunning" Hala Bira Banner */
        .banner {
            position: relative;
            height: 90vh; /* Professional height for public debut */
            background: 
                linear-gradient(rgba(26, 44, 163, 0.45), rgba(10, 10, 10, 0.95)), 
                url('images/cover.jpeg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--accent);
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.6);
            /* Atmosphere Breathing animation */
            animation: atmosphericGlow 12s ease-in-out infinite alternate;
        }

        @keyframes atmosphericGlow {
            0% { filter: saturate(100%) brightness(100%); }
            100% { filter: saturate(125%) brightness(110%); }
        }

        /* Top Left: 3D Celestial Moon with Logo */
        .moon-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 170px;
            height: 170px;
            /* Creating the 'Volumetric' spherical effect */
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #a5ccff 20%, #4a90e2 60%, #102a4d 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset -12px -12px 40px rgba(0,0,0,0.8),
                inset 10px 10px 40px rgba(255,255,255,0.4),
                0 0 60px rgba(165, 204, 255, 0.6);
            animation: moonFloat 8s ease-in-out infinite alternate;
            z-index: 10;
        }

        .logo-inside-moon {
            width: 95px;
            z-index: 2;
            filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.6)) contrast(1.1);
            opacity: 0.85;
        }

        /* Top Right: High-Fidelity Burst Fireworks "The Peg" */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 60%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 20px;
            border-radius: 3px;
            opacity: 0;
            animation: sparkBurst 3.5s infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0); opacity: 1; height: 5px; }
            50% { opacity: 1; height: 30px; }
            100% { transform: rotate(var(--rot)) translateY(200px); opacity: 0; height: 3px; }
        }

        /* Text & UI elements for Clarity */
        .banner-content { z-index: 20; }
        
        .timer-container {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-box {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid var(--accent);
            padding: 15px;
            min-width: 85px;
            border-radius: 4px;
            backdrop-filter: blur(8px);
        }

        .time-box span { display: block; font-size: 2.2rem; color: var(--accent); font-weight: bold; }
        .time-box label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        /* The Tribute Section */
        .roots-section {
            padding: 100px 20px;
            text-align: center;
            background-color: var(--black);
            border-bottom: 3px solid var(--highlight);
        }

        .roots-title { color: var(--accent); font-size: 3rem; margin-bottom: 10px; }
        .roots-subtitle { font-size: 1.5rem; letter-spacing: 6px; color: var(--highlight); margin-bottom: 15px; }

        /* General Utility Styles */
        .cinzel { font-family: 'Cinzel', serif; }
        @keyframes moonFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        footer { 
            padding: 80px 40px; 
            text-align: center; 
            background: var(--black);
            border-top: 4px solid var(--highlight);
        }
    </style>
</head>
<body onclick="playJingleOnce()">

    <audio id="openSound" src="open.mp3"></audio>
    <audio id="jingle" src="sazon-full-anthem.mp3"></audio>

    <header class="banner">
        <!-- Top Left: 3D Volumetric Moon -->
        <div class="moon-container">
            <img src="images/logo.png" alt="Sazon Logo" class="logo-inside-moon">
        </div>

        <!-- Top Right: Advanced Burst Fireworks -->
        <div class="fireworks-stage" id="fireworks"></div>

        <div class="banner-content">
            <h1 class="cinzel" style="color: var(--accent); font-size: 3.8rem; margin: 0; text-shadow: 3px 3px 20px #000; letter-spacing: 2px;">Sazon 2027</h1>
            <p class="cinzel" style="letter-spacing: 12px; color: var(--surface); font-weight: 300;">1st GRAND FAMILY REUNION</p>

            <div class="timer-container" id="countdown">
                <div class="time-box"><span id="days">00</span><label>Days</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
                <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
            </div>
        </div>
    </header>

    <section class="roots-section">
        <h2 class="cinzel roots-title">Gikan sa Gamut, Tubtob sa Langit</h2>
        <p class="roots-subtitle">From the Roots, Toward the Sky</p>
        <p class="cinzel" style="color: var(--accent); letter-spacing: 4px;">13 Branches • One Eternal Legacy</p>
    </section>

    <footer>
        <p class="cinzel" style="color: var(--accent); font-size: 1.5rem;">Sazon Family Grand Reunion &copy; 2027</p>
        <p style="letter-spacing: 4px; font-weight: 300;">Marzon Hotel, Kalibo, Aklan | July 23-24, 2027</p>
    </footer>

    <script>
        // High-Fidelity Burst Generation (The specific 'peg' in motion)
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';
            burstOrigin.style.width = '1px';
            burstOrigin.style.height = '1px';

            const angleStep = 360 / count;
            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.setProperty('--rot', (i * angleStep) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.5) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        // Initialize multiple bursts in different 'Hala Bira' festive colors
        createBurst(20, 15, '#FFB703', 20, 0); // Festival Gold
        createBurst(35, 30, '#FB8500', 16, 1.5); // Vivid Orange
        createBurst(15, 35, '#4CAF50', 18, 0.8); // Green
        createBurst(45, 10, '#ffffff', 14, 2.1); // White

        // Audio and UI Logic
        window.onload = function() {
            document.getElementById('openSound').play().catch(e => console.log("User interaction required."));
        };

        let anthemPlayed = false;
        function playJingleOnce() {
            if (!anthemPlayed) {
                document.getElementById('jingle').play();
                anthemPlayed = true;
            }
        }

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
