<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Grand Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --deep: #050812; --accent: #FF7F50; }
        body { margin: 0; background: var(--deep); color: white; font-family: 'Montserrat', sans-serif; text-align: center; }
        
        /* Intro Curtain */
        #intro-curtain { position: fixed; inset: 0; background: var(--deep); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        #motto-text { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 4px; padding: 20px; }
        .start-btn { padding: 15px 40px; border: 2px solid var(--accent); background: none; color: var(--accent); cursor: pointer; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* Banner & Moon */
        .banner { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('images/cover.jpeg') center/cover; }
        .branded-moon { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; box-shadow: 0 0 20px var(--accent); margin-bottom: 20px; }
        .branded-moon img { width: 100%; height: 100%; object-fit: cover; }

        /* Timer */
        .timer { display: flex; gap: 15px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; backdrop-filter: blur(5px); }
        .time-box { min-width: 60px; }
        .time-val { display: block; font-size: 2rem; color: var(--gold); font-family: 'Cinzel', serif; }

        /* Map Section */
        .map-box { max-width: 800px; margin: 40px auto; padding: 20px; }
        iframe { width: 100%; height: 350px; border-radius: 15px; border: 1px solid var(--gold); }

        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <canvas id="fw-canvas"></canvas>

    <div id="intro-curtain">
        <div id="motto-text">
            <h1>GIKAN SA GAMUT,<br>TUBTOB SA LANGIT</h1>
        </div>
        <button class="start-btn" onclick="reveal()">ENTER THE LEGACY</button>
    </div>

    <div class="banner">
        <div class="branded-moon"><img src="images/moon.png"></div>
        <div class="timer">
            <div class="time-box"><span id="d" class="time-val">00</span>Days</div>
            <div class="time-box"><span id="h" class="time-val">00</span>Hrs</div>
            <div class="time-box"><span id="m" class="time-val">00</span>Min</div>
            <div class="time-box"><span id="s" class="time-val">00</span>Sec</div>
        </div>
    </div>

    <div class="map-box">
        <h2>✈️ MARZON HOTEL, KALIBO</h2>
        <iframe src="https://maps.google.com/?cid=11713442290938606363&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ"></iframe>
    </div>

    <script>
        function reveal() {
            document.getElementById('intro-curtain').style.opacity = '0';
            setTimeout(() => document.getElementById('intro-curtain').style.display = 'none', 1000);
        }

        const target = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("d").innerText = Math.floor(diff / 86400000);
            document.getElementById("h").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("m").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("s").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
