<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The 13 Branches</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0A1128;
            --bg-accent: #152044;
            --accent-vibrant: #FF7F50; /* Vibrant Coral */
            --gold-leaf: #FFD700;    /* Festive Gold */
            --silver-mist: #F0F0F0;
        }

        body, html { margin: 0; padding: 0; background: var(--bg-deep); color: var(--silver-mist); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* --- FIREWORKS POP-OUT EFFECT --- */
        canvas#fireworks-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }

        /* --- INTRO STAGE --- */
        #intro-curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2s ease-in-out; }
        #motto-text { font-family: 'Cinzel', serif; color: var(--gold-leaf); font-size: clamp(1.2rem, 5vw, 2.2rem); text-align: center; letter-spacing: 6px; opacity: 0; transition: opacity 2s ease-in; }
        .start-btn { padding: 18px 50px; background: transparent; border: 2px solid var(--accent-vibrant); color: var(--accent-vibrant); text-transform: uppercase; letter-spacing: 5px; cursor: pointer; border-radius: 50px; margin-top: 40px; }

        /* --- BANNER & THE BRANDED MOON --- */
        .banner { position: relative; height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 3s ease-in; overflow: hidden; }
        .banner.active { opacity: 1; }
        
        /* Masking the original background moon by shifting position */
        .banner-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 20%, transparent, var(--bg-deep) 70%), url('images/cover.jpeg') center/cover no-repeat; z-index: 1; filter: brightness(0.8); }

        /* PERFECTLY ROUND MOON LOGO */
        .branded-moon {
            position: absolute;
            top: 10%;
            left: 10%; /* Exactly where the original moon was */
            width: 160px;
            height: 160px;
            z-index: 10;
            border-radius: 50%;
            clip-path: circle(50% at 50% 50%); /* Strips all outer black detailing */
            box-shadow: 0 0 50px var(--accent-vibrant), 0 0 20px var(--gold-leaf); /* Coral/Gold Glow */
            border: 2px solid var(--gold-leaf);
            background: var(--bg-deep);
            animation: moon-glow 4s ease-in-out infinite alternate;
        }
        .branded-moon img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes moon-glow {
            from { box-shadow: 0 0 30px var(--accent-vibrant); transform: scale(1); }
            to { box-shadow: 0 0 60px var(--gold-leaf); transform: scale(1.02); }
        }

        /* --- TIMER --- */
        .timer-container { position: relative; z-index: 20; display: flex; gap: 15px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; border: 1px solid var(--gold-leaf); backdrop-filter: blur(10px); }
        .time-box { text-align: center; min-width: 70px; }
        .time-val { display: block; font-size: 2rem; font-weight: 700; color: var(--gold-leaf); font-family: 'Cinzel', serif; }

        /* --- 13 BRANCHES INTERACTIVE --- */
        .branches-section { padding: 80px 20px; background: var(--bg-accent); text-align: center; }
        .branch-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        .branch-card { padding: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold-leaf); border-radius: 10px; cursor: pointer; transition: 0.3s; min-width: 180px; }
        .branch-card.active-state { background: var(--accent-vibrant); color: white; transform: scale(1.1); }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <div id="intro-curtain">
        <div id="motto-text">Gikan sa Gamut, Tubtob sa Langit</div>
        <button class="start-btn" onclick="startReveal()">Enter the Legacy</button>
    </div>

    <header class="banner" id="main-banner">
        <div class="branded-moon" id="moon-logo">
            <img src="images/moon.png" alt="Sazon Moon">
        </div>
        <div class="banner-bg"></div>
        <div class="timer-container">
            <div class="time-box"><span class="time-val" id="days">00</span><span>Days</span></div>
            <div class="time-box"><span class="time-val" id="hours">00</span><span>Hrs</span></div>
            <div class="time-box"><span class="time-val" id="mins">00</span><span>Mins</span></div>
            <div class="time-box"><span class="time-val" id="secs">00</span><span>Secs</span></div>
        </div>
    </header>

    <section class="branches-section">
        <h2 style="font-family: 'Cinzel'; color: var(--gold-leaf);">The 13 Branches</h2>
        <div class="branch-grid" id="branch-container"></div>
    </section>

    <!-- AUDIO -->
    <audio id="fw-whistle" src="audio/firework_whistle_.mp3"></audio>
    <audio id="fw-high" src="audio/firework_burst_high.mp3"></audio>
    <audio id="fw-low" src="audio/firework_burst_low.mp3"></audio>
    <audio id="snd-anthem" src="audio/sazon-full-anthem.mp3"></audio>

    <script>
        // --- 13 BRANCHES LOGIC ---
        const branches = ["Serafin", "Monserat", "Felomina", "Estrella", "Gregorio", "Regino", "Maria", "Concepcion", "Cezar", "Priscilla", "Gloria", "Reynaldo", "Nilda"];
        const bContainer = document.getElementById('branch-container');
        branches.forEach(name => {
            const div = document.createElement('div');
            div.className = 'branch-card';
            div.innerText = name;
            div.onclick = () => div.classList.toggle('active-state');
            bContainer.appendChild(div);
        });

        // --- FIREWORKS POP-OUT ENGINE ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        function createBurst(x, y) {
            const count = 60;
            const colors = ['#FF7F50', '#FFD700', '#FFFFFF', '#00E5FF'];
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vX: (Math.random() - 0.5) * 18,
                    vY: (Math.random() - 0.5) * 18,
                    size: Math.random() * 3 + 1,
                    scale: 1, // To create the "pop out" effect
                    life: 1,
                    color: colors[Math.floor(Math.random()*colors.length)]
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vX; p.y += p.vY; p.vY += 0.15; 
                p.life -= 0.012;
                p.scale += 0.01; // Popping out effect
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.scale, 0, Math.PI*2);
                ctx.fill();
                
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- REVEAL SEQUENCE ---
        function startReveal() {
            document.querySelector('.start-btn').style.display = 'none';
            document.getElementById('motto-text').style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('fw-whistle').play();
                
                setTimeout(() => {
                    document.getElementById('fw-high').play();
                    // Bursting over the Moon Focal Point
                    createBurst(window.innerWidth * 0.15, window.innerHeight * 0.15);
                    
                    setTimeout(() => {
                        document.getElementById('fw-low').play();
                        createBurst(window.innerWidth * 0.5, window.innerHeight * 0.3);
                        createBurst(window.innerWidth * 0.8, window.innerHeight * 0.2);
                    }, 600);
                }, 1200);

                document.getElementById('intro-curtain').style.opacity = '0';
                document.getElementById('main-banner').classList.add('active');
                document.getElementById('snd-anthem').play();
                setTimeout(() => document.getElementById('intro-curtain').style.display = 'none', 2000);
            }, 3000);
        }

        // Timer
        const target = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            document.getElementById("days").innerText = Math.floor(diff / 86400000);
            document.getElementById("hours").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("mins").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("secs").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
