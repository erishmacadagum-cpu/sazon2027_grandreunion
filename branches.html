<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--primary);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- 1. BRIGHTER CINEMATIC BANNER --- */
        .banner {
            position: relative;
            height: 100vh;
            /* Lightened overlay for maximum tree clarity */
            background: 
                linear-gradient(rgba(26, 44, 163, 0.15), rgba(10, 10, 10, 0.5)), 
                url('images/cover.jpeg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            border-bottom: 5px solid var(--accent);
            overflow: hidden;
            padding-bottom: 40px;
        }

        /* --- 2. REALISTIC MOON (NO RIM / NO SECOND MOON) --- */
        .moon-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 190px;
            height: 190px;
            z-index: 10;
            /* Screen mode removes any black background/rim from the png */
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.5));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset {
            width: 100%;
            height: auto;
            border-radius: 50%;
        }

        /* --- 3. INTENSE FIREWORKS SYSTEM --- */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 25px;
            border-radius: 4px;
            opacity: 0;
            animation: sparkBurst 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0) scale(0); opacity: 1; height: 5px; }
            40% { opacity: 1; height: 35px; }
            100% { transform: rotate(var(--rot)) translateY(350px) scale(0.5); opacity: 0; height: 2px; }
        }

        /* --- 4. ANCHORED TIMER --- */
        .timer-container {
            display: flex;
            gap: 15px;
            z-index: 20;
            backdrop-filter: blur(8px);
            padding: 15px 30px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 183, 3, 0.3);
        }

        .time-box {
            text-align: center;
            min-width: 75px;
        }

        .time-box span { display: block; font-size: 2rem; color: var(--accent); font-weight: bold; }
        .time-box label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--surface); opacity: 0.8; }

        @keyframes moonFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <header class="banner">
        <!-- The Realistic Moon Asset -->
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>

        <!-- Bursting Fireworks Stage -->
        <div class="fireworks-stage" id="fireworks"></div>

        <!-- Lowered Timer (Motto text removed as requested) -->
        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        // Enhanced Burst logic for more "Hala Bira" impact
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';

            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                // Add more variety to spark colors for realism
                spark.style.boxShadow = `0 0 10px ${color}`;
                spark.style.setProperty('--rot', (i * (360/count)) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.8) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        // Multiple bursts positioned to fill the right-side sky
        createBurst(15, 10, '#FFD700', 25, 0);   // Primary Gold Burst
        createBurst(30, 25, '#FF4500', 20, 1.2); // Vibrant Orange Burst
        createBurst(20, 35, '#FFFFFF', 15, 0.5); // White Glitter Burst
        createBurst(45, 15, '#FFB703', 18, 2.5); // Accent Gold Burst

        // Simple Countdown logic for the Sazon 2027 Reunion
        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
