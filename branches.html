<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        body, html { margin: 0; padding: 0; background: var(--black); color: var(--surface); font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100%; }

        /* --- CINEMATIC OPENING CREDITS --- */
        #intro-curtain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease-in-out;
        }

        .intro-text {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: 1.5rem;
            letter-spacing: 8px;
            opacity: 0;
            transform: translateY(20px);
            animation: textRise 3s forwards;
            text-align: center;
        }

        .click-to-begin {
            margin-top: 30px;
            color: var(--surface);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            opacity: 0;
            animation: fadeIn 1s 2s forwards;
        }

        @keyframes textRise {
            0% { opacity: 0; transform: translateY(20px); }
            50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* --- MAIN BANNER (Initially Hidden) --- */
        .banner {
            position: relative;
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            border-bottom: 5px solid var(--accent);
            opacity: 0;
            transition: opacity 3s ease-in;
        }

        .banner.active { opacity: 1; }

        .banner-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 115%;
            background: radial-gradient(circle, rgba(26, 44, 163, 0.1) 0%, rgba(10, 10, 10, 0.5) 100%),
                        url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
        }

        .moon-container {
            position: absolute;
            top: 5vh; left: 5vw;
            width: clamp(110px, 18vw, 190px);
            z-index: 10;
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset { width: 100%; border-radius: 50%; }

        .fireworks-stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0; }

        @keyframes fireworkExplode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .timer-container {
            margin-bottom: clamp(30px, 8vh, 60px);
            display: flex; gap: 12px; z-index: 20;
            backdrop-filter: blur(12px);
            padding: 18px 35px;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 183, 3, 0.4);
            border-radius: 12px;
        }

        .time-box { text-align: center; min-width: 70px; }
        .time-box span { display: block; font-size: 1.8rem; color: var(--accent); font-weight: bold; font-family: 'Cinzel', serif; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        @keyframes moonFloat { from { transform: translateY(0); } to { transform: translateY(-18px); } }
    </style>
</head>
<body>

    <!-- Opening Credits Curtain -->
    <div id="intro-curtain" onclick="startLegacyHub()">
        <div class="intro-text">Gikan sa Gamut...</div>
        <div class="click-to-begin">Enter the Legacy</div>
    </div>

    <header class="banner" id="main-banner">
        <div class="banner-bg"></div>
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>
        <div class="fireworks-stage" id="fireworks"></div>

        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <!-- Audio Files -->
    <audio id="anthem" src="sazon-full-anthem.mp3"></audio>

    <script>
        function startLegacyHub() {
            // 1. Fade out the curtain
            const curtain = document.getElementById('intro-curtain');
            curtain.style.opacity = '0';
            setTimeout(() => { curtain.style.display = 'none'; }, 2000);

            // 2. Fade in the banner
            const banner = document.getElementById('main-banner');
            banner.classList.add('active');
            document.body.style.overflow = 'auto';

            // 3. Play the anthem
            const anthem = document.getElementById('anthem');
            anthem.play();

            // 4. Start fireworks loop
            setInterval(launchFirework, 1500);
        }

        function launchFirework() {
            const stage = document.getElementById('fireworks');
            const xOrigin = 60 + (Math.random() * 30);
            const yOrigin = 15 + (Math.random() * 25);
            const colors = ['#FFD700', '#FB8500', '#FFFFFF', '#FFB703'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (i * (360 / 35)) * (Math.PI / 180);
                const velocity = 80 + (Math.random() * 120);
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 8px ${color}`;
                p.style.left = xOrigin + '%';
                p.style.top = yOrigin + '%';
                p.style.setProperty('--x', `${Math.cos(angle) * velocity}px`);
                p.style.setProperty('--y', `${(Math.sin(angle) * velocity) + 40}px`);
                p.style.animation = `fireworkExplode ${1.2 + Math.random()}s ease-out forwards`;
                stage.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        // Countdown Logic
        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById("mins").innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById("secs").innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
