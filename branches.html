<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Legacy | 2027 Grand Reunion</title>

    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --black: #050505; --dark-grey: #111111; }
        body, html { margin: 0; padding: 0; background-color: var(--black); color: white; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        nav { position: fixed; top: 0; width: 100%; padding: 20px 0; background: rgba(0,0,0,0.9); z-index: 1000; border-bottom: 1px solid var(--gold); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; padding: 0 40px; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.7), var(--black)), url('images/banner.jpg'); background-size: cover; }
        .section-padding { padding: 80px 20px; text-align: center; }
        .apparel-card { background: var(--dark-grey); border: 1px solid rgba(212,175,55,0.2); padding: 20px; max-width: 800px; margin: 0 auto; }
        .design-split { display: flex; gap: 15px; margin-bottom: 20px; }
        .design-view { flex: 1; text-align: center; }
        .design-view img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); }
        .design-label { font-size: 0.65rem; color: var(--gold); margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .btn-gold { background: var(--gold); color: var(--black); padding: 12px 25px; text-decoration: none; font-family: 'Cinzel'; font-weight: 700; display: inline-block; margin-top: 20px; }
        .map-frame { width: 100%; height: 400px; border: 1px solid var(--gold); margin-top: 30px; filter: grayscale(1) invert(1); }
    </style>
</head>
<body>

    <audio id="click-sound" src="audio/click.mp3"></audio>

    <nav>
        <div class="nav-container">
            <a href="#" style="font-family:'Cinzel'; color:var(--gold); text-decoration:none;">SAZON LEGACY</a>
        </div>
    </nav>

    <section class="hero">
        <h1 style="font-family:'Cinzel'; color:var(--gold); font-size:3rem; letter-spacing:5px;">SAZON 2027</h1>
        <p style="letter-spacing:8px; font-size:0.7rem;">TUBTOB SA LANGIT</p>
    </section>

    <!-- APPAREL SECTION: LABELS SWAPPED PER YOUR REQUIREMENTS -->
    <section id="apparel" class="section-padding">
        <h2 style="font-family:'Cinzel'; color:var(--gold);">LEGACY GEAR</h2>
        <div class="apparel-card">
            <div class="design-split">
                <div class="design-view">
                    <img src="images/apparel_front.jpg" alt="Front">
                    <div class="design-label">Front: Family Tree Logo</div>
                </div>
                <div class="design-view">
                    <img src="images/apparel_back.jpg" alt="Back">
                    <div class="design-label">Back: Nutrition Facts</div>
                </div>
            </div>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=sharing" target="_blank" class="btn-gold">Confirm Sizes</a>
        </div>
    </section>

    <section id="travel" class="section-padding" style="background:var(--dark-grey);">
        <h2 style="font-family:'Cinzel'; color:var(--gold);">RSVP & TRAVEL</h2>
        <p style="font-size:0.8rem;">Venue: Marzon Hotel Kalibo (10 mins from Airport)</p>
        <div class="map-frame">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3904.341144594589!2d122.361955375836!3d11.705705341315894!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33b0021679093a15%3A0xe45371c11030e445!2sMarzon%20Hotel%20Kalibo!5e0!3m2!1sen!2sph!4v1714935000000!5m2!1sen!2sph" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section> 

</body>
</html>
