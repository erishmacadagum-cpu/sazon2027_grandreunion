<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --highlight: #FB8500;
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--black);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- 1. THE HERO BANNER --- */
        .banner {
            position: relative;
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            border-bottom: 5px solid var(--accent);
        }

        .banner-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 115%;
            background: 
                radial-gradient(circle, rgba(26, 44, 163, 0.1) 0%, rgba(10, 10, 10, 0.5) 100%),
                url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
            will-change: transform;
        }

        /* --- 2. THE MOON (CLEAN & REALISTIC) --- */
        .moon-container {
            position: absolute;
            top: 5vh; left: 5vw;
            width: clamp(110px, 18vw, 190px);
            aspect-ratio: 1/1;
            z-index: 10;
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }
        .moon-asset { width: 100%; height: auto; border-radius: 50%; }

        /* --- 3. ADVANCED FIREWORKS ENGINE --- */
        .fireworks-stage {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            opacity: 0;
            will-change: transform, opacity;
        }

        @keyframes fireworkExplode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        /* --- 4. ANCHORED TIMER --- */
        .timer-container {
            margin-bottom: clamp(30px, 8vh, 60px);
            display: flex;
            gap: 12px;
            z-index: 20;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 35px;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 183, 3, 0.4);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .time-box { text-align: center; min-width: 70px; }
        .time-box span { display: block; font-size: 1.8rem; color: var(--accent); font-weight: bold; font-family: 'Cinzel', serif; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        @keyframes moonFloat { from { transform: translateY(0); } to { transform: translateY(-18px); } }
    </style>
</head>
<body>

    <header class="banner">
        <div class="banner-bg" id="parallax-bg"></div>
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>
        <div class="fireworks-stage" id="fireworks"></div>

        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        // High-Fidelity Particle Fireworks
        function launchFirework() {
            const stage = document.getElementById('fireworks');
            const xOrigin = 50 + (Math.random() * 40 - 20); // Focus on right side/center
            const yOrigin = 20 + (Math.random() * 30);
            const colors = ['#FFD700', '#FB8500', '#FFFFFF', '#FFB703', '#FF4500'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const particleCount = 40;
            const burstId = Date.now();

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                
                // Physics Calculations
                const angle = (i * (360 / particleCount)) * (Math.PI / 180);
                const velocity = 100 + (Math.random() * 150);
                const xDest = Math.cos(angle) * velocity;
                const yDest = Math.sin(angle) * velocity + 50; // Added "gravity" pull

                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 10px ${color}`;
                p.style.left = xOrigin + '%';
                p.style.top = yOrigin + '%';
                p.style.setProperty('--x', `${xDest}px`);
                p.style.setProperty('--y', `${yDest}px`);
                
                p.style.animation = `fireworkExplode ${1.5 + Math.random()}s ease-out forwards`;
                
                stage.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }

        // Launch bursts at intervals for continuous "Hala Bira" energy
        setInterval(launchFirework, 1800);
        setTimeout(launchFirework, 500);

        // Parallax & Countdown
        window.addEventListener('scroll', () => {
            const offset = window.pageYOffset;
            document.getElementById('parallax-bg').style.transform = `translateY(${offset * 0.3}px)`;
        });

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById("mins").innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById("secs").innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
