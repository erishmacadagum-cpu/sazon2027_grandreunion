<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Legacy Gear Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --white: #ffffff;
            --dark-grey: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        h1, h2, .cinzel { font-family: 'Cinzel', serif; }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo { font-size: 1.5rem; color: var(--gold); text-decoration: none; font-weight: bold; }

        .hero {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8));
        }

        .hero h1 { font-size: 3.5rem; color: var(--gold); margin-bottom: 10px; }
        .hero p { font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }

        .section-padding { padding: 60px 20px; text-align: center; }

        .design-split {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .apparel-card {
            background: var(--dark-grey);
            border: 1px solid rgba(212,175,55,0.2);
            padding: 20px;
            max-width: 400px;
            transition: 0.3s;
        }

        .design-view { text-align: center; }
        .design-view img { 
            width: 100%; 
            height: auto; 
            border: 1px solid rgba(255,255,255,0.1);
            display: block;
        }

        .label {
            margin-top: 20px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(212,175,55,0.3);
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo cinzel">SAZON 2027</a>
        </div>
    </nav>

    <header class="hero">
        <h1 class="cinzel">The Legacy Hub</h1>
        <p>Official Sazon Clan Gear</p>
    </header>

    <section id="gear" class="section-padding">
        <h2 class="cinzel" style="font-size: 2.2rem; color: var(--gold);">FIRST EDITION APPAREL</h2>
        <p style="max-width: 700px; margin: 20px auto; opacity: 0.8;">Refined designs curated for the Sazon Clan grand reunion.</p>
        
        <div class="design-split">
            <!-- Left Side: Front Design -->
            <div class="apparel-card">
                <div class="design-view">
                    <img src="images/apparel-front.jpg" alt="Family Tree Logo">
                    <div class="label">FRONT: FAMILY TREE LOGO</div>
                </div>
            </div>

            <!-- Right Side: Back Design -->
            <div class="apparel-card">
                <div class="design-view">
                    <img src="images/apparel-back.jpg" alt="Nutrition Facts">
                    <div class="label">BACK: NUTRITION FACTS</div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p class="cinzel">Sazon Family Grand Reunion &copy; 2027</p>
        <p>Marzon Hotel, Kalibo, Aklan</p>
    </footer>

</body>
</html>
