<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3; /* Indigo Night */
            --accent: #FFB703;  /* Festival Gold */
            --highlight: #FB8500; /* Vivid Orange */
            --surface: #F5F5F5;
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. ENHANCED CINEMATIC BANNER --- */
        .banner {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 5px solid var(--accent);
        }

        /* Parallax Background - Highlights the Tree */
        .banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%; /* Extra height for parallax movement */
            background: 
                radial-gradient(circle, rgba(26, 44, 163, 0.2) 0%, rgba(10, 10, 10, 0.7) 100%),
                url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
            transform: translateY(0);
            will-change: transform;
        }

        /* Vignette Overlay for Visual Anchoring */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- 2. REALISTIC MOON (NO RIM) --- */
        .moon-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 180px;
            height: 180px;
            z-index: 10;
            mix-blend-mode: screen; /* Removes black artifacts/rims */
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
            animation: moonFloat 8s ease-in-out infinite alternate;
        }

        .moon-asset {
            width: 100%;
            height: auto;
            border-radius: 50%;
        }

        /* --- 3. INTENSE FIREWORKS DISPLAY --- */
        .fireworks-stage {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 25px;
            border-radius: 4px;
            opacity: 0;
            animation: sparkBurst 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
        }

        @keyframes sparkBurst {
            0% { transform: rotate(var(--rot)) translateY(0) scale(0); opacity: 1; height: 5px; }
            40% { opacity: 1; height: 35px; filter: blur(1px); }
            100% { transform: rotate(var(--rot)) translateY(400px) scale(0.5); opacity: 0; height: 2px; }
        }

        /* --- 4. ANCHORED TIMER --- */
        .timer-container {
            margin-bottom: 50px;
            display: flex;
            gap: 15px;
            z-index: 20;
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 12px;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid rgba(255, 183, 3, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .time-box {
            text-align: center;
            min-width: 80px;
        }

        .time-box span { 
            display: block; 
            font-size: 2.2rem; 
            color: var(--accent); 
            font-weight: bold; 
            font-family: 'Cinzel', serif;
        }

        .time-box label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--surface); 
            opacity: 0.7; 
        }

        @keyframes moonFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        /* Responsive Scaling for Mobile */
        @media (max-width: 768px) {
            .moon-container { width: 120px; height: 120px; top: 20px; left: 20px; }
            .timer-container { gap: 8px; padding: 15px 20px; margin-bottom: 30px; }
            .time-box { min-width: 60px; }
            .time-box span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header class="banner">
        <!-- Parallax Background Layer -->
        <div class="banner-bg" id="parallax-bg"></div>
        
        <!-- Framing Vignette -->
        <div class="vignette"></div>

        <!-- Realistic Moon Asset -->
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>

        <!-- Intense Fireworks Stage -->
        <div class="fireworks-stage" id="fireworks"></div>

        <!-- Anchored Timer (Text Removed to focus on Tree) -->
        <div class="timer-container" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <script>
        // Parallax Scroll Effect for the Tree
        window.addEventListener('scroll', function() {
            const scrollPos = window.pageYOffset;
            const bg = document.getElementById('parallax-bg');
            bg.style.transform = 'translateY(' + (scrollPos * 0.4) + 'px)';
        });

        // Intense Burst Generation
        function createBurst(top, right, color, count, delay) {
            const container = document.getElementById('fireworks');
            const burstOrigin = document.createElement('div');
            burstOrigin.style.position = 'absolute';
            burstOrigin.style.top = top + '%';
            burstOrigin.style.right = right + '%';

            for(let i=0; i<count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.backgroundColor = color;
                spark.style.boxShadow = `0 0 12px ${color}`;
                spark.style.setProperty('--rot', (i * (360/count)) + 'deg');
                spark.style.animationDelay = delay + (Math.random() * 0.8) + 's';
                burstOrigin.appendChild(spark);
            }
            container.appendChild(burstOrigin);
        }

        // Expanded Burst Positions for "Hala Bira" Atmosphere
        createBurst(15, 10, '#FFD700', 25, 0);   
        createBurst(25, 25, '#FF4500', 22, 1.2); 
        createBurst(10, 30, '#FFFFFF', 15, 0.5); 
        createBurst(40, 15, '#FB8500', 20, 2.5); 
        createBurst(20, 45, '#FFB703', 15, 1.8);

        // Countdown Logic
        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
