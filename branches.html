<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3; /* Indigo Night */
            --accent: #FFB703;  /* Festival Gold */
            --highlight: #FB8500; /* Vivid Orange */
            --surface: #F5F5F5;   /* Soft White */
            --black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--primary);
            color: var(--surface);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; }

        /* Cinematic Banner */
        .banner {
            position: relative;
            height: 90vh;
            background: 
                linear-gradient(rgba(26, 44, 163, 0.45), rgba(10, 10, 10, 0.9)), 
                url('images/cover.jpeg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--accent);
            overflow: hidden;
        }

        /* Top Left: 3D Celestial Moon */
        .moon-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, var(--accent) 40%, var(--highlight) 75%, #8b4513 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset -15px -15px 45px rgba(0,0,0,0.6), inset 10px 10px 35px rgba(255,255,255,0.4), 0 0 60px rgba(255, 183, 3, 0.6);
            animation: moonFloat 6s ease-in-out infinite alternate;
            z-index: 10;
        }

        .logo-inside-moon {
            width: 90px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.8));
        }

        /* Top Right: Silent Fireworks Container */
        .fireworks-container {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 250px;
            height: 250px;
            z-index: 5;
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: explode 3s infinite;
        }

        .fw-1 { top: 20%; left: 30%; background: var(--accent); animation-delay: 0s; }
        .fw-2 { top: 50%; left: 60%; background: var(--highlight); animation-delay: 1.5s; }
        .fw-3 { top: 40%; left: 10%; background: #ffffff; animation-delay: 0.7s; }

        /* Animations */
        @keyframes moonFloat {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0px var(--accent); }
            50% { transform: scale(25); opacity: 0.8; box-shadow: 0 0 20px var(--accent), 0 0 40px var(--highlight); }
            100% { transform: scale(40); opacity: 0; }
        }

        /* Text & UI Elements */
        .banner-content { z-index: 20; }
        
        .timer-container {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-box {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid var(--accent);
            padding: 15px;
            min-width: 80px;
            border-radius: 4px;
            backdrop-filter: blur(8px);
        }

        .time-box span { display: block; font-size: 2rem; color: var(--accent); font-weight: bold; }

        /* Tribute & Design Sections */
        .roots-section { padding: 80px 20px; text-align: center; background: var(--black); border-bottom: 3px solid var(--highlight); }
        .section-padding { padding: 90px 20px; text-align: center; background: var(--primary); }

        .design-split { display: flex; justify-content: center; gap: 40px; margin-top: 50px; flex-wrap: wrap; }
        .apparel-card { background: var(--black); border: 2px solid var(--accent); padding: 25px; max-width: 400px; transition: 0.4s; }
        .apparel-card:hover { border-color: var(--highlight); transform: translateY(-10px); }
        .design-view img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        footer { padding: 60px; text-align: center; background: var(--black); border-top: 4px solid var(--highlight); }
    </style>
</head>
<body onclick="playJingleOnce()">

    <audio id="openSound" src="open.mp3"></audio>
    <audio id="jingle" src="sazon-full-anthem.mp3"></audio>

    <header class="banner">
        <!-- Top Left: Moon -->
        <div class="moon-container">
            <img src="images/logo.png" alt="Sazon Logo" class="logo-inside-moon">
        </div>

        <!-- Top Right: Silent Fireworks -->
        <div class="fireworks-container">
            <div class="firework fw-1"></div>
            <div class="firework fw-2"></div>
            <div class="firework fw-3"></div>
        </div>

        <div class="banner-content">
            <h1 class="cinzel" style="color: var(--accent); font-size: 3.5rem; margin: 0; text-shadow: 3px 3px 20px #000;">Sazon 2027</h1>
            <p class="cinzel" style="letter-spacing: 10px; color: var(--surface);">THE FIRST EDITION REUNION</p>

            <div class="timer-container" id="countdown">
                <div class="time-box"><span id="days">00</span><label>Days</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
                <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
            </div>
        </div>
    </header>

    <section class="roots-section">
        <h2 class="cinzel" style="color: var(--accent); font-size: 3rem;">The Roots</h2>
        <p style="font-size: 1.5rem; color: var(--highlight); letter-spacing: 5px;">Tereso & Teofista Sazon</p>
        <p class="cinzel" style="color: var(--accent); letter-spacing: 4px;">13 Branches • One Legacy</p>
    </section>

    <section class="section-padding">
        <h2 class="cinzel" style="font-size: 2.5rem; color: var(--accent);">First Edition Apparel</h2>
        <p style="font-style: italic; opacity: 0.9;">Refined sample designs curated for approval.</p>
        
        <div class="design-split">
            <div class="apparel-card">
                <div class="design-view">
                    <img src="images/apparel-front.jpg" alt="Front">
                    <div style="margin-top: 20px; color: var(--accent); font-weight: bold;">FRONT: FAMILY TREE LOGO</div>
                </div>
            </div>
            <div class="apparel-card">
                <div class="design-view">
                    <img src="images/apparel-back.jpg" alt="Back">
                    <div style="margin-top: 20px; color: var(--accent); font-weight: bold;">BACK: NUTRITION FACTS</div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p class="cinzel" style="color: var(--accent);">Sazon Family Grand Reunion &copy; 2027</p>
        <p>Marzon Hotel, Kalibo, Aklan</p>
    </footer>

    <script>
        window.onload = function() {
            document.getElementById('openSound').play().catch(e => console.log("Interaction required."));
        };

        let anthemPlayed = false;
        function playJingleOnce() {
            if (!anthemPlayed) {
                document.getElementById('jingle').play();
                anthemPlayed = true;
            }
        }

        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        function countdown() {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("mins").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("secs").innerText = Math.floor((gap % minute) / second);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
