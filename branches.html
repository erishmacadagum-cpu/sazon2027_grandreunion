<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2CA3;
            --accent: #FFB703;
            --black: #0a0a0a;
            --white: #F5F5F5;
        }

        body, html { margin: 0; padding: 0; background: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100%; }

        /* --- STAGE 1: THE PRELUDE CURTAIN --- */
        #intro-curtain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease-in-out;
        }

        #motto-text {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: clamp(1.2rem, 5vw, 2rem);
            text-align: center;
            letter-spacing: 5px;
            opacity: 0; /* Starts hidden */
            transition: opacity 2s ease-in;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 1001;
        }

        /* --- STAGE 2: THE REVEAL BANNER --- */
        .banner {
            position: relative;
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            opacity: 0;
            transition: opacity 3.5s ease-in;
        }

        .banner.active { opacity: 1; }

        .banner-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 115%;
            background: radial-gradient(circle, rgba(26, 44, 163, 0.1), rgba(10, 10, 10, 0.6)),
                        url('images/cover.jpeg') center/cover no-repeat;
            z-index: 1;
        }

        .moon-container {
            position: absolute;
            top: 5vh; left: 5vw;
            width: clamp(120px, 20vw, 200px);
            z-index: 10;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
        }

        .moon-asset { width: 100%; border-radius: 50%; }

        /* --- FIREWORKS --- */
        .fireworks-stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0; }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        /* --- TIMER --- */
        .timer-container {
            margin-bottom: 5vh;
            display: flex; gap: 12px; z-index: 20;
            background: rgba(10, 10, 10, 0.6);
            padding: 15px 30px; border-radius: 10px;
            border: 1px solid rgba(255, 183, 3, 0.2);
            backdrop-filter: blur(5px);
        }

        .time-box { text-align: center; min-width: 60px; }
        .time-box span { display: block; font-size: 1.6rem; color: var(--accent); font-weight: bold; }
        .time-box label { font-size: 0.55rem; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="intro-curtain">
        <div id="motto-text">Gikan sa Gamut...<br>Tubtob sa Langit</div>
        <button id="begin-btn" class="start-btn" onclick="executeCinematicOpening()">Begin the Legacy</button>
    </div>

    <header class="banner" id="main-banner">
        <div class="banner-bg"></div>
        <div class="moon-container">
            <img src="images/moon.png" alt="Moon" class="moon-asset">
        </div>
        <div id="fireworks" class="fireworks-stage"></div>

        <div class="timer-container">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
            <div class="time-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="time-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <!-- Audio Assets -->
    <audio id="snd-swell" src="audio/prelude_swell.mp3" preload="auto"></audio>
    <audio id="snd-shimmer" src="audio/reveal_shimmer.mp3" preload="auto"></audio>
    <audio id="snd-anthem" src="audio/sazon-full-anthem.mp3" loop></audio>
    
    <audio id="burst-low" src="audio/firework_burst_low.mp3" preload="auto"></audio>
    <audio id="burst-high" src="audio/firework_burst_high.mp3" preload="auto"></audio>
    <audio id="burst-whistle" src="audio/firework_whistle.mp3" preload="auto"></audio>

    <script>
        function executeCinematicOpening() {
            const btn = document.getElementById('begin-btn');
            const motto = document.getElementById('motto-text');
            const swell = document.getElementById('snd-swell');
            const shimmer = document.getElementById('snd-shimmer');
            const anthem = document.getElementById('snd-anthem');
            const banner = document.getElementById('main-banner');
            const curtain = document.getElementById('intro-curtain');

            // 1. Hide Button & Play Swell Immediately
            btn.style.display = 'none';
            swell.play();
            
            // 2. Fade in the Motto Text during the swell
            motto.style.opacity = '1';

            // 3. Set the Reveal Timing (Adjust 3500ms to match your swell peak)
            setTimeout(() => {
                // Play shimmer and fade out curtain
                shimmer.play();
                curtain.style.opacity = '0';
                
                // Show the hub and start celebration
                banner.classList.add('active');
                anthem.play();
                document.body.style.overflow = 'auto';

                // Start fireworks
                setInterval(launchFirework, 2000);
                
                // Final cleanup of the curtain
                setTimeout(() => { curtain.style.display = 'none'; }, 2000);
            }, 3500); 
        }

        function launchFirework() {
            const stage = document.getElementById('fireworks');
            const x = 55 + (Math.random() * 35);
            const y = 15 + (Math.random() * 25);
            
            const sounds = ['burst-low', 'burst-high', 'burst-whistle'];
            const randomSnd = sounds[Math.floor(Math.random() * sounds.length)];
            const sfx = document.getElementById(randomSnd).cloneNode();
            sfx.volume = 0.3;
            sfx.play();

            const colors = ['#FFD700', '#FB8500', '#FFFFFF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (i * 10.3) * (Math.PI / 180);
                const velocity = 70 + Math.random() * 90;
                
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 6px ${color}`;
                p.style.left = x + '%';
                p.style.top = y + '%';
                p.style.setProperty('--x', `${Math.cos(angle) * velocity}px`);
                p.style.setProperty('--y', `${Math.sin(angle) * velocity + 30}px`);
                p.style.animation = `explode 1.4s ease-out forwards`;
                
                stage.appendChild(p);
                setTimeout(() => p.remove(), 1400);
            }
        }

        // Countdown for July 23, 2027
        const countDate = new Date("July 23, 2027 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = countDate - now;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById("mins").innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById("secs").innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
