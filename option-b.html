<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Grand Family Reunion 2027</title>
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">">
   <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05070a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 1. Cinematic Header */
        header {
            position: relative;
            width: 100%;
            height: 38vh; /* Restoring your preferred banner height */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #000;
        }

        .header-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 8px;
            color: #D4AF37;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .tagline {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }

        /* 2. Layout Fix (Spacing between Header & Content) */
        .main-container {
            display: flex;
            gap: 40px;
            width: 95%;
            max-width: 1400px;
            margin: 60px auto 100px;
            position: relative;
            z-index: 10;
        }

        .roots-card {
            flex: 1.2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            height: fit-content;
        }

        /* 3. The 13 Branches Grid (Centering Nilda) */
        .branch-grid {
            flex: 2.5;
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* This ensures Nilda sits in the center */
            gap: 20px;
        }

        .branch-tile {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1 1 calc(30% - 20px); /* Restoring the 3-column desktop look */
            min-width: 180px;
            max-width: 280px;
            animation: branchEntrance 0.8s ease-out backwards;
        }

       .branch-tile::after {
    content: 'View Lineage →';
    font-size: 0.7rem;
    color: #D4AF37;
    opacity: 0;
    transition: 0.3s;
    margin-top: 10px;
}

.branch-tile:hover::after {
    opacity: 1;
}

       /* Add this to your h1 and branch-tile h3 styles */
h1, .branch-tile h3 {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
}

        /* 5. The Wave Animation */
        @keyframes branchEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Delay logic for all 13 branches */
        .branch-tile:nth-child(1) { animation-delay: 0.1s; }
        .branch-tile:nth-child(2) { animation-delay: 0.2s; }
        .branch-tile:nth-child(3) { animation-delay: 0.3s; }
        .branch-tile:nth-child(4) { animation-delay: 0.4s; }
        .branch-tile:nth-child(5) { animation-delay: 0.5s; }
        .branch-tile:nth-child(6) { animation-delay: 0.6s; }
        .branch-tile:nth-child(7) { animation-delay: 0.7s; }
        .branch-tile:nth-child(8) { animation-delay: 0.8s; }
        .branch-tile:nth-child(9) { animation-delay: 0.9s; }
        .branch-tile:nth-child(10) { animation-delay: 1.0s; }
        .branch-tile:nth-child(11) { animation-delay: 1.1s; }
        .branch-tile:nth-child(12) { animation-delay: 1.2s; }
        .branch-tile:nth-child(13) { animation-delay: 1.3s; }

        @media (max-width: 1024px) {
            .branch-tile { flex: 1 1 calc(45% - 20px); }
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; align-items: center; }
            .branch-tile { flex: 1 1 100%; max-width: 400px; }
            header { height: 30vh; }
        }
    </style>
</head>
<body>

    <header>
        <video autoplay muted loop playsinline class="header-video">
            <source src="Moon.mp4" type="video/mp4">
        </video>
        <div class="header-overlay"></div>
        <div class="header-content">
            <h1>Sazon 2027</h1>
            <p class="tagline">Gikan sa Gamut, Tubtob sa Langit</p>
        </div>
    </header>

    <div class="main-container">
        <div class="roots-card">
            <h2 style="color: #D4AF37;">The Roots</h2>
            <p>Dedicated to Tereso and Teofista Sazon, the patriarch and matriarch of our clan.</p>
        </div>

        <div class="branch-grid">
            <a href="#" class="branch-tile"><h3>Serafin</h3></a>
            <a href="#" class="branch-tile"><h3>Monserat</h3></a>
            <a href="#" class="branch-tile"><h3>Felomina</h3></a>
            <a href="#" class="branch-tile"><h3>Estrella</h3></a>
            <a href="#" class="branch-tile"><h3>Gregorio</h3></a>
            <a href="#" class="branch-tile"><h3>Regino</h3></a>
            <a href="#" class="branch-tile"><h3>Maria</h3></a>
            <a href="#" class="branch-tile"><h3>Concepcion</h3></a>
            <a href="#" class="branch-tile"><h3>Cezar</h3></a>
            <a href="#" class="branch-tile"><h3>Priscilla</h3></a>
            <a href="#" class="branch-tile"><h3>Gloria</h3></a>
            <a href="#" class="branch-tile"><h3>Reynaldo</h3></a>
            <a href="#" class="branch-tile"><h3>Nilda</h3></a>
        </div>
    </div>

</body>
</html>
