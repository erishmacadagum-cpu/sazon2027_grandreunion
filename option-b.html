<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Gikan sa Gamut</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --accent-coral: #FF6B6B;
            --accent-teal: #4ECDC4;
            --text-dark: #2D3436;
        }

        body {
    font-family: 'Montserrat', sans-serif;
    background-color: #05070a; /* Deep midnight black */
    color: #ffffff;
    margin: 0;
    line-height: 1.6;
}

        /* Hero Header with Sunset Image */
       header {
    position: relative;
    width: 100%;
    height: 35vh; /* Reduced from 45vh to make the video section shorter */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #000; /* Black background while video loads */
}

.header-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover; /* This keeps the moon centered and fills the 35vh area */
    z-index: 0;
}

.header-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4); /* Makes text easier to read */
    z-index: 1;
}

.header-content {
    position: relative;
    z-index: 2;
}

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--accent-coral);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .tagline {
            font-style: italic;
            color: var(--accent-teal);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Main Content Layout */
     .main-container {
            display: flex;
            gap: 30px;
            width: 95%;
            max-width: 1300px;
            /* Change the -80px to a positive 40px to push the content DOWN */
            margin: 40px auto 100px; 
            background: transparent;
            position: relative;
            z-index: 10;
        }

        /* The Roots Card (Left side) */
        .roots-card {
    flex: 1.5;
    background: rgba(255, 255, 255, 0.05); /* Glass effect */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 50px;
    border-radius: 30px;
    border: 1px solid rgba(212, 175, 55, 0.4); /* Gold border instead of teal */
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    color: white;
}

        .roots-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-teal);
            font-size: 3rem;
            margin-top: 0;
        }

        .roots-card h4 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Branch Grid (Right side) */
       .branch-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center; /* This centers the 13th box at the bottom */
    gap: 20px; /* Increased from 15px for a more high-end gallery feel */
    flex: 2;
}
}

       .branch-tile {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* The Balance Secret: */
            flex: 1 1 calc(23% - 15px); /* Allows 4 per row, but lets them grow to fill space */
            min-width: 160px; /* Keeps them from getting too squashed */
            max-width: 300px; /* Keeps them from getting too wide */
        }

     .branch-tile:hover {
    transform: translateY(-10px) scale(1.05);
    /* Slightly more opaque gold tint for a "Light Up" effect */
    background: rgba(212, 175, 55, 0.15); 
    border-color: #D4AF37;
    /* This makes the glow feel more like a physical aura */
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); 
}

      .branch-tile h3 {
            color: #D4AF37; /* The signature Sazon Gold */
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
       .explore-text {
    font-size: 0.85rem; /* Slightly bigger so the nicknames are readable */
    letter-spacing: 1px;
    margin-top: 10px;
    display: block;
    color: rgba(255, 255, 255, 0.7); /* Soft white */
    font-style: italic; /* Makes the nicknames look like a nice sub-caption */
}

        /* Floating Audio Dock */
        .audio-dock {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%); /* Centers the dock on the screen */
        background: rgba(10, 14, 23, 0.85); /* Deep midnight glass */
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 12px 30px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 20px;
        border: 1px solid rgba(212, 175, 55, 0.3); /* Gold border */
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        z-index: 1000;
    }

        .play-btn {
        background: #D4AF37; /* Sazon Gold */
        border: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        color: #0a0e17; /* Dark icon on gold button */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .play-btn:hover {
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.7);
        background: #f1c40f; /* Brighter gold on hover */
    }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                margin-top: 20px;
            }
            h1 { font-size: 2.5rem; }
        }
        
   /* --- Animation Logic --- */
        @keyframes branchEntrance {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .branch-tile {
            animation: branchEntrance 0.8s ease-out backwards;
        }

        /* The Staggered Wave (Delays for all 13 branches) */
        .branch-tile:nth-child(1) { animation-delay: 0.1s; }
        .branch-tile:nth-child(2) { animation-delay: 0.2s; }
        .branch-tile:nth-child(3) { animation-delay: 0.3s; }
        .branch-tile:nth-child(4) { animation-delay: 0.4s; }
        .branch-tile:nth-child(5) { animation-delay: 0.5s; }
        .branch-tile:nth-child(6) { animation-delay: 0.6s; }
        .branch-tile:nth-child(7) { animation-delay: 0.7s; }
        .branch-tile:nth-child(8) { animation-delay: 0.8s; }
        .branch-tile:nth-child(9) { animation-delay: 0.9s; }
        .branch-tile:nth-child(10) { animation-delay: 1.0s; }
        .branch-tile:nth-child(11) { animation-delay: 1.1s; }
        .branch-tile:nth-child(12) { animation-delay: 1.2s; }
        .branch-tile:nth-child(13) { animation-delay: 1.3s; }
    <a href="#" class="branch-tile"><h3>Felomina</h3><span class="explore-text">(Lola Mining)</span></a>
    <a href="#" class="branch-tile"><h3>Estrella</h3><span class="explore-text">(Lola Estring)</span></a>
    <a href="#" class="branch-tile"><h3>Gregorio</h3><span class="explore-text">(Lolo Gorio)</span></a>
    <a href="#" class="branch-tile"><h3>Regino</h3><span class="explore-text">(Lolo Taba)</span></a>
    <a href="#" class="branch-tile"><h3>Maria</h3><span class="explore-text">(Lola Maria)</span></a>
    <a href="#" class="branch-tile"><h3>Concepcion</h3><span class="explore-text">(Lola Moret)</span></a>
    <a href="#" class="branch-tile"><h3>Cezar</h3><span class="explore-text">(Lolo Cezar)</span></a>
    <a href="#" class="branch-tile"><h3>Priscilla</h3><span class="explore-text">(Lola Mamay)</span></a>
    <a href="#" class="branch-tile"><h3>Gloria</h3><span class="explore-text">(Lola Goly)</span></a>
    <a href="#" class="branch-tile"><h3>Reynaldo</h3><span class="explore-text">(Lolo Lope)</span></a>
    <a href="#" class="branch-tile"><h3>Nilda</h3><span class="explore-text">(Lola Nilda)</span></a>
</div>
    </div>

    <div class="audio-dock">
        <button class="play-btn" onclick="togglePlay()">▶</button>
        <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-dark);">Sazon Reunion Anthem</span>
    </div>

    <audio id="sazonAnthem" loop>
        <source src="sazon-reunion-5min.mp3" type="audio/mpeg">
    </audio>
    <audio id="hoverSfx" src="branch-hover.mp3"></audio>
    <audio id="clickSfx" src="ui-click-ripple.mp3"></audio>

    <script>
        const anthem = document.getElementById('sazonAnthem');
        const playBtn = document.querySelector('.play-btn');
        const hoverSfx = document.getElementById('hoverSfx');
        const clickSfx = document.getElementById('clickSfx');

        // Set Initial Volumes
        anthem.volume = 0.4;
        if (hoverSfx) hoverSfx.volume = 0.2;
        if (clickSfx) clickSfx.volume = 0.3;

        function togglePlay() {
            // Play UI Click Sound
            if (clickSfx) {
                clickSfx.currentTime = 0;
                clickSfx.play().catch(e => console.log("Click sound blocked"));
            }

            // Toggle Anthem Music
            if (anthem.paused) {
                anthem.play().catch(e => {
                    console.log("Autoplay blocked by browser");
                    alert("Please click again to play the anthem!");
                });
                playBtn.innerHTML = "⏸";
                playBtn.style.background = "var(--accent-teal)";
            } else {
                anthem.pause();
                playBtn.innerHTML = "▶";
                playBtn.style.background = "var(--accent-coral)";
            }
        }

        // Add hover effects to all tiles
        const tiles = document.querySelectorAll('.branch-tile');
        tiles.forEach(tile => {
            tile.addEventListener('mouseenter', () => {
                if (hoverSfx) {
                    hoverSfx.currentTime = 0;
                    hoverSfx.play().catch(e => {});
                }
            });
        });
    </script>
</body>
</html>
