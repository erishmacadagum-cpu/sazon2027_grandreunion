<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Grand Family Reunion 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05070a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 1. Header & Moon Video Fix */
        header {
            position: relative;
            width: 100%;
            height: 35vh; /* Sleek cinematic height */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #000;
        }

        .header-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* 2. Main Container (No Overlap) */
        .main-container {
            display: flex;
            gap: 30px;
            width: 95%;
            max-width: 1300px;
            margin: 60px auto 100px; /* Pushes content DOWN from the video */
            position: relative;
            z-index: 10;
        }

        .roots-card {
            flex: 1.5;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .branch-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Centers Nilda at the bottom */
            gap: 20px;
            flex: 2;
        }

        /* 3. Branch Tiles & Golden Reveal */
        .branch-tile {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1 1 calc(23% - 15px);
            min-width: 160px;
            max-width: 300px;
            animation: branchEntrance 0.8s ease-out backwards;
        }

        .branch-tile:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(212, 175, 55, 0.15);
            border-color: #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .branch-tile h3 {
            color: #D4AF37;
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .explore-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
            font-style: italic;
        }

        /* 4. Animation Wave */
        @keyframes branchEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .branch-tile:nth-child(1) { animation-delay: 0.1s; }
        .branch-tile:nth-child(2) { animation-delay: 0.2s; }
        .branch-tile:nth-child(3) { animation-delay: 0.3s; }
        .branch-tile:nth-child(4) { animation-delay: 0.4s; }
        .branch-tile:nth-child(5) { animation-delay: 0.5s; }
        .branch-tile:nth-child(6) { animation-delay: 0.6s; }
        .branch-tile:nth-child(7) { animation-delay: 0.7s; }
        .branch-tile:nth-child(8) { animation-delay: 0.8s; }
        .branch-tile:nth-child(9) { animation-delay: 0.9s; }
        .branch-tile:nth-child(10) { animation-delay: 1.0s; }
        .branch-tile:nth-child(11) { animation-delay: 1.1s; }
        .branch-tile:nth-child(12) { animation-delay: 1.2s; }
        .branch-tile:nth-child(13) { animation-delay: 1.3s; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            header { height: 30vh; }
        }
    </style>
</head>
<body>
    <header>
        <video autoplay muted loop playsinline class="header-video">
            <source src="Moon.mp4" type="video/mp4">
        </video>
        <div class="header-overlay"></div>
