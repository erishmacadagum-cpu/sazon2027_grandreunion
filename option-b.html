<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Grand Family Reunion 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05070a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            position: relative;
            width: 100%;
            height: 40vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .header-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 5px;
            color: #D4AF37;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8);
        }

        .main-container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            margin: 80px auto;
            position: relative;
            z-index: 10;
        }

        .roots-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .branch-grid {
            flex: 2;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .branch-tile {
            flex: 1 1 calc(33% - 20px);
            min-width: 150px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            transition: 0.4s;
            animation: branchEntrance 0.8s ease-out backwards;
        }

        .branch-tile:hover {
            transform: translateY(-10px);
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .branch-tile h3 {
            color: #D4AF37;
            margin: 0;
            font-size: 1.1rem;
        }

        @keyframes branchEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* The Wave Effect */
        .branch-tile:nth-child(1) { animation-delay: 0.1s; }
        .branch-tile:nth-child(2) { animation-delay: 0.2s; }
        .branch-tile:nth-child(3) { animation-delay: 0.3s; }
        .branch-tile:nth-child(4) { animation-delay: 0.4s; }
        .branch-tile:nth-child(5) { animation-delay: 0.5s; }
        .branch-tile:nth-child(6) { animation-delay: 0.6s; }
        .branch-tile:nth-child(7) { animation-delay: 0.7s; }
        .branch-tile:nth-child(8) { animation-delay: 0.8s; }
        .branch-tile:nth-child(9) { animation-delay: 0.9s; }
        .branch-tile:nth-child(10) { animation-delay: 1.0s; }
        .branch-tile:nth-child(11) { animation-delay: 1.1s; }
        .branch-tile:nth-child(12) { animation-delay: 1.2s; }
        .branch-tile:nth-child(13) { animation-delay: 1.3s; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <video autoplay muted loop playsinline class="header-video">
            <source src="Moon.mp4" type="video/mp4">
        </video>
        <div class="header-overlay"></div>
        <div class="header-content">
            <h1>Sazon 2027</h1>
            <p class="tagline">Gikan sa Gamut, Tubtob sa Langit</p>
        </div>
    </header>

    <div class="main-container">
        <div class="roots-card">
            <h2 style="color: #D4AF37;">The Roots</h2>
            <p>Dedicated to Tereso and Teofista Sazon, the patriarch and matriarch of our clan.</p>
        </div>

        <div class="branch-grid">
            <a href="#" class="branch-tile"><h3>Serafin</h3></a>
            <a href="#" class="branch-tile"><h3>Monserat</h3></a>
            <a href="#" class="branch-tile"><h3>Felomina</h3></a>
            <a href="#" class="branch-tile"><h3>Estrella</h3></a>
            <a href="#" class="branch-tile"><h3>Gregorio</h3></a>
            <a href="#" class="branch-tile"><h3>Regino</h3></a>
            <a href="#" class="branch-tile"><h3>Maria</h3></a>
            <a href="#" class="branch-tile"><h3>Concepcion</h3></a>
            <a href="#" class="branch-tile"><h3>Cezar</h3></a>
            <a href="#" class="branch-tile"><h3>Priscilla</h3></a>
            <a href="#" class="branch-tile"><h3>Gloria</h3></a>
            <a href="#" class="branch-tile"><h3>Reynaldo</h3></a>
            <a href="#" class="branch-tile"><h3>Nilda</h3></a>
        </div>
    </div>

</body>
</html>
