<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Official Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #003380; /* Darkened for better contrast */
            --gold: #ccac00; /* Darkened gold for readability on white */
            --text-main: #1a202c;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .header {
            position: relative;
            height: 80vh;
            background: url('images/banner.jpg') top center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 10px solid var(--luminous-blue);
        }

        .top-nav {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .nav-logo {
            max-width: 90px;
            background: white;
            padding: 10px;
            border-radius: 12px;
        }

        .nav-text {
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: right;
        }

        .timer-container {
            align-self: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 30px;
            border-radius: 15px;
        }

        #timer { display: flex; gap: 20px; }
        .timer-unit { display: flex; flex-direction: column; text-align: center; color: white; }
        .timer-number { font-size: 2.5rem; font-weight: 700; color: #ffd700; }
        .timer-label { font-size: 0.75rem; text-transform: uppercase; }

        .container { 
            max-width: 900px; 
            margin: 0 auto 100px; 
            padding: 0 20px; 
        }

        .content-box {
            background: white;
            padding: 60px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            border-radius: 12px;
            margin-top: -60px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--luminous-blue);
            margin-bottom: 10px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 50px 0;
        }

        .hub-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 30px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .hub-btn:hover {
            border-color: var(--luminous-blue);
            background: white;
            transform: translateY(-5px);
        }

        .hub-btn .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .hub-btn .text { 
            font-size: 0.9rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--luminous-blue);
        }

        /* ACCESSIBLE LYRICS CARD */
        .lyrics-card {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 50px 30px;
            margin: 40px 0;
            border: 2px solid var(--luminous-blue);
        }

        .lyrics-header {
            font-family: 'Playfair Display', serif;
            color: var(--luminous-blue);
            font-size: 2rem;
            margin-bottom: 30px;
            text-decoration: underline;
        }

        .verse-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #4a5568;
            display: block;
            margin: 25px 0 10px;
            border-bottom: 1px solid #cbd5e0;
        }

        .lyrics-line {
            font-size: 1.3rem; /* Increased for better visibility */
            color: #000000; /* Pure black for maximum contrast */
            margin: 8px 0;
            font-weight: 500;
        }

        .chorus-box {
            background: white;
            border: 3px dashed var(--luminous-blue);
            padding: 25px;
            margin-top: 40px;
            border-radius: 15px;
        }

        .chorus-line {
            font-weight: 700;
            color: var(--luminous-blue);
            font-size: 1.5rem; /* Larger for the slogan */
            margin: 10px 0;
            line-height: 1.4;
        }

        .guide-section {
            text-align: left;
            margin-top: 60px;
            padding-top: 40px;
        }

        .guide-title {
            font-family: 'Playfair Display', serif;
            color: var(--luminous-blue);
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .guide-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            border-left: 8px solid var(--luminous-blue);
        }

        .guide-card h4 { margin: 0 0 10px 0; color: #000; font-size: 1.1rem; }
        .guide-card p { margin: 0; font-size: 1rem; color: #4a5568; }

        .slogan-footer { 
            font-weight: 700; 
            color: var(--luminous-blue); 
            font-size: 1.4rem; 
            margin-top: 60px; 
            padding: 20px;
            background: #fff;
            border: 2px solid var(--luminous-blue);
            display: inline-block;
        }

    </style>
</head>
