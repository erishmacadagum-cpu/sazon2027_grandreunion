<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Official Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fcfcfc;
            color: #1a202c;
            overflow-x: hidden;
        }

        .header {
            position: relative;
            height: 90vh;
            background: url('images/banner.jpg') top center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 8px solid var(--luminous-blue);
        }

        .top-nav {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .nav-logo {
            max-width: 80px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .nav-text {
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: right;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        .timer-container {
            align-self: center;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            animation: fadeIn 1.5s ease-out;
        }

        #timer { display: flex; gap: 25px; }
        .timer-unit { display: flex; flex-direction: column; text-align: center; color: white; }
        .timer-number { font-size: 2.2rem; font-weight: 600; color: var(--gold); line-height: 1; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .timer-label { font-size: 0.65rem; text-transform: uppercase; margin-top: 8px; letter-spacing: 1px; }

        .container { 
            max-width: 1000px; 
            margin: 0 auto 100px; 
            padding: 0 20px; 
            position: relative; 
            z-index: 10; 
            animation: slideUp 1s ease-out;
        }

        .content-box {
            background: white;
            padding: 80px 50px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.05);
            text-align: center;
            border-radius: 8px;
            margin-top: -80px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: var(--luminous-blue);
            margin-bottom: 5px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 60px 0;
        }

        .hub-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 35px 15px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            outline: none;
        }

        .hub-btn:hover {
            border-color: var(--luminous-blue);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 71, 171, 0.12);
        }

        .hub-btn .icon { font-size: 2rem; margin-bottom: 15px; filter: grayscale(1); transition: 0.3s; }
        .hub-btn:hover .icon { filter: grayscale(0); transform: scale(1.2); }
        
        .hub-btn .text { 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            color: #4a5568; 
            letter-spacing: 2px; 
        }
        .hub-btn:hover .text { color: var(--luminous-blue); }

        .qr-section {
            margin-top: 80px;
            padding-top: 60px;
            border-top: 1px solid #f1f5f9;
        }

        .qr-image {
            width: 160px;
            height: 160px;
            padding: 12px;
            background: white;
            border: 1px solid #edf2f7;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .slogan-footer { font-style: italic; color: #cbd5e0; font-size: 1rem; margin-top: 40px; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (min-width: 1024px) {
            .header { height: 95vh; }
            .timer-container { align-self: flex-end; margin-right: 80px; }
        }
    </style>
</head>
<body onpointerdown="playEntrySound()">

    <audio id="entrySound" src="audio/open.mp3" preload="auto"></audio>
    <audio id="clickSound" src="audio/click.mp3" preload="auto"></audio>
    <audio id="jingleAudio" src="audio/jingle.mp3" preload="auto"></audio>

    <div class="header">
        <div class="top-nav">
            <img src="images/logo.png" alt="Sazon Logo" class="nav-logo">
            <div class="nav-text">22-23 JULY 2027<br>KALIBO, AKLAN</div>
        </div>

        <div class="timer-container" id="countdown-section">
            <div id="timer">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2>Sazon 2027 Hub</h2>
            <p style="color: var(--luminous-blue); text-transform: uppercase; letter-spacing: 3px; font-size: 0.85rem; font-weight: 600;">Marzon Hotel & Resort</p>

            <div class="hub-grid">
                <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="hub-btn" onclick="playClick()">
                    <span class="icon">📝</span>
                    <span class="text">Register</span>
                </a>
                
                <button class="hub-btn" onclick="toggleJingle()">
                    <span class="icon">🎵</span>
                    <span class="text">Theme Song</span>
                </button>

                <a href="https://maps.app.goo.gl/uXv7p9jJ7p5p5p5p5" target="_blank" class="hub-btn" onclick="playClick()">
                    <span class="icon">📍</span>
                    <span class="text">Venue Map</span>
                </a>

                <a href="#countdown-section" class="hub-btn" onclick="playClick()">
                    <span class="icon">⏳</span>
                    <span class="text">Countdown</span>
                </a>
            </div>

            <p class="slogan-footer">"Gikan sa Gamut, Tubtob sa Langit"</p>

            <div class="qr-section">
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: #a0aec0; margin-bottom: 25px;">Official Clan Access</p>
                <img src="images/qr-code.png" alt="Scan for Access" class="qr-image">
                <p style="font-size: 1rem; font-weight: 600; color: var(--luminous-blue); margin-top: 25px; letter-spacing: 1px;">
                    tinyurl.com/SazonGrandReunion
                </p>
            </div>
        </div>
    </div>

    <script>
        let hasPlayedEntry = false;
        function playEntrySound() {
            if (!hasPlayedEntry) {
                const entry = document.getElementById('entrySound');
                entry.play().catch(e => console.log("Audio blocked."));
                hasPlayedEntry = true;
            }
        }

        function playClick() {
            const click = document.getElementById('clickSound');
            click.currentTime = 0;
            click.play();
        }

        function toggleJingle() {
            const jingle = document.getElementById("jingleAudio");
            const click = document.getElementById("clickSound");
            if (jingle.paused) {
                jingle.play();
            } else {
                jingle.pause();
                click.play();
            }
        }

        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-number">${h}</span><span class="timer-label">Hrs</span></div>
                <div class="timer-unit"><span class="timer-number">${m}</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-number">${s}</span><span class="timer-label">Secs</span></div>
            `;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
