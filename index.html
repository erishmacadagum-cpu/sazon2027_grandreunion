<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --glow: rgba(197, 160, 89, 0.6); }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; height: 100vh; }
        
        /* FIX: THE CLICKABLE GATEKEEPER */
        #unlock-screen { 
            position: fixed; inset: 0; background: #000; z-index: 99999; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .tap-btn { 
            padding: 20px 50px; border: 2px solid var(--gold); color: var(--gold); 
            text-transform: uppercase; letter-spacing: 8px; font-family: 'Cinzel';
            box-shadow: 0 0 20px var(--glow); transition: 0.5s;
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.98); } }

        /* THE CINEMATIC OVERLAY */
        #intro-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 8888; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            transition: opacity 1.5s;
        }
        .credits { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .credit-large { font-size: clamp(2rem, 6vw, 4rem); font-weight: 700; margin: 15px 0; filter: drop-shadow(0 0 15px var(--glow)); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* MAIN STAGE */
        #hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 3s ease-in-out; 
        }

        /* TEXT PHYSICS: SAZON -> SOON */
        .brand-wrap { text-align: center; }
        .brand-text { display: flex; align-items: center; font-family: 'Cinzel'; font-size: clamp(3rem, 12vw, 9rem); color: var(--gold); font-weight: 700; }
        .az { transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); display: inline-block; width: auto; overflow: hidden; }
        .az.dissolve { opacity: 0; width: 0; transform: scale(0) rotate(10deg); margin: 0; }
        
        /* THE MOON O: FROM YOUR SCREENSHOT */
        .moon-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-45deg); 
            transition: 2s cubic-bezier(0.17, 0.89, 0.32, 1.28); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            position: relative; border: 3px solid var(--gold);
            background: url('Screenshot 2026-05-03 at 11.17.04 PM.jpg') center/cover;
            box-shadow: 0 0 50px var(--glow), inset 0 0 30px #000;
        }
        .moon-o.rise { width: clamp(3.5rem, 13vw, 8.5rem); height: clamp(3.5rem, 13vw, 8.5rem); opacity: 1; transform: scale(1) rotate(0deg); margin: 0 15px; }
        .moon-o img { width: 80%; height: auto; filter: drop-shadow(0 0 8px rgba(0,0,0,0.8)); }

        .year-tag { font-family: 'Cinzel'; font-size: 1.5rem; color: var(--gold); opacity: 0.8; transition: 1s; }
        .year-tag.hide { opacity: 0; transform: scale(0.8); }

        /* TIMER */
        .timer { display: flex; gap: 20px; margin-top: 40px; opacity: 0; transition: 2s; }
        .timer.show { opacity: 1; }
        .t-unit { border: 1px solid var(--gold); padding: 15px; min-width: 70px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .t-num { display: block; font-size: 2rem; color: var(--gold); font-weight: 700; }
        .t-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <audio id="shim" src="audio/shimmer.mp3"></audio>
    <audio id="openS" src="audio/open.mp3"></audio>
    <audio id="jingle" src="audio/jingle.mp3" loop></audio>

    <div id="unlock-screen" onclick="startShow()">
        <div class="tap-btn">Enter Sazon Legacy</div>
    </div>

    <div id="intro-overlay">
        <div class="credits" id="c1">Sazon Family Production</div>
        <div class="credits" id="c2" style="font-size: 0.8rem; margin-top: 20px;">In Honor of the Roots</div>
        <div class="credits credit-large" id="c3">Tereso & Teofista Sazon</div>
        <div class="credits" id="c4">July 2027 • Aklan</div>
    </div>

    <main id="hero">
        <div class="brand-wrap">
            <div class="brand-text">
                <span>S</span>
                <span class="az" id="a">A</span>
                <span class="az" id="z">Z</span>
                <div class="moon-o" id="moon"><img src="logo.png"></div>
                <span>O</span>
                <span>N</span>
            </div>
            <div class="year-tag" id="year">2027</div>
        </div>

        <div class="timer" id="timer">
            <div class="t-unit"><span class="t-num" id="days">00</span><span class="t-label">Days</span></div>
            <div class="t-unit"><span class="t-num" id="hours">00</span><span class="t-label">Hrs</span></div>
            <div class="t-unit"><span class="t-num" id="mins">00</span><span class="t-label">Min</span></div>
            <div class="t-unit"><span class="t-num" id="secs">00</span><span class="t-label">Sec</span></div>
        </div>
    </main>

    <script>
        function startShow() {
            // Instant Audio & Visibility Toggle
            document.getElementById('openS').play();
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('intro-overlay').style.display = 'flex';

            // Timing the Shimmer to the Names
            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 500);
            setTimeout(() => {
                document.getElementById('shim').play();
                document.getElementById('c3').classList.add('reveal');
            }, 2500);
            
            // Exit Credits, Enter Hero
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    const hero = document.getElementById('hero');
                    hero.style.display = 'flex';
                    document.getElementById('jingle').play();
                    setTimeout(() => { 
                        hero.style.opacity = '1'; 
                        // TRIGGER THE SOON TRANSFORMATION
                        setTimeout(transform, 3500);
                    }, 100);
                }, 1500);
            }, 6500);
        }

        function transform() {
            document.getElementById('a').classList.add('dissolve');
            document.getElementById('z').classList.add('dissolve');
            document.getElementById('year').classList.add('hide');
            
            setTimeout(() => {
                document.getElementById('moon').classList.add('rise');
                setTimeout(() => {
                    document.getElementById('timer').classList.add('show');
                }, 1000);
            }, 600);
        }

        // Standard Timer Logic
        function updateTimer() {
            const end = new Date("July 23, 2027 00:00:00").getTime();
            const now = new Date().getTime();
            const d = end - now;
            if (d < 0) return;
            document.getElementById('days').innerText = Math.floor(d / 86400000).toString().padStart(2,'0');
            document.getElementById('hours').innerText = Math.floor((d % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('mins').innerText = Math.floor((d % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('secs').innerText = Math.floor((d % 60000) / 1000).toString().padStart(2,'0');
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
