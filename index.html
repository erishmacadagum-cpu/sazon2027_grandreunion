<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #ffffff; color: #002366; text-align: center; }
        
        /* Banner Calibration */
        .hero {
            height: 60vh;
            background: #0047AB url('images/banner.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid #0047AB;
        }

        .hub-card {
            max-width: 800px;
            margin: -50px auto 50px;
            background: white;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: #0047AB; margin: 0; }
        .lyrics { font-family: 'Playfair Display', serif; font-size: 1.4rem; line-height: 1.8; margin: 40px 0; font-style: italic; }
        
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .btn { 
            padding: 15px 30px; 
            border: 1px solid #0047AB; 
            text-decoration: none; 
            color: #0047AB; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn:hover { background: #0047AB; color: white; }

        .qr-section { margin-top: 50px; padding-top: 30px; border-top: 1px solid #eee; }
        .qr-placeholder { width: 150px; height: 150px; margin: 10px auto; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
        
        .footer-slogan { font-family: 'Playfair Display', serif; font-size: 2rem; margin-top: 50px; border-top: 2px solid #0047AB; padding-top: 20px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="openSnd" src="audio/open.mp3"></audio>
    <audio id="clickSnd" src="audio/click.mp3"></audio>

    <div class="hero">
        <div style="background: rgba(255,255,255,0.8); padding: 20px; border-radius: 50%;">
            <img src="images/logo.png" width="80" alt="Logo">
        </div>
    </div>

    <div class="hub-card">
        <h1>Sazon 2027</h1>
        <p style="letter-spacing: 5px; color: #888;">GRAND FAMILY REUNION</p>

        <div class="btn-row">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" class="btn" onclick="playClick()">Register</a>
            <a href="https://www.google.com/maps/place/Marzon+Hotel+Kalibo" class="btn" onclick="playClick()">Venue Map</a>
        </div>

        <div class="lyrics">
            "Miles unfolding, ink on the page,<br>
            A story rewritten, turning the age.<br>
            July 2027, the compass aligns,<br>
            Marzon Hotel, Kalibo, where the heritage shines."
        </div>

        <div class="qr-section">
            <p style="font-size: 0.7rem; letter-spacing: 3px;">OFFICIAL ACCESS</p>
            <div class="qr-placeholder">
                <img src="images/qr-code.png" alt="QR Code" style="width:100%; height:100%;">
            </div>
            <p>tinyurl.com/SazonGrandReunion</p>
        </div>

        <div class="footer-slogan">
            Gikan sa Gamut, Tubtob sa Langit
        </div>
    </div>

    <script>
        let audioUnlocked = false;
        function startAudio() {
            if (!audioUnlocked) {
                document.getElementById('openSnd').play().catch(e => {});
                audioUnlocked = true;
            }
        }
        function playClick() {
            document.getElementById('clickSnd').play();
        }
    </script>
</body>
</html>
