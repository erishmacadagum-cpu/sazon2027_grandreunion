<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* FIX: ENSURE OVERLAY IS ON TOP AND CLICKABLE */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999999; /* Ultra high priority */
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: opacity 1s, visibility 1s; 
        }
        .tap-box { 
            padding: 25px 50px; border: 1px solid var(--sazon-gold); 
            letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; 
            text-align: center; background: rgba(197, 160, 89, 0.1);
            pointer-events: none; /* Let the click pass through to the overlay */
        }

        /* NAVIGATION */
        #main-nav { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(197, 160, 89, 0.2); box-sizing: border-box; transform: translateY(-100%); transition: 1s ease-out; }
        #main-nav.active { transform: translateY(0); }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; margin-left: 30px; opacity: 0.7; }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.7), transparent 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 20s ease-out; }
        .bg-active { transform: scale(1.1); }

        /* "SOON" TITLE */
        .soon-container { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(20px); transition: 3s 0.5s; }
        .active-ui.soon-container { opacity: 1; transform: translateY(0); }
        .gold-letter { font-family: 'Playfair Display', serif; font-size: clamp(3.2rem, 15vw, 10rem); background: linear-gradient(135deg, #fff 20%, var(--sazon-gold) 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: shine 6s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .logo-circle-o { width: clamp(2.8rem, 12vw, 8.5rem); height: clamp(2.8rem, 12vw, 8.5rem); margin: 0 8px; border-radius: 50%; overflow: hidden; border: 1.5px solid rgba(197, 160, 89, 0.6); position: relative; }
        .logo-circle-o img { width: 100%; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* SECTIONS */
        .section { padding: 100px 20px; text-align: center; background: #fff; color: var(--sazon-navy); position: relative; z-index: 10; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-item { position: relative; overflow: hidden; height: 300px; background: #111; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-label { position: absolute; bottom: 0; width: 100%; background: rgba(0, 26, 77, 0.8); color: #fff; padding: 10px; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; box-sizing: border-box; }

        /* TIMER BOX */
        .timer-wrapper { position: relative; z-index: 10; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); padding: 20px 40px; margin-top: 30px; opacity: 0; transition: 2s 2s; }
        .timer-container { display: flex; gap: 15px; align-items: center; }
        .timer-val { font-size: 2rem; font-family: 'Playfair Display', serif; color: var(--sazon-gold); font-weight: 700; }
        .timer-label { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff; padding: 18px 45px; text-decoration: none; font-weight: 700; letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase; margin-top: 40px; }
