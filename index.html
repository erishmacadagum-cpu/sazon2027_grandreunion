<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --glow: rgba(197, 160, 89, 0.6); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* THE GATE - REMOVABLE LAYER */
        #gate-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000000; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .enter-btn { 
            padding: 20px 50px; border: 2px solid var(--gold); color: var(--gold); 
            font-family: 'Cinzel'; text-transform: uppercase; letter-spacing: 8px;
            box-shadow: 0 0 25px var(--glow); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* CINEMATIC CREDITS */
        #credits-stage { 
            position: fixed; inset: 0; background: #000; z-index: 999999; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        .credit-line { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1.5s ease; margin: 10px 0; }
        .names { font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 700; text-shadow: 0 0 35px var(--glow); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* MAIN REVEAL */
        #main-hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 3s; 
        }

        /* TRANSFORMATION: SAZON TO SOON */
        .brand-text { display: flex; align-items: center; font-family: 'Cinzel'; font-size: clamp(3rem, 12vw, 9rem); color: var(--gold); font-weight: 700; }
        .vanish { transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1); display: inline-block; overflow: hidden; }
        .vanish.hide { opacity: 0; width: 0; transform: scale(0); margin: 0; }

        /* THE MOON O WITH LOGO INTEGRATION */
        .moon-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-180deg); 
            transition: 2s cubic-bezier(0.17, 0.89, 0.32, 1.28); 
            border-radius: 50%; border: 3px solid var(--gold);
            background: url('Screenshot 2026-05-04 at 12.07.49 AM.png') center/cover !important;
            box-shadow: 0 0 50px var(--glow); display: flex; align-items: center; justify-content: center;
        }
        .moon-o.show { width: clamp(3.5rem, 14vw, 9.5rem); height: clamp(3.5rem, 14vw, 9.5rem); opacity: 1; transform: scale(1) rotate(0deg); margin: 0 15px; }
        
        /* THE FAMILY TREE LOGO */
        .moon-o img { width: 85%; height: auto; z-index: 10; position: relative; filter: drop-shadow(0 0 12px #000); }

        .year-tag { font-family: 'Cinzel'; font-size: 1.5rem; color: var(--gold); transition: 1.2s; margin-top: -10px; }
        .year-tag.hide { opacity: 0; transform: translateY(-40px); }

        /* COUNTDOWN BOXES */
        .timer { display: flex; gap: 15px; margin-top: 45px; opacity: 0; transition: 2s; }
        .timer.show { opacity: 1; }
        .t-box { border: 1px solid var(--gold); padding: 15px; background: rgba(0,0,0,0.85); min-width: 85px; text-align: center; backdrop-filter: blur(5px); }
        .t-num { display: block; font-size: 2.2rem; color: var(--gold); font-weight: 700; }
        .t-lab { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <audio id="audio-open" src="audio/open.mp3" preload="auto"></audio>
    <audio id="audio-shimmer" src="audio/shimmer.mp3" preload="auto"></audio>
    <audio id="audio-jingle" src="audio/jingle.mp3" loop preload="auto"></audio>

    <div id="gate-overlay" onclick="launchExperience()">
        <div class="enter-btn">Enter Sazon Legacy</div>
    </div>

    <div id="credits-stage">
        <div class="credit-line" id="l1">A Sazon Family Production</div>
        <div class="credit-line" id="l2" style="font-size:0.9rem; opacity:0.8;">In Honor of the 13 Branches</div>
        <div class="credit-line names" id="l3">Tereso & Teofista Sazon</div>
        <div class="credit-line" id="l4">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="main-hero">
        <div class="brand-text">
            <span>S</span>
            <span class="vanish" id="a">A</span>
            <span class="vanish" id="z">Z</span>
            <div class="moon-o" id="moon"><img src="logo.png"></div>
            <span>O</span>
            <span>N</span>
        </div>
        <div class="year-tag" id="year">2027</div>
        
        <div class="timer" id="countdown">
            <div class="t-box"><span class="t-num" id="days">00</span><span class="t-lab">Days</span></div>
            <div class="t-box"><span class="t-num" id="hours">00</span><span class="t-lab">Hrs</span></div>
            <div class="t-box"><span class="t-num" id="mins">00</span><span class="t-lab">Min</span></div>
        </div>
    </main>

    <script>
        function launchExperience() {
            document.getElementById('audio-open').play();
            const gate = document.getElementById('gate-overlay');
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.remove(); 
                document.getElementById('credits-stage').style.display = 'flex';
                startCredits();
            }, 800);
        }

        function startCredits() {
            setTimeout(() => document.getElementById('l1').classList.add('reveal'), 500);
            setTimeout(() => document.getElementById('l2').classList.add('reveal'), 1800);
            
            // SYNC: Shimmer on Names
            setTimeout(() => {
                document.getElementById('audio-shimmer').play();
                document.getElementById('l3').classList.add('reveal');
            }, 3200); 

            setTimeout(() => document.getElementById('l4').classList.add('reveal'), 4800);

            // Transition to Hero
            setTimeout(() => {
                document.getElementById('credits-stage').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('credits-stage').style.display = 'none';
                    const hero = document.getElementById('main-hero');
                    hero.style.display = 'flex';
                    document.getElementById('audio-jingle').play();
                    
                    setTimeout(() => {
                        hero.style.opacity = '1';
                        // THE LEGWORK TRANSFORMATION
                        setTimeout(transformToSoon, 3500);
                    }, 100);
                }, 1000);
            }, 8500);
        }

        function transformToSoon() {
            document.getElementById('a').classList.add('hide');
            document.getElementById('z').classList.add('hide');
            document.getElementById('year').classList.add('hide');
            
            setTimeout(() => {
                document.getElementById('moon').classList.add('show');
                setTimeout(() => {
                    document.getElementById('countdown').classList.add('show');
                }, 1200);
            }, 600);
        }

        function updateClock() {
            const diff = new Date("July 23, 2027 00:00:00") - new Date();
            if(diff < 0) return;
            document.getElementById('days').innerText = Math.floor(diff/86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
