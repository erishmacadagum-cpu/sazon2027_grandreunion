<script>
    let isPlaying = false;
    const jingle = document.getElementById('familyJingle');

    function toggleJingle() {
        if (!isPlaying) {
            jingle.play().catch(e => console.log("Jingle blocked"));
            document.getElementById('jingleStatus').innerText = "Playing...";
            isPlaying = true;
        } else {
            jingle.pause();
            document.getElementById('jingleStatus').innerText = "The Jingle";
            isPlaying = false;
        }
    }

    // THE CRITICAL FIX: INSTANT REVEAL
    function launchHub() {
        // 1. Hide the overlay immediately
        const overlay = document.getElementById('overlay');
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 800);
        
        // 2. Try to play the opening sound (but don't stop if it fails)
        const sfx = document.getElementById('openSfx');
        sfx.play().catch(e => console.log("SFX blocked by browser - moving on..."));
        
        // 3. Trigger all animations
        document.getElementById('bg').classList.add('bg-zoom-active');
        document.getElementById('mainLogo').classList.add('logo-active');
        document.getElementById('credits').style.opacity = '1';
        document.getElementById('timer').classList.add('timer-active');
    }

    // ... (Keep the Timer Logic from before) ...
</script>
