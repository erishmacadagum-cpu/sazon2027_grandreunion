<style>
    /* This pushes the text down to clear your artwork */
    .hero-banner {
        position: relative;
        height: 85vh;
        background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('images/banner.jpg') center/cover no-repeat;
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* Pushes content to the bottom */
        align-items: center;
        padding-bottom: 50px;
        box-sizing: border-box;
    }

    .header-content h2 {
        font-family: 'Playfair Display', serif;
        color: white;
        font-size: clamp(2.5rem, 8vw, 5.5rem);
        margin: 0;
        /* Stronger shadow so white text is readable against the tree */
        text-shadow: 0 4px 15px rgba(0,0,0,0.9); 
        letter-spacing: 5px;
        font-weight: 700;
    }

    .countdown-wrap {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 20px 40px;
        border-radius: 100px;
        border: 1px solid rgba(255,255,255,0.3);
        display: flex;
        gap: 30px;
        margin-top: 15px;
    }
</style>

<div class="hero-banner">
    <div class="header-content">
        <h2>SAZON 2027</h2>
        <div class="countdown-wrap">
            <div class="time-box"><span id="days" class="time-val">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span id="hours" class="time-val">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span id="mins" class="time-val">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span id="secs" class="time-val">00</span><span class="time-label">Secs</span></div>
        </div>
    </div>
</div>
