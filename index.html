<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* CEREMONIAL ENTRANCE */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; }
        .tap-box { padding: 30px 60px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.8rem; text-align: center; }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 40px 0; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.5), transparent 40%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 15s ease-out; }
        .bg-active { transform: scale(1.1); }

        /* THE "SOON" CONSTRUCTOR */
        .soon-container { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 3s 0.5s; }
        .active-ui.soon-container { opacity: 1; }

        .gold-letter { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 15vw, 9rem); background: linear-gradient(180deg, #fff 40%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }

        /* TURNING THE RECTANGLE LOGO INTO A ROUND "O" */
        .logo-circle-o {
            width: clamp(3.5rem, 13vw, 8rem);
            height: clamp(3.5rem, 13vw, 8rem);
            margin: 0 10px;
            border-radius: 50%; /* This creates the circle */
            overflow: hidden;   /* This crops the rectangle */
            border: 2px solid var(--sazon-gold);
            box-shadow: 0 0 30px var(--sazon-gold);
            position: relative;
            background: #000;
        }
        .logo-circle-o img {
            width: 100%;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* TIMER & TAGLINE */
        .tagline { color: var(--sazon-gold); letter-spacing: 12px; text-transform: uppercase; font-size: 0.7rem; font-weight: 600; margin: 20px 0; opacity: 0; transition: 2s 1.5s; z-index: 10; }
        .timer-container { display: flex; gap: 15px; opacity: 0; transition: 2s 2.2s; z-index: 10; }
        .timer-box { text-align: center; min-width: 60px; }
        .timer-val { display: block; font-size: 1.8rem; font-weight: 600; color: #fff; font-family: 'Playfair Display', serif; }
        .timer-label { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }

        /* FOOTER CREDITS */
        .credits-bar { position: absolute; bottom: 40px; width: 90%; display: flex; justify-content: space-between; opacity: 0; transition: 2s 2.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; z-index: 10; }

        /* REGISTRATION */
        .ticket-section { background: #fdfdfd; padding: 100px 20px; text-align: center; color: var(--sazon-navy); }
        .ticket-container { max-width: 850px; margin: 0 auto; background: #fffdf5; border: 2px solid var(--sazon-gold); padding: 60px 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.15); }
        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff !important; padding: 22px 60px; text-decoration: none !important; font-weight: 700; letter-spacing: 5px; margin-top: 30px; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">SAZON GRAND FAMILY REUNION 2027<br><br><span style="font-size:0.6rem; letter-spacing:4px;">TAP TO ENTER</span></div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        
        <div class="soon-container" id="soon-ui">
            <span class="gold-letter">S</span>
            <span class="gold-letter">O</span>
            <div class="logo-circle-o">
                <img src="images/logo.png" alt="Sazon Logo">
            </div>
            <span class="gold-letter">N</span>
        </div>

        <p class="tagline" id="tag-ui">Gikan sa gamut, tubtob sa langit</p>

        <div class="timer-container" id="timer-ui">
            <div class="timer-box"><span class="timer-val" id="days">00</span><span class="timer-label">Days</span></div>
            <div class="timer-box"><span class="timer-val" id="hours">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-box"><span class="timer-val" id="mins">00</span><span class="timer-label">Min</span></div>
            <div class="timer-box"><span class="timer-val" id="secs">00</span><span class="timer-label">Sec</span></div>
        </div>

        <div class="credits-bar" id="credits-ui">
            <div style="font-size:0.6rem; letter-spacing:3px;">A SAZON PRODUCTION</div>
            <div style="font-size:0.6rem; letter-spacing:3px; text-align:right;">JULY 23-24, 2027<br>KALIBO, AKLAN</div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:2.5rem; margin:0;">The Golden Ticket</h2>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=sharing" target="_blank" class="btn-gold">SECURE YOUR SPOT →</a>
        </div>
    </div>

    <audio id="sfx" src="audio/open.mp3"></audio>

    <script>
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();

        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1200);
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('soon-ui').classList.add('active-ui');
            setTimeout(() => { document.getElementById('tag-ui').style.opacity = '1'; }, 1000);
            setTimeout(() => { document.getElementById('timer-ui').style.opacity = '1'; }, 1800);
            setTimeout(() => { document.getElementById('credits-ui').style.opacity = '1'; }, 2500);
            document.getElementById('sfx').play().catch(e => {});
        }
    </script>
</body>
</html>
