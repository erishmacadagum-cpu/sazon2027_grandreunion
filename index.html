<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Salvo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Initial Black Screen */
        #hype-trigger { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 10000; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: opacity 2s; }
        #trigger-btn { padding: 15px 40px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; letter-spacing: 5px; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.8rem; }
        #trigger-btn:hover { background: var(--gold); color: black; }

        /* Montage Background */
        .bg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,8,20,0.9), rgba(0,8,20,0.4), rgba(0,8,20,0.95)),
                        url('images/memories.jpg') no-repeat center center; 
            background-size: cover;
            filter: grayscale(100%) blur(12px); /* High Mystery Blur */
            z-index: 1;
            opacity: 0;
            transition: opacity 3s, filter 30s ease;
        }

        /* Content Layer */
        .content { 
            position: relative; z-index: 10; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; 
            display: none; /* Revealed by JS */
        }

        #battlecry-box { 
            max-width: 80%; font-family: 'Prata', serif; font-size: clamp(1.2rem, 4vw, 2rem); 
            color: #f0f0f0; line-height: 1.4; font-style: italic; 
            min-height: 100px; transition: opacity 1.5s ease-in-out; opacity: 0;
        }

        /* Countdown Style */
        #timer { display: flex; gap: 15px; margin-bottom: 50px; opacity: 0.8; }
        .time-block { text-align: center; border-bottom: 1px solid var(--gold); padding: 10px; min-width: 60px; }
        .time-num { display: block; font-size: 1.8rem; font-weight: 200; color: var(--gold); }
        .time-label { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; }

        /* The Final Payoff Button */
        #enter-heritage { 
            display: none; opacity: 0; transition: opacity 2s; 
            margin-top: 20px; padding: 18px 50px; border: 1px solid var(--luminous-blue); 
            background: transparent; color: var(--luminous-blue); text-decoration: none; 
            font-weight: 600; letter-spacing: 5px; animation: pulseBlue 2s infinite; 
        }
        
        @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.55rem; letter-spacing: 3px; color: rgba(255,255,255,0.3); z-index: 10; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="hype-trigger">
        <button id="trigger-btn">Hear the Call of Legacy</button>
    </div>

    <div class="bg-overlay" id="bg"></div>
    
    <div class="content" id="salvo-content">
        <div id="timer">
            <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>

        <div id="battlecry-box"></div>

        <a href="branches.html" id="enter-heritage">ENTER THE HERITAGE</a>
    </div>

    <footer>Marzon Hotel Kalibo - Aklan | #SAZON2027GRANDREUNION</footer>

    <script>
        const jingle = new Audio('audio/teaze_jingle.mp3'); 
        const messages = [
            "We have missed HOME.",
            "We have missed FAMILY.",
            "The 18-year wait is ending.",
            "The Legacy begins now."
        ];

        const trigger = document.getElementById('hype-trigger');
        const bg = document.getElementById('bg');
        const content = document.getElementById('salvo-content');
        const box = document.getElementById('battlecry-box');
        const enterBtn = document.getElementById('enter-heritage');

        document.getElementById('trigger-btn').onclick = function() {
            trigger.style.opacity = '0';
            setTimeout(() => trigger.style.display = 'none', 2000);
            
            // Start Visuals & Audio
            bg.style.opacity = '1';
            bg.style.filter = 'grayscale(100%) blur(18px)'; // Intensify blur during jingle
            content.style.display = 'flex';
            jingle.play();

            // Run Text Sequence
            runBattlecry();

            // At 30 Seconds: Transition to Black & Show Button
            setTimeout(() => {
                bg.style.opacity = '0'; // Fade to black
                box.style.display = 'none';
                enterBtn.style.display = 'inline-block';
                setTimeout(() => enterBtn.style.opacity = '1', 100);
            }, 30000);
        };

        async function runBattlecry() {
            for (let msg of messages) {
                box.innerText = msg;
                box.style.opacity = '1';
                await new Promise(r => setTimeout(r, 6000));
                box.style.opacity = '0';
                await new Promise(r => setTimeout(r, 1500));
            }
        }

        // Timer Logic
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const distance = targetDate - new Date().getTime();
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
