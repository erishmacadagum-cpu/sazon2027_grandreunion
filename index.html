<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sazon-navy: #001a4d; 
            --sazon-gold: #c5a059; /* More refined, muted gold */
            --white-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; }

        /* CINEMATIC STAGE */
        .stage {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
        }

        /* DYNAMIC BACKGROUND ARCHITECTURE */
        .cinematic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(0,26,77,0.9), rgba(0,26,77,0.2) 50%, #000 100%),
                url('images/banner.jpg') center/cover no-repeat;
            animation: slowPanZoom 30s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 1;
        }

        /* OPENING CREDITS SYSTEM */
        .credits-wrapper {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 4vh;
        }

        .side-credit {
            width: 25%;
            opacity: 0;
            animation: revealSide 2.5s forwards 1.2s;
        }

        .center-brand {
            text-align: center;
            opacity: 0;
            animation: scaleReveal 2s forwards;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 9vw, 6.5rem);
            margin: 0;
            line-height: 1;
            background: linear-gradient(180deg, #ffffff 30%, var(--sazon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7));
        }

        .sub-branding {
            letter-spacing: 18px;
            text-transform: uppercase;
            font-weight: 200;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.7);
        }

        /* MASTERCLASS TIMER PLACEMENT */
        .timer-anchor {
            position: relative;
            z-index: 10;
            margin-bottom: 10vh; /* Lowered for professional impact */
            display: flex;
            gap: 25px;
            opacity: 0;
            animation: revealUp 2s forwards 2.2s;
        }

        .timer-card {
            background: var(--white-glass);
            backdrop-filter: blur(25px);
            padding: 30px 40px;
            border-radius: 2px; /* Geometric sophistication */
            border-left: 1px solid var(--sazon-gold);
            border-top: 1px solid var(--border-glass);
            text-align: center;
            min-width: 100px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .t-num { display: block; font-family: 'Playfair Display'; font-size: 3.8rem; font-weight: 700; color: #fff; }
        .t-lab { font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; color: var(--sazon-gold); margin-top: 5px; display: block; }

        /* ANIMATIONS */
        @keyframes slowPanZoom { from { transform: scale(1.0); } to { transform: scale(1.12); } }
        @keyframes scaleReveal { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes revealSide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes revealUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* THE HUB DASHBOARD */
        .hub-section { background: #fff; padding: 120px 0; color: var(--sazon-navy); }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .hub-btn { 
            padding: 60px 40px; border: 1px solid #f0f0f0; border-radius: 0; /* Modern architectural feel */
            text-decoration: none; color: inherit; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            text-align: center; position: relative; overflow: hidden;
        }
        .hub-btn:hover { background: var(--sazon-navy); color: #fff; transform: translateY(-10px); }
        .hub-btn h4 { font-family: 'Playfair Display'; font-size: 1.8rem; margin: 0 0 10px 0; }
        .hub-btn p { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
    </style>
</head>
<body onclick="engageCinema()">

    <audio id="bgSweep" src="audio/magical-sweep.mp3"></audio>

    <div class="stage">
        <div class="cinematic-bg"></div>

        <div class="credits-wrapper">
            <div class="side-credit" style="text-align: left;">
                <img src="images/logo.png" style="width: 80px; filter: brightness(0) invert(1); margin-bottom: 15px;">
                <p style="font-size: 0.65rem; letter-spacing: 4px; line-height: 2;">A SAZON FAMILY<br>TRADITION CONTINUES</p>
            </div>

            <div class="center-brand">
                <span class="sub-branding">First Grand Reunion</span>
                <h1 class="main-title">SAZON 2027</h1>
                <p style="color: var(--sazon-gold); letter-spacing: 8px; font-weight: 400; font-size: 0.9rem; margin-top: 15px;">GIKAN SA GAMUT, TUBTOB SA LANGIT</p>
            </div>

            <div class="side-credit" style="text-align: right;">
                <p style="font-size: 0.65rem; letter-spacing: 4px; margin-bottom: 5px;">DESTINATION</p>
                <p style="font-family: 'Playfair Display'; font-size: 1.4rem; font-weight: 700; color: #fff;">MARZON HOTEL<br><span style="color: var(--sazon-gold); font-family: 'Montserrat'; font-size: 0.7rem; font-weight: 400; letter-spacing: 3px;">KALIBO, AKLAN</span></p>
            </div>
        </div>

        <div class="timer-anchor">
            <div class="timer-card"><span id="d" class="t-num">00</span><span class="t-lab">Days</span></div>
            <div class="timer-card"><span id="h" class="t-num">00</span><span class="t-lab">Hours</span></div>
            <div class="timer-card"><span id="m" class="t-num">00</span><span class="t-lab">Mins</span></div>
            <div class="timer-card"><span id="s" class="t-num">00</span><span class="t-lab">Secs</span></div>
        </div>
    </div>

    <div class="hub-section">
        <div class="hub-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="hub-btn">
                <h4>Registration</h4>
                <p>Join the Gathering</p>
            </a>
            <div class="hub-btn" style="cursor:pointer;" onclick="alert('Playing Anthem...')">
                <h4>The Anthem</h4>
                <p>Roots & Aspirations</p>
            </div>
            <a href="#" class="hub-btn">
                <h4>Resource Hub</h4>
                <p>Digital Archive</p>
            </a>
        </div>
    </div>

    <script>
        function engageCinema() {
            const a = document.getElementById('bgSweep');
            a.volume = 0.4;
            a.play();
        }

        const target = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = target - now;
            document.getElementById('d').innerText = Math.floor(gap / 86400000);
            document.getElementById('h').innerText = Math.floor((gap % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((gap % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((gap % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
