<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Sazon 2027 | The Clarion Call</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --navy: #000814; --luminous-blue: #00e5ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: manipulation; }

        #hype-trigger { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 10000; background: #000; display: flex; justify-content: center; align-items: center; }
        #trigger-btn { padding: 15px 35px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; letter-spacing: 4px; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }

        .bg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,8,20,0.9), rgba(0,8,20,0.3), rgba(0,8,20,0.95)), url('images/memories.jpg') no-repeat center center; 
            background-size: cover; filter: grayscale(100%) blur(5px); z-index: 1; opacity: 0; transition: opacity 4s ease; 
        }

        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; box-sizing: border-box; }
        
        #battlecry-box { width: 100%; margin-top: 20px; min-height: 120px; display: flex; align-items: center; justify-content: center; perspective: 1200px; }

        /* Fixed Animation: Forwards ensures it stays at the end state, no repetition */
        @keyframes breath {
            0% { transform: scale(0.8) translateZ(-100px); letter-spacing: 2px; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scale(1.1) translateZ(150px); letter-spacing: 12px; opacity: 0; }
        }

        .cinematic-text { display: block; animation: breath 5.5s ease-in-out forwards; text-transform: uppercase; line-height: 1.4; width: 100%; }

        .font-nostalgia { font-family: 'Prata', serif; font-style: italic; font-weight: 200; font-size: clamp(1.4rem, 5vw, 2.5rem); }
        .font-legacy { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold); font-size: clamp(1.1rem, 4vw, 2.2rem); }
        .font-sazon { font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 10px; color: white; font-size: clamp(1.8rem, 7vw, 3.5rem); }

        #timer { display: flex; gap: 8px; width: 100%; justify-content: center; transition: opacity 2s; opacity: 0; margin-bottom: 10px; }
        .time-block { text-align: center; border-bottom: 2px solid var(--gold); padding: 4px; min-width: 55px; }
        .time-num { display: block; font-size: clamp(1.5rem, 6vw, 2.5rem); font-weight: 600; color: var(--gold); }
        .time-label { font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; }

        #final-reveal-box { display: none; width: 100%; }
        .reveal-line { opacity: 0; transition: opacity 2s ease; margin: 15px 0; }
        
        .btn-link { 
            display: inline-block; padding: 14px 30px; border: 1px solid var(--luminous-blue); 
            background: transparent; color: var(--luminous-blue); text-decoration: none; 
            letter-spacing: 3px; text-transform: uppercase; font-size: 0.7rem; margin-top: 10px;
        }

        #calendar-link { display: block; margin-top: 15px; color: var(--gold); text-decoration: none; font-size: 0.6rem; letter-spacing: 2px; border-bottom: 1px solid rgba(212, 175, 55, 0.4); padding-bottom: 4px; width: fit-content; margin-left: auto; margin-right: auto; }

        footer { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 0.55rem; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); z-index: 10; }
    </style>
</head>
<body>

    <div id="hype-trigger"><button id="trigger-btn">The Clarion Call of Legacy</button></div>
    <div class="bg-overlay" id="bg"></div>
    
    <div class="content" id="salvo-content">
        <div id="timer">
            <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>

        <div id="battlecry-box"></div>

        <div id="final-reveal-box">
            <div class="reveal-line font-sazon" id="line-sazon" style="opacity: 0;">WE ARE SAZON</div>
            <div class="reveal-line font-nostalgia" id="line-kalibo" style="opacity: 0; font-size: 1.3rem; color: var(--luminous-blue);">See you in Kalibo!</div>
            <div class="reveal-line" id="links-reveal" style="opacity: 0;">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=dialog" class="btn-link" target="_blank">Register Now</a>
                <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=SAZON+2027+GRAND+FAMILY+REUNION&dates=20270723T000000Z/20270725T000000Z&details=Gikan+sa+Gamut,+Tubtob+sa+Langit.&location=Marzon+Hotel+Kalibo,+Aklan&sf=true&output=xml" id="calendar-link" target="_blank">📅 Add to Calendar</a>
            </div>
        </div>
    </div>

    <footer>Marzon Hotel Kalibo | #SAZON2027GRANDREUNION</footer>

    <script>
        const teaserAudio = new Audio('audio/teaser_jingle.mp3'); 
        const messages = [
            { text: "We have missed HOME.", class: "font-nostalgia" },
            { text: "We have missed FAMILY.", class: "font-nostalgia" },
            { text: "The time has come...", class: "font-legacy" },
            { text: "To honor the Legacy.", class: "font-legacy" }
        ];

        const trigger = document.getElementById('hype-trigger');
        const bg = document.getElementById('bg');
        const box = document.getElementById('battlecry-box');
        const timer = document.getElementById('timer');
        const finalBox = document.getElementById('final-reveal-box');

        function playHeartbeat() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const strike = (time) => {
                const osc = context.createOscillator(); const gain = context.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(45, time);
                gain.gain.setValueAtTime(0.7, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
                osc.connect(gain); gain.connect(context.destination); osc.start(time); osc.stop(time + 0.6);
            };
            // 5 Heartbeats Logic
            for(let i=0; i<5; i++) { strike(context.currentTime + (i * 0.9)); }
        }

        document.getElementById('trigger-btn').onclick = function() {
            playHeartbeat();
            trigger.style.opacity = '0';
            setTimeout(() => { 
                trigger.style.display = 'none'; 
                bg.style.opacity = '1';
                teaserAudio.play();
                runBattlecry();
            }, 1000);
        };

        async function runBattlecry() {
            for (let msg of messages) {
                // CLEAR the box entirely first to prevent mobile double-rendering
                box.innerHTML = '';
                await new Promise(r => setTimeout(r, 50)); 
                box.innerHTML = `<span class="cinematic-text ${msg.class}">${msg.text}</span>`;
                await new Promise(r => setTimeout(r, 5500)); 
            }
            
            box.style.display = 'none';
            timer.style.opacity = '1';
            finalBox.style.display = 'block';

            // Seamless Final Reveal
            setTimeout(() => { document.getElementById('line-sazon').style.opacity = '1'; }, 400);
            setTimeout(() => { document.getElementById('line-kalibo').style.opacity = '1'; }, 2000);
            setTimeout(() => { document.getElementById('links-reveal').style.opacity = '1'; }, 3800);
        }

        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const distance = targetDate - new Date().getTime();
            if (distance < 0) { timer.innerHTML = "WELCOME HOME"; return; }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
