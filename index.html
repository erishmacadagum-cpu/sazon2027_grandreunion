<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Master Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sazon-navy: #002366; 
            --sazon-gold: #D4AF37;
            --glass-card: rgba(255, 255, 255, 0.98);
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fdfdfd; color: var(--sazon-navy); overflow-x: hidden; }

        /* THE CINEMATIC HERO */
        .hero {
            position: relative;
            height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
            background: #000;
        }

        /* Using your screenshot art with a cinematic zoom effect */
        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(0,35,102,0.8) 0%, rgba(0,35,102,0.2) 50%, #fdfdfd 100%),
                url('images/banner.jpg') center/cover no-repeat;
            animation: slowZoom 20s infinite alternate;
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; animation: fadeIn 2s ease-in; }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 12vw, 7rem);
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, var(--sazon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .hero p {
            font-size: 1.1rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 15px;
            opacity: 0.9;
        }

        /* MASTER GLASS CONTAINER */
        .master-hub {
            max-width: 1100px;
            margin: -100px auto 100px;
            background: var(--glass-card);
            padding: 80px 40px;
            border-radius: 40px;
            box-shadow: 0 60px 120px rgba(0,35,102,0.15);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .nav-card {
            padding: 50px 30px;
            border: 1px solid #f0f0f0;
            border-radius: 25px;
            text-decoration: none;
            color: var(--sazon-navy);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
        }
        .nav-card:hover {
            background: var(--sazon-navy);
            color: white;
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,35,102,0.2);
        }

        /* TIMER BLOCKS */
        .timer-row { display: flex; gap: 20px; margin-top: 40px; }
        .timer-unit {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 80px;
        }
        .timer-val { display: block; font-family: 'Playfair Display'; font-size: 3rem; font-weight: 700; }

        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <p>Sazon Clan Presents</p>
            <h1>SAZON 2027</h1>
            <p>Gikan sa Gamut, Tubtob sa Langit</p>
            
            <div class="timer-row">
                <div class="timer-unit"><span id="d" class="timer-val">00</span><span>Days</span></div>
                <div class="timer-unit"><span id="h" class="timer-val">00</span><span>Hours</span></div>
                <div class="timer-unit"><span id="m" class="timer-val">00</span><span>Mins</span></div>
                <div class="timer-unit"><span id="s" class="timer-val">00</span><span>Secs</span></div>
            </div>
        </div>
    </div>

    <div class="master-hub">
        <span style="letter-spacing: 5px; color: var(--sazon-gold); font-weight: 600;">THE OFFICIAL RESOURCE CENTER</span>
        
        <div class="nav-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="nav-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem;">REGISTRATION</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">Secure your spot at Marzon Hotel</p>
            </a>
            <div class="nav-card" style="cursor:pointer;" onclick="alert('Playing Reunion Jingle...')">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem;">FAMILY ANTHEM</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">Listen to the Sazon Jingle</p>
            </div>
            <a href="#" class="nav-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem;">DIGITAL HUB</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">Maps, Logistics & Apparel</p>
            </a>
        </div>
    </div>

    <script>
        const target = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = target - now;
            document.getElementById('d').innerText = Math.floor(gap / 86400000);
            document.getElementById('h').innerText = Math.floor((gap % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((gap % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((gap % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
