/* Update this specific part in your <style> section */

.logo-o { 
    width: 0; 
    height: 0; 
    opacity: 0; 
    transform: scale(0) rotate(-20deg); /* Starts tilted like a rising moon */
    transition: all 1.8s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy, celestial entrance */
    border-radius: 50%; 
    background: #fff; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden;
    box-shadow: 0 0 0px var(--sazon-gold); /* Starts with no glow */
}

.logo-o.show { 
    width: clamp(3rem, 12vw, 8rem); 
    height: clamp(3rem, 12vw, 8rem); 
    opacity: 1; 
    transform: scale(1) rotate(0deg); /* Snaps into perfect alignment */
    margin: 0 15px; 
    border: 2px solid var(--sazon-gold);
    box-shadow: 0 0 30px rgba(197,160,89,0.5); /* The "Celestial" Glow */
}
