<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Legacy 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --deep-gold: #b8860b;
            --soft-gold: #f3e5ab; 
            --black: #000000; 
            --glow: rgba(212, 175, 55, 0.5); 
        }
        body, html { margin: 0; padding: 0; background-color: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* Gate Screen */
        #gate-screen { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1.5s ease; }
        .enter-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 18px 50px; font-family: 'Cinzel', serif; font-size: 1.1rem; cursor: pointer; letter-spacing: 6px; text-transform: uppercase; transition: 0.5s; box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2); }
        .enter-btn:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 40px var(--gold); }

        /* Main Stage */
        #main-stage { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        #final-banner { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('images/banner.jpg'); background-size: cover; background-position: center; opacity: 0; transition: opacity 5s ease; }

        /* Opening Credits - Refined Elegance */
        .credit { font-family: 'Cinzel', serif; font-size: clamp(1.4rem, 6vw, 2.4rem); letter-spacing: 14px; color: var(--gold); opacity: 0; position: absolute; width: 100%; transition: all 2s ease-in-out; z-index: 10; text-shadow: 0 0 25px var(--glow); transform: translateY(30px); }
        .sub-header { font-family: 'Montserrat', sans-serif; font-weight: 200; font-size: 0.8rem; letter-spacing: 10px; color: var(--soft-gold); display: block; margin-top: 15px; text-transform: uppercase; opacity: 0.8; }

        /* The SOON Interface - Precisely Curated Proportions */
        #soon-wrap { display: none; flex-direction: column; align-items: center; z-index: 20; opacity: 0; transition: opacity 3s ease; width: 100%; }
        .soon-text { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(5rem, 22vw, 12rem); 
            font-weight: 700; 
            color: var(--gold); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            letter-spacing: 0.1em;
            margin-bottom: -10px; /* Brings countdown closer for better grouping */
        }
        
        /* Celestial Moon/Sun Logo "O" */
        .celestial-container { 
            position: relative; 
            width: 1.1em; 
            height: 1.1em; 
            margin: 0 0.1em; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .celestial-halo { 
            position: absolute; 
            inset: -5%; 
            border: 2px solid var(--gold); 
            border-radius: 50%; 
            opacity: 0.6; 
            animation: rotateHalo 15s linear infinite;
            box-shadow: 0 0 20px var(--glow);
        }
        .logo-tree { 
            width: 85%; 
            height: 85%; 
            border-radius: 50%; 
            object-fit: cover; 
            z-index: 2; 
            border: 1px solid var(--soft-gold);
            filter: brightness(1.1) contrast(1.1);
        }

        /* Countdown Grid */
        #countdown { 
            display: flex; 
            gap: clamp(15px, 4vw, 40px); 
            opacity: 0; 
            transition: opacity 2s ease; 
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        .timer-unit { display: flex; flex-direction: column; min-width: 80px; }
        .timer-num { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--soft-gold); text-shadow: 0 0 15px var(--gold); font-weight: 700; }
        .timer-label { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); opacity: 0.9; margin-top: 5px; }

        /* Animations */
        .visible { opacity: 1 !important; transform: translateY(0) !important; }
        .exit { opacity: 0 !important; transform: translateY(-40px) !important; }
        .jive-pulse { animation: rhythmicJive 0.6s infinite alternate ease-in-out; }

        @keyframes rotateHalo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rhythmicJive { 
            from { transform: scale(1); text-shadow: 0 0 20px var(--glow); } 
            to { transform: scale(1.02); text-shadow: 0 0 40px var(--gold); } 
        }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div style="color:var(--gold); font-family:'Cinzel'; letter-spacing:5px; margin-bottom:20px; font-size:0.8rem;">EST. 2027</div>
        <button class="enter-btn" id="gateButton">ENTER SAZON LEGACY</button>
    </div>

    <audio id="snd-click" src="audio/click.mp3"></audio>
    <audio id="snd-open" src="audio/open.mp3"></audio>
    <audio id="snd-shimmer" src="audio/shimmer.mp3"></audio>
    <audio id="snd-jingle" src="audio/Gikan_sa_Gamot%2030secTEASER.mp3"></audio>

    <div id="main-stage">
        <div id="final-banner"></div>
        
        <div id="t1" class="credit">A SAZON FAMILY PRODUCTION<span class="sub-header">LEGACY IN MOTION</span></div>
        <div id="t2" class="credit">IN HONOR OF<span class="sub-header">TERESO & TEOFISTA SAZON</span></div>
        <div id="t3" class="credit">JULY 23-24, 2027<span class="sub-header">MARZON HOTEL • KALIBO, AKLAN</span></div>

        <div id="soon-wrap">
            <div class="soon-text" id="jiveTarget">
                <span>S</span>
                <div class="celestial-container">
                    <div class="celestial-halo"></div>
                    <img src="images/logo.jpg" class="logo-tree" alt="O">
                </div>
                <span>ON</span>
            </div>

            <div id="countdown">
                <div class="timer-unit"><span class="timer-num" id="days">000</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-num" id="hours">00</span><span class="timer-label">Hours</span></div>
                <div class="timer-unit"><span class="timer-num" id="mins">00</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-num" id="secs">00</span><span class="timer-label">Secs</span></div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('gateButton');
        const aud = {
            click: document.getElementById('snd-click'),
            open: document.getElementById('snd-open'),
            shim: document.getElementById('snd-shimmer'),
            jingle: document.getElementById('snd-jingle')
        };

        btn.addEventListener('click', () => {
            Object.values(aud).forEach(s => { s.play(); s.pause(); s.currentTime = 0; });
            aud.click.play();
            document.getElementById('gate-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                runExperience();
            }, 1500);
        });

        function runExperience() {
            aud.open.play();
            animateText('t1', 4000);

            setTimeout(() => {
                aud.shim.play();
                animateText('t2', 4000);
            }, 5000);

            setTimeout(() => animateText('t3', 4000), 10000);

            setTimeout(() => {
                document.getElementById('final-banner').classList.add('visible');
                const soonWrap = document.getElementById('soon-wrap');
                soonWrap.style.display = 'flex';
                
                setTimeout(() => {
                    soonWrap.classList.add('visible');
                    document.getElementById('jiveTarget').classList.add('jive-pulse');
                    document.getElementById('countdown').classList.add('visible');
                    startCountdown();
                }, 100);

                aud.jingle.volume = 0.1;
                aud.jingle.play();
                let v = 0.1;
                let ramp = setInterval(() => {
                    if (v < 0.7) { v += 0.05; aud.jingle.volume = v; }
                    else clearInterval(ramp);
                }, 400);
            }, 15000);
        }

        function animateText(id, delay) {
            const el = document.getElementById(id);
            el.classList.add('visible');
            setTimeout(() => el.classList.add('exit'), delay);
        }

        function startCountdown() {
            const target = new Date("July 23, 2027 00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const d = target - now;
                document.getElementById('days').innerText = Math.floor(d / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((d % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((d % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((d % 60000) / 1000).toString().padStart(2, '0');
            }, 1000);
        }
    </script>
</body>
</html>
