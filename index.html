<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* CINEMATIC STAGE - LOADS IMMEDIATELY */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; overflow: hidden; padding: 60px 0; box-sizing: border-box; }
        
        /* BACKGROUND AUTO-ANIMATES ON LOAD */
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.5), transparent 40%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; animation: slowZoom 20s ease-out forwards; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.15); } }
        
        /* LOGO AUTO-ANIMATES */
        .logo-anchor { position: relative; z-index: 20; opacity: 0; animation: fadeUp 2s 0.5s forwards; }
        .logo-img { width: 160px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        
        /* CELESTIAL FLARE */
        .logo-anchor::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(197, 160, 89, 0.25) 0%, transparent 70%); opacity: 0; animation: pulseLight 4s 1.5s forwards; pointer-events: none; }
        
        /* TEXT AUTO-ANIMATES */
        .hero-center { position: relative; z-index: 10; text-align: center; opacity: 0; animation: fadeUp 2s 1s forwards; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 7.5rem); margin: 0; background: linear-gradient(180deg, #fff 50%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* CREDITS AUTO-ANIMATE */
        .credits-bar { position: relative; z-index: 10; width: 90%; max-width: 1400px; display: flex; justify-content: space-between; align-items: flex-end; opacity: 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; animation: fadeUp 2s 2s forwards; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseLight { from { opacity: 0; } to { opacity: 1; } }

        /* THE REGISTRATION BOX */
        .ticket-section { background: #fdfdfd; padding: 120px 20px; text-align: center; color: var(--sazon-navy); }
        .ticket-container { max-width: 850px; margin: 0 auto; background: #fffdf5; border: 2px solid var(--sazon-gold); padding: 80px 40px; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.15); }
        
        .qr-frame { width: 220px; height: 220px; margin: 30px auto; background: #fff; padding: 15px; border: 1px solid #eee; display: block; }
        .qr-frame img { width: 100%; height: 100%; border: 0; }
        
        .btn-legacy { 
            display: inline-block; 
            background: var(--sazon-navy); 
            color: #fff !important; 
            padding: 22px 60px; 
            text-decoration: none !important; 
            font-weight: 700; 
            letter-spacing: 5px; 
            margin-top: 40px; 
            font-size: 0.9rem; 
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-legacy:hover { background: var(--sazon-gold); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="stage">
        <div class="cinematic-bg"></div>
        <div class="logo-anchor"><img src="images/logo.png" class="logo-img"></div>
        <div class="hero-center">
            <h1 class="main-title">SAZON 2027</h1>
            <p style="color:var(--sazon-gold); letter-spacing:12px; font-weight:600; text-transform:uppercase; font-size:0.9rem;">Gikan sa gamut, tubtob sa langit</p>
        </div>
        <div class="credits-bar">
            <div style="font-size:0.75rem; letter-spacing:4px; font-weight:600;">A SAZON PRODUCTION<br><span style="color:var(--sazon-gold)">FAMILY HERITAGE HUB</span></div>
            <div style="font-size:0.75rem; letter-spacing:4px; text-align:right; font-weight:600;">JULY 23-24, 2027<br><span style="color:var(--sazon-gold)">MARZON HOTEL, KALIBO</span></div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:3.5rem; margin:0;">The Golden Ticket</h2>
            
            <a href="https://tinyurl.com/SazonGrandReunion" target="_blank" class="qr-frame">
                <img src="images/qr-code.png">
            </a>

            <p style="font-size:1.2rem; font-weight:600; color:var(--sazon-gold); letter-spacing: 2px;">tinyurl.com/SazonGrandReunion</p>
            
            <a href="https://tinyurl.com/SazonGrandReunion" target="_blank" class="btn-legacy">
                SECURE YOUR SPOT →
            </a>
        </div>
    </div>

</body>
</html>
