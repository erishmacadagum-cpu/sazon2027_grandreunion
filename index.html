<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Salvo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
            --sepia: rgba(212, 175, 55, 0.15);
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Dramatic Background */
        .bg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,8,20,0.8), rgba(0,8,20,0.4), rgba(0,8,20,0.9)),
                        url('images/old-family-roots.jpg') no-repeat center center; 
            background-size: cover;
            filter: grayscale(100%) sepia(20%);
            z-index: 1;
            animation: slowZoom 30s infinite alternate;
        }
        
        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Content Reveal */
        .content { 
            position: relative; z-index: 10; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; 
            opacity: 0; animation: fadeInPage 4s forwards;
        }

        @keyframes fadeInPage { to { opacity: 1; } }

        h2 { font-weight: 200; letter-spacing: 12px; margin-bottom: 5px; font-size: 0.9rem; color: var(--gold); }
        h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(2.5rem, 7vw, 5rem); margin: 0; letter-spacing: 10px; }
        
        .inaugural-msg { 
            max-width: 600px; font-family: 'Prata', serif; font-size: 1.1rem; 
            margin: 20px 0; color: #c0c0c0; line-height: 1.6; font-style: italic;
        }

        /* Countdown Timer */
        #timer { 
            display: flex; gap: 20px; margin: 30px 0; font-family: 'Montserrat', sans-serif;
        }
        .time-block { text-align: center; border: 1px solid rgba(212, 175, 55, 0.3); padding: 15px; min-width: 80px; border-radius: 5px; background: rgba(0,0,0,0.4); }
        .time-num { display: block; font-size: 2rem; font-weight: 600; color: var(--gold); }
        .time-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: white; }

        .location-line { font-weight: 400; letter-spacing: 4px; font-size: 0.8rem; margin-top: 20px; color: var(--gold); }

        /* The Button */
        .cta-btn { 
            margin-top: 50px; padding: 18px 50px; 
            border: 1px solid var(--luminous-blue); background: transparent; 
            color: var(--luminous-blue); text-decoration: none; 
            font-weight: 600; letter-spacing: 5px; transition: 0.5s; 
            animation: pulseBlue 2s infinite; 
        }
        .cta-btn:hover { background: var(--luminous-blue); color: var(--navy); }

        @keyframes pulseBlue { 
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } 
        }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 3px; color: rgba(255,255,255,0.3); z-index: 10; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="content">
        <h2>THE INAUGURAL SALVO</h2>
        <h1>SAZON 2027</h1>
        
        <p class="inaugural-msg">
            "Before the branches touch the sky, we honor the strength of the roots that hold us together."
        </p>

        <div id="timer">
            <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>
        
        <div class="location-line">MARZON HOTEL KALIBO - AKLAN</div>

        <a href="branches.html" class="cta-btn">ENTER THE HERITAGE</a>
    </div>

    <footer>
        GIKAN SA GAMUT, TUBTOB SA LANGIT | #SAZON2027GRANDREUNION
    </footer>

    <script>
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("mins").innerText = mins.toString().padStart(2, '0');
            document.getElementById("secs").innerText = secs.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "THE REUNION IS HERE";
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
