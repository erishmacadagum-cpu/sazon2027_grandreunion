<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Grand Reunion 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000000; }
        body, html { margin: 0; padding: 0; background-color: var(--black); color: white; font-family: 'Raleway', sans-serif; overflow: hidden; height: 100vh; }

        #gate-screen { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; }
        .tap-text { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 4px; margin-bottom: 20px; font-size: 0.8rem; }
        .enter-btn { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 15px 40px; font-family: 'Cinzel', serif; font-size: 1.2rem; cursor: pointer; letter-spacing: 5px; text-transform: uppercase; transition: 0.5s; }
        .enter-btn:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 30px var(--gold); }

        #main-stage { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        #final-banner { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('images/banner.jpg'); background-size: cover; background-position: center; opacity: 0; transition: opacity 3s ease; }

        .credit { font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 6px; color: var(--gold); opacity: 0; position: absolute; width: 100%; transition: opacity 1.5s ease; z-index: 10; }
        
        #soon-wrap { display: none; flex-direction: column; align-items: center; z-index: 20; opacity: 0; transition: opacity 3s ease; }
        .soon-text { font-family: 'Cinzel', serif; font-size: clamp(4rem, 15vw, 8rem); font-weight: 700; color: var(--gold); display: flex; align-items: center; letter-spacing: 12px; }
        .celestial-o { width: clamp(65px, 13vw, 130px); height: clamp(65px, 13vw, 130px); margin: 0 10px; border-radius: 50%; box-shadow: 0 0 40px var(--gold); object-fit: cover; }

        .visible { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="tap-text">TAP THE SCREEN</div>
        <button class="enter-btn" id="gateButton">ENTER SAZON LEGACY</button>
    </div>

    <audio id="snd-click" preload="auto" src="audio/click.mp3"></audio>
    <audio id="snd-open" preload="auto" src="audio/open.mp3"></audio>
    <audio id="snd-shimmer" preload="auto" src="audio/shimmer.mp3"></audio>
    <audio id="snd-jingle" preload="auto" src="audio/Sazon_Jingle.mp3"></audio>

    <div id="main-stage">
        <div id="final-banner"></div>
        <div id="t1" class="credit">A SAZON FAMILY PRODUCTION</div>
        <div id="t2" class="credit">IN HONOR OF TERESO & TEOFISTA SAZON</div>
        <div id="t3" class="credit">JULY 23-24, 2027<br><span style="font-size: 0.9rem;">KALIBO, AKLAN</span></div>

        <div id="soon-wrap">
            <div class="soon-text">
                <span>S</span>
                <img src="images/logo.jpg" class="celestial-o" alt="O">
                <span>ON</span>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('gateButton');
        const aClick = document.getElementById('snd-click');
        const aOpen = document.getElementById('snd-open');
        const aShim = document.getElementById('snd-shimmer');
        const aJingle = document.getElementById('snd-jingle');

        btn.addEventListener('click', function() {
            // Master Audio Unlock
            [aClick, aOpen, aShim, aJingle].forEach(track => {
                track.play().then(() => { track.pause(); track.currentTime = 0; }).catch(e => console.log("Unlock"));
            });

            aClick.play();

            document.getElementById('gate-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                runCinematic();
            }, 1000);
        });

        function runCinematic() {
            // 0s: Production + Open
            aOpen.play();
            document.getElementById('t1').classList.add('visible');

            // 5s: Tribute + Shimmer
            setTimeout(() => {
                document.getElementById('t1').classList.remove('visible');
                aShim.play();
                document.getElementById('t2').classList.add('visible');
            }, 5000);

            // 10s: Location
            setTimeout(() => {
                document.getElementById('t2').classList.remove('visible');
                document.getElementById('t3').classList.add('visible');
            }, 10000);

            // 15s: 30-Second Jingle + SOON Reveal
            setTimeout(() => {
                document.getElementById('t3').classList.remove('visible');
                document.getElementById('final-banner').classList.add('visible');
                
                const soon = document.getElementById('soon-wrap');
                soon.style.display = 'flex';
                setTimeout(() => soon.classList.add('visible'), 100);

                aJingle.volume = 0.1;
                aJingle.play();
                let v = 0.1;
                let ramp = setInterval(() => {
                    if (v < 0.6) { v += 0.05; aJingle.volume = v; }
                    else { clearInterval(ramp); }
                }, 400);
            }, 15000);
        }
    </script>
</body>
</html>
