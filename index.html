<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Reunion 2026</title>
    <style>
        body { font-family: Arial, sans-serif; }
        header, nav, section, footer { padding: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Family Reunion 2026!</h1>
        <img src="banner.jpg" alt="Family Reunion Banner" />
    </header>
    
    <nav>
        <ul>
            <li><a href="#event-details">Event Details</a></li>
            <li><a href="#registration">Register</a></li>
            <li><a href="#admin-dashboard">Admin Dashboard</a></li>
        </ul>
    </nav>
    
    <section id="event-details">
        <h2>Event Details</h2>
        <p>Date: April 29, 2026</p>
        <p>Location: Family Park</p>
    </section>
    
    <section id="registration">
        <h2>Registration Form</h2>
        <form>
            <input type="text" placeholder="Your Name" required />
            <input type="email" placeholder="Your Email" required />
            <input type="submit" value="Register" />
        </form>
        <div id="qrcode"></div>
    </section>
    
    <section id="admin-dashboard">
        <h2>Admin Dashboard</h2>
        <p>Admin functionality will be added later.</p>
    </section>
    
    <audio controls>
        <source src="jingle.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <script>
        document.getElementById('qrcode').innerText = "QR Code Functionality TBD";
    </script>
    
    <footer>
        <p>&copy; 2026 Family Reunion. All Rights Reserved.</p>
    </footer>
</body>
</html>
