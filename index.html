<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAZON 2027 | The Grand Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; }
        
        /* THE HUB OVERLAY */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.2s; }
        .tap-box { padding: 30px 60px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.8rem; }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; overflow: hidden; padding: 60px 0; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.5), transparent 40%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 15s ease-out; }
        .bg-active { transform: scale(1.1); }
        
        .logo-anchor { position: relative; z-index: 20; opacity: 0; transform: translateY(-30px); transition: 3s; }
        .logo-img { width: 160px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }

        /* CELESTIAL EFFECT */
        .logo-anchor::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(197, 160, 89, 0.2) 0%, transparent 70%); opacity: 0; transition: 5s 1s; }
        .active-ui.logo-anchor::after { opacity: 1; }

        .hero-center { position: relative; z-index: 10; text-align: center; opacity: 0; transition: 2.5s 0.5s; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 7rem); margin: 0; background: linear-gradient(180deg, #fff 50%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* AUTOMATED CREDITS */
        .credits-bar { position: relative; z-index: 10; width: 90%; max-width: 1400px; display: flex; justify-content: space-between; align-items: flex-end; opacity: 0; transition: 2.5s 1.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .active-ui { opacity: 1 !important; transform: translateY(0) !important; }

        /* THE REGISTRATION BOX - REDESIGNED FOR PRECISION */
        .ticket-section { background: #fdfdfd; padding: 120px 20px; text-align: center; }
        .ticket-container { max-width: 850px; margin: 0 auto; background: #fffdf5; border: 2px solid var(--sazon-gold); padding: 80px 40px; color: var(--sazon-navy); position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.15); }
        
        .qr-frame { width: 220px; height: 220px; margin: 30px auto; background: #fff; padding: 15px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .qr-frame:hover { transform: scale(1.05); border-color: var(--sazon-gold); }
        
        /* THE "SUCCESS PULSE" BUTTON */
        .btn-final { 
            display: inline-block; 
            background: var(--sazon-navy); 
            color: #fff; 
            padding: 22px 60px; 
            text-decoration: none; 
            font-weight: 700; 
            letter-spacing: 5px; 
            margin-top: 40px; 
            border: none; 
            font-size: 0.9rem; 
            cursor: pointer; 
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .btn-final:active { background: #00ca4e; transform: scale(0.95); } /* Changes to Green on tap to show it worked! */
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">Tap to Begin the Experience</div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        <div class="logo-anchor" id="logo-ui"><img src="images/logo.png" class="logo-img"></div>
        <div class="hero-center" id="title-ui">
            <h1 class="main-title">SAZON 2027</h1>
            <p style="color:var(--sazon-gold); letter-spacing:12px; text-transform:uppercase; font-size:0.9rem;">Gikan sa gamut, tubtob sa langit</p>
        </div>
        <div class="credits-bar" id="credits-ui">
            <div style="font-size:0.75rem; letter-spacing:4px;">A SAZON PRODUCTION</div>
            <div style="font-size:0.75rem; letter-spacing:4px; text-align:right;">JULY 23-24, 2027<br>MARZON HOTEL, KALIBO</div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:3.5rem; margin:0;">The Golden Ticket</h2>
            <div class="qr-frame" onclick="forceOpen()">
                <img src="images/qr-code.png" style="width:100%">
            </div>
            <p style="font-size:1.2rem; font-weight:600; color:var(--sazon-gold);">tinyurl.com/SazonGrandReunion</p>
            
            <button type="button" onclick="forceOpen()" class="btn-final" id="gateBtn">SECURE YOUR SPOT →</button>
        </div>
    </div>

    <audio id="sfx" src="audio/open.mp3"></audio>

    <script>
        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1200);
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('logo-ui').classList.add('active-ui');
            document.getElementById('title-ui').classList.add('active-ui');
            document.getElementById('credits-ui').classList.add('active-ui');
            document.getElementById('sfx').play().catch(e => {});
        }

        // THE REDUNDANT "FORCE-OPEN" LOGIC
        function forceOpen() {
            const url = "https://tinyurl.com/SazonGrandReunion";
            
            // Step 1: Visual feedback
            const btn = document.getElementById('gateBtn');
            btn.innerText = "OPENING FORM...";
            btn.style.background = "#c5a059"; 

            // Step 2: Try standard open
            const newWindow = window.open(url, '_blank');

            // Step 3: Fallback if popup is blocked
            if(!newWindow || newWindow.closed || typeof newWindow.closed=='undefined') { 
                window.location.href = url; 
            }
        }
    </script>
</body>
</html>
