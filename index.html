<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
        .brand-text, .credits { font-family: 'Cinzel', serif; letter-spacing: 4px; }

        /* GATEKEEPER */
        #unlock-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .tap-btn { padding: 15px 45px; border: 1px solid var(--sazon-gold); color: var(--sazon-gold); text-transform: uppercase; letter-spacing: 6px; animation: breathe 3s infinite; }
        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* INTRO CREDITS */
        #intro-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .credits { color: var(--sazon-gold); opacity: 0; transform: translateY(15px); transition: 1.2s ease; margin: 10px 0; }
        .credit-large { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; text-shadow: 0 0 20px rgba(197,160,89,0.5); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* HERO MAIN */
        #hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 2.5s ease-in-out; 
        }

        /* SAZON -> SOON ENGINE */
        .brand-text { display: flex; align-items: center; font-size: clamp(3.5rem, 15vw, 10rem); color: var(--sazon-gold); font-weight: 700; }
        .az { transition: all 1.2s cubic-bezier(0.6, -0.28, 0.7, 1); display: inline-block; overflow: hidden; }
        .az.hide { opacity: 0; width: 0; transform: scaleX(0); margin: 0; }
        
        /* CELESTIAL MOON O (With Logo inside) */
        .moon-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-180deg); 
            transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 3px solid var(--sazon-gold); position: relative;
        }
        .moon-o::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 25px rgba(197,160,89,0.9); border-radius: 50%; }
        .moon-o.show { 
            width: clamp(3.5rem, 14vw, 9.5rem); height: clamp(3.5rem, 14vw, 9.5rem); 
            opacity: 1; transform: scale(1) rotate(0deg); margin: 0 12px; 
            box-shadow: 0 0 50px rgba(197,160,89,0.8), 0 0 20px #fff;
        }
        .moon-o img { width: 80%; height: auto; z-index: 2; filter: drop-shadow(0 0 2px rgba(0,0,0,0.4)); }

        /* TIMER reveal */
        .countdown { display: flex; gap: 20px; margin-top: 50px; opacity: 0; transition: 2s; }
        .countdown.show { opacity: 1; }
        .c-box { background: rgba(0,0,0,0.8); border: 1px solid var(--sazon-gold); padding: 15px; width: 85px; text-align: center; }
        .c-num { font-size: 1.8rem; color: var(--sazon-gold); font-weight: 700; display: block; }
        .c-lab { font-size: 0.5rem; text-transform: uppercase; opacity: 0.8; }
    </style>
</head>
<body>

    <audio id="sfx-shimmer" src="audio/shimmer.mp3" preload="auto"></audio>
    <audio id="sfx-open" src="audio/open.mp3" preload="auto"></audio>
    <audio id="jingle" src="audio/jingle.mp3" loop preload="auto"></audio>

    <div id="unlock-screen" onclick="launchSequence()">
        <div class="tap-btn">Enter Sazon Legacy</div>
    </div>

    <div id="intro-overlay">
        <div class="credits" id="c1" style="font-size:0.7rem;">Sazon Family Production</div>
        <div class="credits" id="c2" style="font-size:0.6rem; margin-top:20px; opacity:0.7;">Honoring the Lineage of</div>
        <div class="credits credit-large" id="c3">Tereso & Teofista Sazon</div>
        <div class="credits" id="c4" style="font-size:0.7rem;">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="hero">
        <div class="brand-text">
            <span>S</span><span class="az" id="la">A</span><span class="az" id="lz">Z</span>
            <div class="moon-o" id="moon"><img src="logo.png"></div>
            <span>O</span><span>N</span>
        </div>
        <div class="countdown" id="timer">
            <div class="c-box"><span class="c-num" id="d">00</span><span class="c-lab">Days</span></div>
            <div class="c-box"><span class="c-num" id="h">00</span><span class="c-lab">Hrs</span></div>
            <div class="c-box"><span class="c-num" id="m">00</span><span class="c-lab">Min</span></div>
            <div class="c-box"><span class="c-num" id="s">00</span><span class="c-lab">Sec</span></div>
        </div>
    </main>

    <script>
        const openS = document.getElementById('sfx-open');
        const shimS = document.getElementById('sfx-shimmer');
        const jingS = document.getElementById('jingle');

        function launchSequence() {
            openS.play();
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('intro-overlay').style.display = 'flex';
            
            // Phase 1: Credits
            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 300);
            setTimeout(() => { 
                document.getElementById('c2').classList.add('reveal'); 
                shimS.play(); 
            }, 1800);
            setTimeout(() => document.getElementById('c3').classList.add('reveal'), 3000);
            setTimeout(() => document.getElementById('c4').classList.add('reveal'), 4500);

            // Phase 2: Shift to Hero
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    const h = document.getElementById('hero');
                    h.style.display = 'flex';
                    jingS.play();
                    setTimeout(() => {
                        h.style.opacity = '1';
                        // Phase 3: SAZON -> SOON
                        setTimeout(transform, 2000);
                    }, 100);
                }, 1200);
            }, 7500);
        }

        function transform() {
            document.getElementById('la').classList.add('hide');
            document.getElementById('lz').classList.add('hide');
            setTimeout(() => {
                document.getElementById('moon').classList.add('show');
                setTimeout(() => document.getElementById('timer').classList.add('show'), 1000);
            }, 400);
        }

        function clock() {
            const diff = new Date("July 23, 2027 00:00:00") - new Date();
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2,'0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }
        setInterval(clock, 1000);
    </script>
</body>
</html>
