<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | SOON</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --white-glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; cursor: pointer; line-height: 1.6; }
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.92), rgba(0,26,77,0.4) 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 25s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .bg-zoom-active { transform: scale(1.15); }
        
        /* THE SOON - INTEGRATED LOGO CONCEPT */
        .soon-container { position: relative; z-index: 20; display: flex; align-items: center; justify-content: center; gap: 20px; opacity: 0; transform: scale(0.9); transition: all 3s cubic-bezier(0.21, 1, 0.36, 1); }
        .soon-active { opacity: 1 !important; transform: scale(1) !important; }
        
        .soon-letter { font-family: 'Playfair Display', serif; font-size: clamp(5rem, 15vw, 12rem); font-weight: 700; background: linear-gradient(180deg, #ffffff 40%, var(--sazon-gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .logo-o { position: relative; width: clamp(120px, 18vw, 220px); height: clamp(120px, 18vw, 220px); border-radius: 50%; padding: 10px; backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: all 2s ease; }
        .logo-img { width: 85%; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
        
        /* DYNAMIC CELESTIAL GLOW */
        .logo-sun { filter: drop-shadow(0 0 40px rgba(255, 200, 50, 0.7)); background: rgba(255, 255, 255, 0.15); }
        .logo-moon { filter: drop-shadow(0 0 40px rgba(200, 230, 255, 0.6)); background: rgba(255, 255, 255, 0.1); }
        
        .info-footer { position: absolute; bottom: 5vh; width: 90%; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; opacity: 0; transition: opacity 2s ease 1.5s; }
        .timer-portal { display: flex; gap: 15px; opacity: 0; transition: all 2s ease-out 2s; transform: translateY(20px); }
        .timer-active { opacity: 1; transform: translateY(0); }
        .timer-unit { background: var(--white-glass); backdrop-filter: blur(20px); padding: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; min-width: 70px; }
        .t-val { display: block; font-family: 'Playfair Display'; font-size: 2rem; font-weight: 700; }
        .t-lbl { font-size: 0.6rem; color: var(--sazon-gold); text-transform: uppercase; letter-spacing: 2px; }

        .hub-section { background: white; padding: 80px 0; color: var(--sazon-navy); }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; padding: 0 25px; }
        .hub-link { padding: 50px 30px; border: 2px solid #f0f0f0; text-decoration: none; color: inherit; text-align: center; transition: 0.5s; display: block; background: #fff; }
        .register-card { border: 2px solid var(--sazon-gold); background: linear-gradient(145deg, #fffcf5, #fff); position: relative; overflow: hidden; }
        .register-card::after { content: 'GOLDEN TICKET'; position: absolute; top: 10px; right: -30px; background: var(--sazon-gold); color: white; padding: 5px 40px; transform: rotate(45deg); font-size: 0.6rem; font-weight: 700; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100; display: flex; justify-content: center; align-items: center; transition: opacity 1.5s; }
    </style>
</head>
<body>
    <div id="overlay" onclick="launchHub()">
        <p style="letter-spacing: 8px; font-weight: 300; font-size: 1rem; text-transform: uppercase; text-align: center; padding: 30px; border: 1px solid var(--sazon-gold); color: white;">Tap to Experience the Legacy</p>
    </div>
    
    <audio id="openSfx" src="audio/open.mp3" preload="auto"></audio>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        
        <div class="soon-container" id="soonBrand">
            <span class="soon-letter">S</span>
            <div class="logo-o" id="logoCircle">
                <img src="images/logo.png" class="logo-img" alt="Sazon Logo">
            </div>
            <span class="soon-letter">N</span>
        </div>

        <div class="info-footer" id="footer">
            <div style="text-align: left;">
                <p style="font-size: 0.8rem; letter-spacing: 4px; color: var(--sazon-gold); margin:0;">THE GRAND REUNION</p>
                <p style="font-family: 'Playfair Display'; font-size: 1.5rem; margin:0;">JULY 23-24, 2027</p>
            </div>
            
            <div class="timer-portal" id="timer">
                <div class="timer-unit"><span id="d" class="t-val">00</span><span class="t-lbl">Days</span></div>
                <div class="timer-unit"><span id="h" class="t-val">00</span><span class="t-lbl">Hrs</span></div>
                <div class="timer-unit"><span id="m" class="t-val">00</span><span class="t-lbl">Mins</span></div>
                <div class="timer-unit"><span id="s" class="t-val">00</span><span class="t-lbl">Secs</span></div>
            </div>

            <div style="text-align: right;">
                <p style="font-size: 0.8rem; letter-spacing: 4px; color: var(--sazon-gold); margin:0;">MARZON HOTEL</p>
                <p style="font-family: 'Playfair Display'; font-size: 1.5rem; margin:0;">KALIBO, AKLAN</p>
            </div>
        </div>
    </div>
    
    <div class="hub-section" style="background: #fdfdfd;">
        <div style="text-align:center; margin-bottom: 40px; padding: 0 20px;">
            <h2 style="font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 10px;">Wall of Generations</h2>
            <p style="letter-spacing: 2px; color: var(--sazon-gold); font-size: 1.1rem; font-weight: 600; text-transform: uppercase;">Email photos to: maemiliapalma@yahoo.com</p>
        </div>
        <div class="hub-grid">
            <div style="background: #f0f0f0; height: 350px;"></div>
            <div style="background: #e8e8e8; height: 350px;"></div>
            <div style="background: #f0f0f0; height: 350px;"></div>
        </div>
    </div>

    <div class="hub-section">
        <div class="hub-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="hub-link register-card">
                <h3>Register</h3>
                <p>Secure your Golden Ticket</p>
            </a>
            <div class="hub-link" style="cursor:pointer;" onclick="alert('The Sazon Anthem is coming soon!')">
                <h3>The Anthem</h3>
                <p>Listen to our roots</p>
            </div>
            <a href="#" class="hub-link"><h3>Resources</h3><p>Schedules & Info</p></a>
        </div>
    </div>

    <script>
        function launchHub() {
            const hour = new Date().getHours();
            const logoBox = document.getElementById('logoCircle');
            logoBox.className = (hour >= 6 && hour < 18) ? 'logo-o logo-sun' : 'logo-o logo-moon';

            const audio = document.getElementById('openSfx');
            audio.volume = 0.5;
            audio.play().catch(e => {});

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 1500);
            
            document.getElementById('bg').classList.add('bg-zoom-active');
            document.getElementById('soonBrand').classList.add('soon-active');
            document.getElementById('footer').style.opacity = '1';
            document.getElementById('timer').classList.add('timer-active');
        }

        const targetDate = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) return;
            document.getElementById('d').innerText = Math.floor(distance / 86400000);
            document.getElementById('h').innerText = Math.floor((distance % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((distance % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((distance % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
