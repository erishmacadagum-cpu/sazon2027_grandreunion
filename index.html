<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --glow: rgba(197, 160, 89, 0.6); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }
        
        /* THE GATE - NO MISSING THIS */
        #gate { 
            position: fixed; inset: 0; background: #000; z-index: 1000000; /* Highest possible */
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn { 
            padding: 25px 60px; border: 3px solid var(--gold); color: var(--gold); 
            font-family: 'Cinzel'; letter-spacing: 8px; font-size: 1.2rem;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

        /* INTRO OVERLAY */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .credit { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1.5s; margin: 12px 0; }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* THE MAIN STAGE */
        #main { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('banner.jpg') center/cover;
            opacity: 0; transition: 2.5s ease-in-out; 
        }

        /* SAZON TO SOON */
        .brand { display: flex; align-items: center; font-family: 'Cinzel'; font-size: clamp(3rem, 12vw, 9rem); color: var(--gold); font-weight: 700; }
        .hide-letter { transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); display: inline-block; width: auto; opacity: 1; }
        .hide-letter.active { width: 0; opacity: 0; margin: 0; transform: scale(0); }

        /* THE MOON O - LOGO INSIDE */
        .moon-o { 
            width: 0; height: 0; opacity: 0; 
            transition: 2s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            border-radius: 50%; border: 3px solid var(--gold);
            background: url('Screenshot 2026-05-04 at 12.07.49 AM.png') center/cover; 
            display: flex; align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 50px var(--glow);
        }
        .moon-o.active { width: clamp(4rem, 14vw, 10rem); height: clamp(4rem, 14vw, 10rem); opacity: 1; margin: 0 15px; }
        .moon-o img { width: 80%; height: auto; z-index: 10; filter: drop-shadow(0 0 8px #000); }

        .timer { display: flex; gap: 20px; margin-top: 40px; opacity: 0; transition: 2s; }
        .timer.active { opacity: 1; }
        .box { border: 1px solid var(--gold); padding: 15px; min-width: 80px; text-align: center; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <div id="gate" onclick="startShow()">
        <div class="btn">ENTER LEGACY</div>
    </div>

    <div id="intro">
        <div class="credit" id="c1">A Sazon Family Production</div>
        <div class="credit" id="c2" style="font-size: 0.9rem;">Honoring the 13 Branches</div>
        <div class="credit" id="c3" style="font-size: clamp(1.5rem, 5vw, 3rem); font-weight: bold;">Tereso & Teofista Sazon</div>
        <div class="credit" id="c4">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="main">
        <div class="brand">
            <span>S</span>
            <span class="hide-letter">A</span>
            <span class="hide-letter">Z</span>
            <div class="moon-o"><img src="logo.png"></div>
            <span>O</span>
            <span>N</span>
        </div>
        <div class="timer">
            <div class="box"><span id="d">00</span><br><small>DAYS</small></div>
            <div class="box"><span id="h">00</span><br><small>HRS</small></div>
            <div class="box"><span id="m">00</span><br><small>MIN</small></div>
        </div>
    </main>

    <script>
        function startShow() {
            // Remove Gate instantly
            document.getElementById('gate').style.display = 'none';
            document.getElementById('intro').style.display = 'flex';
            
            // Try to play audio if available, but don't let it stop the show
            const audioFiles = ['openS', 'shim', 'jingle'];
            audioFiles.forEach(id => {
                const a = document.getElementById(id);
                if(a) a.play().catch(() => {}); 
            });

            // Credits Sequence
            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 500);
            setTimeout(() => document.getElementById('c2').classList.add('reveal'), 1800);
            setTimeout(() => document.getElementById('c3').classList.add('reveal'), 3200);
            setTimeout(() => document.getElementById('c4').classList.add('reveal'), 4800);

            // Transition to Main
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro').style.display = 'none';
                    const main = document.getElementById('main');
                    main.style.display = 'flex';
                    setTimeout(() => {
                        main.style.opacity = '1';
                        // The SAZON to SOON transformation
                        setTimeout(() => {
                            document.querySelectorAll('.hide-letter').forEach(el => el.classList.add('active'));
                            document.querySelector('.moon-o').classList.add('active');
                            setTimeout(() => document.querySelector('.timer').classList.add('active'), 1200);
                        }, 3500);
                    }, 100);
                }, 1000);
            }, 8000);
        }

        function countdown() {
            const diff = new Date("July 23, 2027") - new Date();
            if (diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
        }
        setInterval(countdown, 1000);
    </script>

    <audio id="openS" src="audio/open.mp3"></audio>
    <audio id="shim" src="audio/shimmer.mp3"></audio>
    <audio id="jingle" src="audio/jingle.mp3" loop></audio>

</body>
</html>
