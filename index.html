<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #001b3a; 
            --luminous-blue: #00e5ff; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Video/Image Background */
        .bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        .bg-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: brightness(0.8); }

        /* Content Overlay */
        .overlay { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: rgba(0, 27, 58, 0.4); padding: 20px; }

        h2 { font-weight: 200; letter-spacing: 8px; margin-bottom: 10px; font-size: clamp(0.8rem, 2vw, 1.2rem); text-transform: uppercase; color: var(--gold); }
        h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(2rem, 8vw, 5rem); margin: 0; letter-spacing: 5px; color: white; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .tagline { font-family: 'Prata', serif; font-size: clamp(1rem, 3vw, 1.8rem); margin-top: 10px; color: #7fffd4; font-style: italic; }
        
        .event-details { margin-top: 40px; font-weight: 400; letter-spacing: 3px; font-size: clamp(0.7rem, 1.5vw, 1rem); border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 15px 30px; }

        /* Button Styling */
        .cta-btn { margin-top: 50px; padding: 15px 40px; border: 2px solid var(--luminous-blue); background: transparent; color: var(--luminous-blue); text-decoration: none; font-weight: 600; letter-spacing: 4px; transition: 0.4s; animation: pulseBlue 2s infinite; }
        .cta-btn:hover { background: var(--luminous-blue); color: var(--navy); box-shadow: 0 0 30px var(--luminous-blue); }

        @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }

        footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); z-index: 10; }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="images/heritage-banner.jpg" alt="Sazon Heritage">
    </div>

    <div class="overlay">
        <h2>Save the Date</h2>
        <h1>SAZON 2027</h1>
        <div class="tagline">"Gikan sa Gamut, Tubtob sa Langit"</div>
        
        <div class="event-details">
            JULY 23 - 24, 2027 • MARZON HOTEL KALIBO - AKLAN
        </div>

        <a href="branches.html" class="cta-btn">EXPLORE THE BRANCHES</a>
    </div>

    <footer>
        © 2027 SAZON FAMILY PRODUCTION | #SAZON2027GRANDREUNION
    </footer>

</body>
</html>
