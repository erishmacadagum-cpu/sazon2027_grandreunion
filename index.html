<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* CEREMONIAL ENTRANCE */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; }
        .tap-box { padding: 25px 50px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; text-align: center; background: rgba(197, 160, 89, 0.05); }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 20px; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.6), transparent 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 20s ease-out; }
        .bg-active { transform: scale(1.15); }

        /* THE "SOON" GLOSSY TITLE */
        .soon-container { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(20px); transition: 3s 0.5s; }
        .active-ui.soon-container { opacity: 1; transform: translateY(0); }

        .gold-letter { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(3.8rem, 18vw, 10rem); 
            background: linear-gradient(135deg, #fff 20%, var(--sazon-gold) 50%, #fff 80%);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            line-height: 1;
            animation: shine 6s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* THE CELESTIAL LOGO "O" - CIRCULAR CROP & PULSE */
        .logo-circle-o {
            width: clamp(3.2rem, 15vw, 8.5rem);
            height: clamp(3.2rem, 15vw, 8.5rem);
            margin: 0 8px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.5px solid rgba(197, 160, 89, 0.6);
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.4);
            position: relative;
            background: #000;
            animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(197, 160, 89, 0.6); transform: scale(1.02); }
        }

        .logo-circle-o img { width: 100%; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* TEXTUAL ELEMENTS */
        .tagline { color: var(--sazon-gold); letter-spacing: clamp(6px, 3vw, 12px); text-transform: uppercase; font-size: 0.65rem; font-weight: 600; margin: 25px 0; opacity: 0; transition: 2s 1.5s; z-index: 10; text-align: center; }
        
        .timer-container { display: flex; gap: clamp(10px, 4vw, 20px); opacity: 0; transition: 2s 2.2s; z-index: 10; }
        .timer-box { text-align: center; min-width: 60px; }
        .timer-val { display: block; font-size: clamp(1.5rem, 6vw, 2.2rem); font-weight: 600; color: #fff; font-family: 'Playfair Display', serif; }
        .timer-label { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }

        /* REGISTRATION AREA */
        .ticket-section { background: #fff; padding: 100px 20px; text-align: center; color: var(--sazon-navy); }
        .ticket-container { max-width: 800px; margin: 0 auto; background: #fffdf5; border: 1px solid var(--sazon-gold); padding: 50px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border-radius: 4px; }
        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff !important; padding: 20px 50px; text-decoration: none !important; font-weight: 700; letter-spacing: 4px; margin-top: 30px; font-size: 0.75rem; text-transform: uppercase; transition: 0.4s; border-radius: 2px; }
        .btn-gold:hover { background: var(--sazon-gold); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* FOOTER */
        .credits-bar { position: absolute; bottom: 30px; width: 90%; display: flex; justify-content: space-between; opacity: 0; transition: 2s 2.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; z-index: 10; }
        @media (max-width: 600px) { .credits-bar { flex-direction: column; text-align: center; gap: 10px; align-items: center; } }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">SAZON 2027<br><br><span style="font-size:0.5rem; letter-spacing:4px; opacity:0.8;">THE LEGACY AWAITS</span></div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        
        <div class="soon-container" id="soon-ui">
            <span class="gold-letter">S</span>
            <span class="gold-letter">O</span>
            <div class="logo-circle-o">
                <img src="images/logo.png" alt="Sazon Logo">
            </div>
            <span class="gold-letter">N</span>
        </div>

        <p class="tagline" id="tag-ui">Gikan sa gamut, tubtob sa langit</p>

        <div class="timer-container" id="timer-ui">
            <div class="timer-box"><span class="timer-val" id="days">00</span><span class="timer-label">Days</span></div>
            <div class="timer-box"><span class="timer-val" id="hours">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-box"><span class="timer-val" id="mins">00</span><span class="timer-label">Min</span></div>
            <div class="timer-box"><span class="timer-val" id="secs">00</span><span class="timer-label">Sec</span></div>
        </div>

        <div class="credits-bar" id="credits-ui">
            <div style="font-size:0.55rem; letter-spacing:3px;">A SAZON PRODUCTION</div>
            <div style="font-size:0.55rem; letter-spacing:3px; text-align:right;">JULY 23-24, 2027<br>MARZON HOTEL, KALIBO</div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:2.2rem; margin:0; letter-spacing:2px;">The Golden Ticket</h2>
            <p style="text-transform:uppercase; letter-spacing:4px; font-size:0.7rem; color:var(--sazon-gold); margin-top:10px;">Official Guest Registry</p>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=sharing" target="_blank" rel="noopener noreferrer" class="btn-gold">SECURE YOUR SPOT →</a>
        </div>
    </div>

    <audio id="sfx" src="audio/open.mp3"></audio>

    <script>
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();

        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1200);
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('soon-ui').classList.add('active-ui');
            setTimeout(() => { document.getElementById('tag-ui').style.opacity = '1'; }, 1000);
            setTimeout(() => { document.getElementById('timer-ui').style.opacity = '1'; }, 1800);
            setTimeout(() => { document.getElementById('credits-ui').style.opacity = '1'; }, 2500);
            document.getElementById('sfx').play().catch(e => {});
        }
    </script>
</body>
</html>
