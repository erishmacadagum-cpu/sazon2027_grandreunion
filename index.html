<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }
        
        /* THE GATE - FORCED VISIBILITY */
        #gate { 
            position: fixed; inset: 0; background: #000; z-index: 99999; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn { padding: 20px 40px; border: 2px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; letter-spacing: 5px; }

        /* THE INTRO CREDITS */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9998; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .credit { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1s; margin: 10px 0; }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* THE MAIN STAGE */
        #main { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('banner.jpg') center/cover;
            opacity: 0; transition: 2s; 
        }

        /* SAZON TO SOON */
        .brand { display: flex; align-items: center; font-family: 'Cinzel'; font-size: clamp(3rem, 10vw, 8rem); color: var(--gold); }
        .hide-me { transition: 1s; width: auto; opacity: 1; }
        .hide-me.active { width: 0; opacity: 0; overflow: hidden; }

        /* THE MOON O - REBUILT */
        .moon-o { 
            width: 0; height: 0; opacity: 0; margin: 0;
            transition: 1.5s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            border-radius: 50%; border: 2px solid var(--gold);
            background: url('moon.jpg') center/cover; /* RENAME YOUR FILE TO moon.jpg */
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .moon-o.active { width: clamp(4rem, 12vw, 9rem); height: clamp(4rem, 12vw, 9rem); opacity: 1; margin: 0 15px; }
        .moon-o img { width: 80%; height: auto; filter: drop-shadow(0 0 5px #000); }

        .timer { display: flex; gap: 15px; margin-top: 30px; opacity: 0; transition: 1s; }
        .timer.active { opacity: 1; }
        .box { border: 1px solid var(--gold); padding: 10px; min-width: 60px; text-align: center; }
    </style>
</head>
<body>

    <div id="gate" onclick="start()">
        <div class="btn">ENTER LEGACY</div>
    </div>

    <div id="intro">
        <div class="credit" id="c1">Sazon Family Production</div>
        <div class="credit" id="c2" style="font-size: 0.8rem;">Honoring the 13 Branches</div>
        <div class="credit" id="c3" style="font-size: 2rem; font-weight: bold;">Tereso & Teofista Sazon</div>
        <div class="credit" id="c4">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="main">
        <div class="brand">
            <span>S</span><span class="hide-me">A</span><span class="hide-me">Z</span>
            <div class="moon-o"><img src="logo.png"></div>
            <span>O</span><span>N</span>
        </div>
        <div class="timer">
            <div class="box"><span id="days">00</span><br><small>DAYS</small></div>
            <div class="box"><span id="hours">00</span><br><small>HRS</small></div>
            <div class="box"><span id="mins">00</span><br><small>MIN</small></div>
        </div>
    </main>
