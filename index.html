<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f7fa;
            color: #2c3e50;
        }

        /* Banner Section */
        .header {
            height: 65vh;
            background: linear-gradient(rgba(0, 71, 171, 0.5), rgba(0, 71, 171, 0.5)), 
                        url('images/banner.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--champagne-silver);
            padding: 20px;
        }

        .logo {
            max-width: 140px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Countdown Style */
        #timer {
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 20px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }

        .tagline-sub { font-style: italic; font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }

        .container { max-width: 800px; margin: -40px auto 50px; padding: 0 20px; }

        .content-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 6px solid var(--luminous-blue);
        }

        .btn-play {
            background: var(--luminous-blue);
            color: white;
            padding: 18px 35px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 71, 171, 0.3);
            margin-top: 20px;
        }

        .btn-play:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 71, 171, 0.4); }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            #timer { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/logo.png" alt="Sazon Logo" class="logo">
        <h1>🏝️ SAZON 2027 🏝️</h1>
        <p class="tagline-sub">"Gikan sa Gamut, Tubtob sa Langit"</p>
        <div id="timer">Calculating...</div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2 style="color: var(--luminous-blue);">1st Edition Grand Family Reunion</h2>
            <p style="font-size: 1.1rem;">July 22-23, 2027 • Marzon Resort, Kalibo, Aklan</p>
            <hr style="width: 50px; border: 2px solid var(--champagne-silver); margin: 20px auto;">
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Family Jingle</button>
            <p style="font-size: 0.9rem; color: #7f8c8d; margin-top: 15px;">Tap to hear our reunion theme</p>
        </div>
    </div>

    <script>
        // Countdown Logic
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            if (diff < 0) {
                document.getElementById("timer").innerHTML = "THE REUNION HAS BEGUN!";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = d + "d " + h + "h " + m + "m " + s + "s";
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Jingle Logic
        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            
            if (audio.paused) {
                audio.play()
                    .then(() => { btn.innerHTML = "⏸️ Pause Jingle"; })
                    .catch(() => { alert("Please tap the screen first to enable audio."); });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Family Jingle";
            }
        }
    </script>
</body>
</html>
