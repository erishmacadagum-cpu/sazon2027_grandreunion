<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --glass: rgba(255, 255, 255, 0.05); --ticket-bg: #fffdf5; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* THE CRITICAL FIX: Ensure overlay is at the very top, then GONE */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer; 
            transition: opacity 0.8s ease; 
        }
        .tap-box { padding: 25px 50px; border: 1px solid var(--sazon-gold); letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; pointer-events: none; }

        /* HERO STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; overflow: hidden; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.8), transparent 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 20s linear; }
        .bg-active { transform: scale(1.2); }
        
        .logo-anchor { position: absolute; top: 40px; left: 50%; transform: translate(-50%, 20px); z-index: 20; opacity: 0; transition: 2.5s; }
        .logo-img { width: 150px; padding: 15px; border-radius: 50%; backdrop-filter: blur(10px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .active-logo { opacity: 1 !important; transform: translate(-50%, 0) !important; }

        .credits { position: relative; z-index: 10; width: 90%; max-width: 1300px; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 5vh; opacity: 0; transition: 2.5s 0.5s; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 6rem); margin: 0; background: linear-gradient(180deg, #fff 50%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* MOVING WALL */
        .hub-section { background: #fff; padding: 100px 0; color: var(--sazon-navy); overflow: hidden; }
        .marquee-wrapper { display: flex; width: 200%; gap: 30px; animation: scroll 45s linear infinite; margin-top: 50px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .photo-card { width: 350px; height: 500px; background: #eee; position: relative; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .photo-caption { position: absolute; bottom: 0; width: 100%; padding: 30px 20px; background: linear-gradient(to top, var(--sazon-navy), transparent); color: white; box-sizing: border-box; }

        /* ANTHEM SECTION */
        .anthem-section { background: #000c24; padding: 100px 0; text-align: center; color: #fff; border-top: 1px solid rgba(197, 160, 89, 0.2); }
        .lyrics-box { max-width: 800px; margin: 40px auto; padding: 50px; background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.3); font-size: 1.15rem; line-height: 2.2; }
        .play-btn { background: var(--sazon-gold); border: none; color: white; padding: 18px 45px; cursor: pointer; letter-spacing: 4px; font-weight: 600; font-size: 0.8rem; }

        /* TICKET BOX */
        .ticket-container { max-width: 1000px; margin: 80px auto; background: var(--ticket-bg); border: 3px double var(--sazon-gold); padding: 50px; color: var(--sazon-navy); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .qr-frame { width: 200px; height: 200px; margin: 30px auto; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #fff; }
        .qr-frame img { width: 100%; height: 100%; }
        .tiny-url { font-weight: 700; color: var(--sazon-gold); text-decoration: none; font-size: 1.2rem; display: inline-block; margin-top: 15px; }
        .reg-btn { display: inline-block; background: var(--sazon-navy); color: white; padding: 18px 50px; text-decoration: none; font-weight: 600; letter-spacing: 2px; margin-top: 30px; }

        /* MODAL */
        #resModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 8000; backdrop-filter: blur(20px); overflow-y: auto; }
        .res-container { background: white; width: 95%; max-width: 1100px; margin: 2% auto; padding: 60px; color: var(--sazon-navy); border-left: 10px solid var(--sazon-gold); position: relative; }
    </style>
</head>
<body>

        <div class="tap-box">Tap to Begin the Experience</div>
    </div>

    <div class="stage">
