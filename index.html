<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        h1, h2, h3, h4, .gold-letter, .branch-name, .p-name, .nav-links a { font-family: 'Cinzel', serif !important; letter-spacing: 2px; }

        /* ENTRANCE CONTROL & SALVO */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; text-align: center;}
        
        .salvo-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 50px; }
        .credits-text { font-family: 'Cinzel', serif; color: var(--sazon-gold); font-size: clamp(0.7rem, 2vw, 1.2rem); text-transform: uppercase; letter-spacing: 5px; margin: 0; line-height: 1.6; opacity: 0; transform: translateY(15px); transition: opacity 2s, transform 2s; }
        .reveal { opacity: 1; transform: translateY(0); }

        .tap-box { padding: 20px 40px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; text-align: center; background: rgba(197, 160, 89, 0.05); color: #fff; opacity: 0; transition: opacity 2s 4s; }
        .tap-reveal { opacity: 1; }

        /* NAVIGATION */
        #main-nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(197,160,89,0.2); box-sizing: border-box; transform: translateY(-100%); transition: 1s ease-out; }
        #main-nav.active { transform: translateY(0); }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; margin-left: 25px; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { color: var(--sazon-gold); opacity: 1; }

        /* HERO STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 20px; text-align: center; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.8), transparent 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: 20s ease-out; background-color: #001a4d; }
        .bg-active { transform: scale(1.1); }
        .soon-container { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(20px); transition: 3s 0.5s; }
        .active-ui.soon-container { opacity: 1; transform: translateY(0); }
        .gold-letter { font-size: clamp(3rem, 15vw, 10rem); background: linear-gradient(135deg, #fff 20%, var(--sazon-gold) 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: shine 6s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .logo-circle-o { width: clamp(2.5rem, 12vw, 8.5rem); height: clamp(2.5rem, 12vw, 8.5rem); margin: 0 5px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--sazon-gold); box-shadow: 0 0 30px rgba(197, 160, 89, 0.3); position: relative; background: #000; }
        .logo-circle-o img { width: 100%; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .timer-wrapper { position: relative; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); border: 1px solid rgba(197, 160, 89, 0.4); padding: 30px; opacity: 0; transition: 2s 2s; margin-top: 30px; }
        .timer-container { display: flex; gap: 20px; align-items: center; }
        .timer-unit { text-align: center; min-width: 60px; }
        .timer-val { font-size: clamp(1.8rem, 4vw, 3rem); color: var(--sazon-gold); font-weight: 700; display: block; }
        .timer-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; opacity: 0.8; }

        /* SECTIONS */
        .section { padding: 100px 20px; text-align: center; position: relative; z-index: 10; }
        .header-title { font-size: 2.5rem; margin-bottom: 10px; color: var(--sazon-navy); }
        .header-title.white { color: #fff; }
        .header-sub { text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; color: var(--sazon-gold); display: block; margin-bottom: 50px; }
        .white-bg { background: #fff; color: #333; }

        /* FAMILY TREE */
        .patriarch-box { max-width: 800px; margin: 0 auto 60px; padding: 40px; border: 1px solid var(--sazon-gold); background: #fff; }
        .p-name { font-size: clamp(1.8rem, 5vw, 2.5rem); color: var(--sazon-navy); margin: 0; }
        .tree-tier { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 20px; max-width: 1400px; margin: 0 auto; }
        .branch-card { background: #fff; border: 1px solid #f0f0f0; border-top: 4px solid var(--sazon-gold); padding: 25px 15px; cursor: pointer; transition: 0.3s; flex: 1 1 220px; max-width: 260px; text-align: center; box-sizing: border-box; }
        .branch-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .branch-card.active { border-color: var(--sazon-navy); background: #fdfdfd; }
        .nickname-tag { font-size: 0.6rem; color: var(--sazon-gold); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .branch-name { font-size: 1.1rem; color: var(--sazon-navy); margin: 0; }
        .descendants-list { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; text-align: left; }
        .branch-card.active .descendants-list { max-height: 300px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .placeholder-text { font-style: italic; color: #aaa; font-size: 0.7rem; }

        /* TRAVEL CONCIERGE & MAP */
        .concierge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; text-align: left; }
        .guide-card { background: #fff; border: 1px solid #eee; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .guide-card h3 { color: var(--sazon-navy); margin-top: 0; border-bottom: 2px solid var(--sazon-gold); padding-bottom: 10px; font-size: 1.2rem; }
        .guide-item { margin-bottom: 20px; }
        .guide-item b { display: block; color: var(--sazon-navy); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; }
        .guide-item p { margin: 0; font-size: 0.85rem; color: #666; line-height: 1.6; }
        .map-container { width: 100%; height: 350px; margin-top: 20px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .map-frame { width: 100%; height: 100%; border: 0; }

        /* LYRICS */
        .lyrics-box { max-width: 850px; margin: 0 auto; background: var(--glass); padding: 50px; border: 1px solid var(--sazon-gold); color: #fff; text-align: left; }
        .lyrics-stamp { font-weight: 700; color: var(--sazon-gold); font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 25px; border-left: 3px solid var(--sazon-gold); padding-left: 15px; }
        .lyrics-txt { font-weight: 300; font-size: 1rem; line-height: 1.8; margin-top: 12px; font-style: italic; color: #e0e0e0; }

        /* APPAREL */
        .apparel-grid { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .apparel-card { background: #fff; padding: 25px; border: 1px solid #eee; flex: 1 1 350px; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .apparel-card img { width: 100%; height: auto; margin-bottom: 20px; background: #eee; min-height: 200px; }

        /* REGISTRY */
        .access-section { background: #f9f9f9; padding: 100px 20px; color: #333; }
        .access-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px; max-width: 1100px; margin: 0 auto; }
        .qr-card { background: #fff; padding: 40px; border: 1px solid #ddd; text-align: center; }
        .qr-card img { width: 200px; height: 200px; margin-bottom: 20px; }
        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff; padding: 20px 40px; text-decoration: none; font-weight: 700; letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase; margin-top: 20px; }

        /* FOOTER */
        .email-banner { background: var(--sazon-navy); color: #fff; padding: 80px 20px; text-align: center; border-top: 4px solid var(--sazon-gold); }
        .email-link { color: var(--sazon-gold); text-decoration: none; font-size: 1.5rem; transition: 0.3s; }

        .audio-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: rgba(0,0,0,0.6); border: 1px solid var(--sazon-gold); padding: 12px; border-radius: 50%; cursor: pointer; opacity: 0; transition: 1s; }
        .active-ui.audio-ui { opacity: 1; }

        @media (max-width: 768px) { .nav-links { display: none; } .branch-card { flex: 1 1 100%; max-width: 100%; } }
    </style>
</head>
<body onload="startCredits()">

    <div id="overlay" onclick="launchHub()">
        <div class="salvo-container">
            <h4 class="credits-text" id="creds-1">Sazon Production</h4>
            <h4 class="credits-text
