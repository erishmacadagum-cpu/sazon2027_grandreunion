<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
        
        /* Using Cinzel to match the 'Sazon 2027' serif style in your banner */
        .brand-text { font-family: 'Cinzel', serif; letter-spacing: 2px; }

        #unlock-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .tap-btn { 
            padding: 15px 45px; border: 1px solid var(--sazon-gold); color: var(--sazon-gold); 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 6px; 
            animation: breathe 3s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 3s ease-in-out; 
        }

        /* TRANSFORMATION AREA */
        .brand-text { display: flex; align-items: center; font-size: clamp(3rem, 15vw, 10rem); color: var(--sazon-gold); font-weight: 700; }
        
        .az { transition: all 1s cubic-bezier(0.6, -0.28, 0.7, 1); display: inline-block; overflow: hidden; }
        .az.hide { opacity: 0; width: 0; transform: scaleX(0); margin: 0; }
        
        /* THE CELESTIAL MOON O */
        .moon-o { 
            width: 0; height: 0; opacity: 0; 
            transform: scale(0) rotate(-180deg); 
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 50%; 
            background: #fff; /* White base to make logo pop */
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
            border: 3px solid var(--sazon-gold);
            position: relative;
        }

        /* Inner Glow for that Moon feel */
        .moon-o::after {
            content: ''; position: absolute; inset: 0;
            box-shadow: inset 0 0 20px rgba(197,160,89,0.8);
            border-radius: 50%;
        }

        .moon-o.show { 
            width: clamp(3.5rem, 14vw, 9.5rem); 
            height: clamp(3.5rem, 14vw, 9.5rem); 
            opacity: 1; transform: scale(1) rotate(0deg); 
            margin: 0 10px; 
            box-shadow: 0 0 50px rgba(197,160,89,0.8), 0 0 20px #fff;
        }

        .moon-o img { width: 85%; height: auto; z-index: 2; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }

        .countdown { display: flex; gap: 20px; margin-top: 50px; opacity: 0; transition: 2s; }
        .countdown.show { opacity: 1; }
        .c-box { background: rgba(0,0,0,0.8); border: 1px solid rgba(197,160,89,0.4); padding: 20px; width: 90px; text-align: center; backdrop-filter: blur(8px); }
        .c-num { font-size: 1.8rem; color: var(--sazon-gold); font-weight: 700; display: block; }
        .c-lab { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
<body>

    <audio id="sfx-shimmer" src="audio/shimmer.mp3" preload="auto"></audio>
    <audio id="sfx-open" src="audio/open.mp3" preload="auto"></audio>
    <audio id="jingle" src="audio/jingle.mp3" loop preload="auto"></audio>

    <div id="unlock-screen" onclick="launch()">
        <div class="tap-btn">Enter Sazon Legacy</div>
    </div>

    <main id="hero">
        <div class="brand-text">
            <span>S</span>
            <span class="az" id="la">A</span>
            <span class="az" id="lz">Z</span>
            <div class="moon-o" id="moon"><img src="logo.png"></div>
            <span>O</span>
            <span>N</span>
        </div>
        
        <div class="countdown" id="timer">
            <div class="c-box"><span class="c-num" id="d">00</span><span class="c-lab">Days</span></div>
            <div class="c-box"><span class="c-num" id="h">00</span><span class="c-lab">Hrs</span></div>
            <div class="c-box"><span class="c-num" id="m">00</span><span class="c-lab">Min</span></div>
            <div class="c-box"><span class="c-num" id="s">00</span><span class="c-lab">Sec</span></div>
        </div>
    </main>

    <script>
        const openSfx = document.getElementById('sfx-open');
        const jingleSfx = document.getElementById('jingle');

        function launch() {
            openSfx.play();
            jingleSfx.play();
            document.getElementById('unlock-screen').style.display = 'none';
            
            const hero = document.getElementById('hero');
            hero.style.display = 'flex';
            
            setTimeout(() => {
                hero.style.opacity = '1';
                // The SAZON -> SOON transformation
                setTimeout(transformText, 2500); 
            }, 100);
        }

        function transformText() {
            // Dissolve A and Z
            document.getElementById('la').classList.add('hide');
            document.getElementById('lz').classList.add('hide');
            
            // Rise the Moon Logo
            setTimeout(() => {
                document.getElementById('moon').classList.add('show');
                // Reveal timer after transition
                setTimeout(() => {
                    document.getElementById('timer').classList.add('show');
                }, 1000);
            }, 400);
        }

        function clock() {
            const target = new Date("July 23, 2027 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2,'0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }
        setInterval(clock, 1000);
    </script>
</body>
</html>
