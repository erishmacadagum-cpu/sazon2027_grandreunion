<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            color: #1a202c;
        }

        /* Banner Section - Adjusted to show the TOP of your artwork */
        .header {
            position: relative;
            height: 90vh; /* Slightly taller to show more art */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), 
                        url('images/banner.jpg') top center/cover no-repeat; /* "top center" fix */
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 8px solid var(--luminous-blue);
        }

        /* Sophisticated Typography */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            margin: 0;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .slogan {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: 5px;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        /* Logo Lower Left */
        .logo-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
        }

        .logo {
            max-width: 100px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* Countdown Lower Right */
        .timer-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        #timer {
            display: flex;
            gap: 20px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            text-align: center;
            color: white;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
        }

        .timer-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 5px;
        }

        /* Content Box - Clean & Architectural */
        .container { max-width: 900px; margin: -60px auto 80px; padding: 0 20px; position: relative; z-index: 5; }

        .content-box {
            background: white;
            padding: 60px 40px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            text-align: center;
            border-top: 12px solid var(--luminous-blue);
        }

        .btn-play {
            background: var(--luminous-blue);
            color: white;
            padding: 18px 50px;
            border: 2px solid var(--luminous-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 30px;
        }

        .btn-play:hover {
            background: white;
            color: var(--luminous-blue);
            transform: translateY(-2px);
        }

        /* Mobile Adjustments */
        @media (max-width: 800px) {
            .logo-container, .timer-container {
                position: static;
                margin: 20px auto;
                display: inline-block;
            }
            .header { height: auto; padding: 80px 20px; }
            #timer { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="main-title">SAZON 2027</h1>
        <p class="slogan">Gikan sa Gamut, Tubtob sa Langit</p>

        <div class="logo-container">
            <img src="images/logo.png" alt="Sazon Logo" class="logo">
        </div>

        <div class="timer-container">
            <div id="timer">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px;">1st Edition Grand Family Reunion</h2>
            <p style="text-transform: uppercase; letter-spacing: 2px; color: #718096; font-size: 0.9rem;">July 22nd – 23rd, 2027 • Kalibo, Aklan</p>
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Family Jingle</button>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span>days</div>
                <div class="timer-unit"><span class="timer-number">${h}</span>hrs</div>
                <div class="timer-unit"><span class="timer-number">${m}</span>mins</div>
                <div class="timer-unit"><span class="timer-number">${s}</span>secs</div>
            `;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            if (audio.paused) {
                audio.play().then(() => { btn.innerHTML = "⏸️ Pause Jingle"; });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Family Jingle";
            }
        }
    </script>
</body>
</html>
