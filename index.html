<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB;
            --deep-navy: #002366;
            --champagne: #F7E7CE;
            --white: #FFFFFF;
        }

        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: var(--deep-navy);
            overflow-x: hidden;
        }

        /* BANNER CALIBRATION - Fixed overlap and visibility */
        .hero-banner {
            position: relative;
            height: 80vh;
            background: linear-gradient(rgba(0,35,102,0.1), rgba(0,35,102,0.3)), url('images/banner.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 8px solid var(--luminous-blue);
        }

        .nav-overlay {
            position: absolute;
            top: 30px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-frame {
            background: white;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .nav-logo { width: 70px; }

        .date-badge {
            color: white;
            text-align: right;
            border-right: 4px solid var(--luminous-blue);
            padding-right: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Countdown Glassmorphism */
        .countdown-wrap {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            gap: 30px;
            margin-top: 50px;
        }

        .time-box { text-align: center; color: white; }
        .time-val { font-size: 2.2rem; font-weight: 300; display: block; color: var(--white); }
        .time-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Main Container */
        .main-container {
            max-width: 900px;
            margin: -60px auto 100px;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: white;
            padding: 70px 40px;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            text-align: center;
        }

        .title-gold {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--luminous-blue);
            margin: 0;
            font-weight: 700;
        }

        .subtitle {
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 50px;
            display: block;
        }

        /* Buttons Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn-luxury {
            border: 1px solid #eee;
            padding: 40px 20px;
            text-decoration: none;
            color: var(--deep-navy);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            cursor: pointer;
        }

        .btn-luxury:hover {
            background: var(--luminous-blue);
            color: white !important;
            transform: translateY(-8px);
        }

        .btn-luxury span { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; margin-top: 15px; }

        /* Sophisticated Lyrics */
        .lyrics-section {
            padding: 60px 20px;
            background: #fafafa;
            border-top: 1px solid #eee;
            margin: 40px 0;
