<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Clarion Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Stage 1: The Initial Gate */
        #hype-trigger { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 10000; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: opacity 2s; }
        #trigger-btn { padding: 18px 45px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; letter-spacing: 6px; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.85rem; transition: 0.5s; z-index: 10001; }
        #trigger-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 30px var(--gold); }

        /* The Blurred Backdrop */
        .bg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,8,20,0.9), rgba(0,8,20,0.3), rgba(0,8,20,0.95)),
                        url('images/memories.jpg') no-repeat center center; 
            background-size: cover;
            filter: grayscale(100%) blur(25px);
            z-index: 1; opacity: 0; transition: opacity 4s ease;
        }

        /* Battlecry & Timer Content */
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; display: none; }
        #battlecry-box { max-width: 85%; font-family: 'Prata', serif; font-size: clamp(1.4rem, 5vw, 2.5rem); color: #ffffff; line-height: 1.5; font-style: italic; min-height: 120px; transition: opacity 1.5s ease; opacity: 0; }

        /* Subtle Timer */
        #timer { display: flex; gap: 15px; margin-bottom: 60px; opacity: 0.6; transition: opacity 2s; }
        .time-block { text-align: center; border-bottom: 1px solid var(--gold); padding: 5px; min-width: 50px; }
        .time-num { display: block; font-size: 1.5rem; font-weight: 200; color: var(--gold); }
        .time-label { font-size: 0.45rem; letter-spacing: 2px; text-transform: uppercase; }

        /* The Final Beacon */
        #enter-heritage { display: none; opacity: 0; transition: opacity 2s; margin-top: 20px; padding: 20px 60px; border: 1px solid var(--luminous-blue); background: transparent; color: var(--luminous-blue); text-decoration: none; font-weight: 600; letter-spacing: 6px; animation: pulseBlue 2s infinite; text-transform: uppercase; }
        @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 25px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }

        footer { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 4px; color: rgba(255,255,255,0.2); z-index: 10; }
    </style>
</head>
<body>

    <div id="hype-trigger">
        <button id="trigger-btn">The Clarion Call of Legacy</button>
    </div>

    <div class="bg-overlay" id="bg"></div>
    
    <div class="content" id="salvo-content">
        <div id="timer">
            <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>
        <div id="battlecry-box"></div>
        <a href="branches.html" id="enter-heritage">ENTER THE HERITAGE</a>
    </div>

    <footer>Marzon Hotel Kalibo - Aklan | #SAZON2027GRANDREUNION</footer>

    <script>
        // Use the simplified filename
        const jingle = new Audio('audio/jingle.mp3'); 
        jingle.preload = 'auto';

        const messages = ["We have missed HOME.", "We have missed FAMILY.", "The time has come...", "To honor the Legacy."];
        const trigger = document.getElementById('hype-trigger');
        const bg = document.getElementById('bg');
        const content = document.getElementById('salvo-content');
        const box = document.getElementById('battlecry-box');
        const enterBtn = document.getElementById('enter-heritage');

        // Cinematic Bass Drop Effect (No file needed)
        function playCinematicBoom() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(100, context.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(0.01, context.currentTime + 2);
            gain.gain.setValueAtTime(0.5, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 2);
            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 2);
        }

        document.getElementById('trigger-btn').onclick = function() {
            playCinematicBoom(); // Instant SFX
            
            // Short delay to let the boom hit before jingle swells
            setTimeout(() => {
                jingle.play().catch(e => console.log("Audio play blocked", e));
            }, 300);

            trigger.style.opacity = '0';
            setTimeout(() => { trigger.style.display = 'none'; }, 2000);
            
            bg.style.opacity = '1';
            content.style.display = 'flex';
            runBattlecry();

            // After 30s Jingle: Final Payoff
            setTimeout(() => {
                bg.style.opacity = '0'; 
                box.style.display = 'none';
                document.getElementById('timer').style.opacity = '0.1';
                enterBtn.style.display = 'inline-block';
                setTimeout(() => enterBtn.style.opacity = '1', 100);
            }, 30000);
        };

        async function runBattlecry() {
            await new Promise(r => setTimeout(r, 2000));
            for (let msg of messages) {
                box.innerText = msg;
                box.style.opacity = '1';
                await new Promise(r => setTimeout(r, 5500)); 
                box.style.opacity = '0';
                await new Promise(r => setTimeout(r, 1500)); 
            }
        }

        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const distance = targetDate - new Date().getTime();
            if (distance < 0) { document.getElementById("timer").innerHTML = "WELCOME HOME"; return; }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
