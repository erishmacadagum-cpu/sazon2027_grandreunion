<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Official Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
        }

        /* Banner Section - The Art is the Hero */
        .header {
            position: relative;
            height: 95vh;
            background: url('images/banner.jpg') top center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes content to top and bottom */
            border-bottom: 10px solid var(--luminous-blue);
        }

        /* Elegant Top Navigation */
        .top-nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
        }

        .nav-logo {
            max-width: 80px;
            background: white;
            padding: 8px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .nav-text {
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 200;
            font-size: 0.8rem;
        }

        /* Sophisticated Timer Box - Bottom Right */
        .timer-container {
            align-self: flex-end;
            margin: 0 40px 40px 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 35px;
            border-radius: 2px; /* Sharp edges for a "Gallery" feel */
            border-left: 4px solid var(--gold);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        #timer {
            display: flex;
            gap: 25px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            text-align: center;
            color: white;
        }

        .timer-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }

        .timer-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Content Area */
        .container { 
            max-width: 1000px; 
            margin: -80px auto 100px; 
            padding: 0 20px; 
            position: relative; 
            z-index: 10; 
        }

        .content-box {
            background: white;
            padding: 70px 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--luminous-blue);
            margin-bottom: 10px;
        }

        .date-location {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .btn-play {
            background: transparent;
            color: var(--luminous-blue);
            padding: 15px 45px;
            border: 1px solid var(--luminous-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .btn-play:hover {
            background: var(--luminous-blue);
            color: white;
            letter-spacing: 6px;
        }

        /* Mobile Fix */
        @media (max-width: 768px) {
            .header { height: 70vh; }
            .top-nav { padding: 20px; }
            .timer-container { align-self: center; margin: 0 0 40px 0; }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <img src="images/logo.png" alt="Sazon Logo" class="nav-logo">
            <div class="nav-text">July 2027 • Kalibo</div>
        </div>

        <div class="timer-container">
            <div id="timer">Loading Countdown...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2>The Grand Reunion</h2>
            <p class="date-location">Marzon Hotel & Resort • Aklan, Philippines</p>
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Theme</button>
            
            <p style="margin-top: 50px; font-style: italic; color: #a0aec0; font-weight: 200;">
                "Gikan sa Gamut, Tubtob sa Langit"
            </p>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-number">${h}</span><span class="timer-label">Hrs</span></div>
                <div class="timer-unit"><span class="timer-number">${m}</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-number">${s}</span><span class="timer-label">Secs</span></div>
            `;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            if (audio.paused) {
                audio.play().then(() => { btn.innerHTML = "⏸️ Pause Theme"; });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Theme";
            }
        }
    </script>
</body>
</html>
