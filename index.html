<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            color: #1a202c;
        }

        /* Banner Section */
        .header {
            position: relative;
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('images/banner.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Keeps main text centered */
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 6px solid var(--luminous-blue);
        }

        /* Sophisticated Typography */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }

        .slogan {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        /* Logo Lower Left */
        .logo-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: center;
        }

        .logo {
            max-width: 110px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Countdown Lower Right - Sophisticated Box */
        .timer-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        #timer {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
            display: flex;
            gap: 15px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            font-weight: 400;
        }

        .timer-number {
            font-size: 2rem;
            line-height: 1;
            margin-bottom: 4px;
        }

        /* Content Area */
        .container { max-width: 850px; margin: -50px auto 60px; padding: 0 20px; position: relative; z-index: 5; }

        .content-box {
            background: white;
            padding: 50px 40px;
            border-radius: 2px; /* Square edges look more modern/architectural */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 10px solid var(--luminous-blue);
        }

        .btn-play {
            background: var(--luminous-blue);
            color: white;
            padding: 15px 40px;
            border: 1px solid var(--luminous-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 30px;
        }

        .btn-play:hover {
            background: white;
            color: var(--luminous-blue);
        }

        /* Responsive Fixes for Mobile */
        @media (max-width: 768px) {
            .logo-container, .timer-container {
                position: static;
                margin: 20px auto;
            }
            .header { height: auto; padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="main-title">SAZON 2027</h1>
        <p class="slogan">Gikan sa Gamut, Tubtob sa Langit</p>

        <div class="logo-container">
            <img src="images/logo.png" alt="Sazon Logo" class="logo">
        </div>

        <div class="timer-container">
            <div id="timer">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #1a202c; margin-bottom: 5px;">1st Edition Grand Family Reunion</h2>
            <p style="letter-spacing: 1px; color: #718096; font-weight: 300;">July 22nd – 23rd, 2027 • Marzon Resort, Kalibo, Aklan</p>
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Family Jingle</button>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span>days</div>
                <div class="timer-unit"><span class="timer-number">${h}</span>hrs</div>
                <div class="timer-unit"><span class="timer-number">${m}</span>mins</div>
                <div class="timer-unit"><span class="timer-number">${s}</span>secs</div>
            `;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            if (audio.paused) {
                audio.play().then(() => { btn.innerHTML = "⏸️ Pause Jingle"; });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Family Jingle";
            }
        }
    </script>
</body>
</html>
