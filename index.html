<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Clarion Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Prata&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --navy: #000814; 
            --luminous-blue: #00e5ff; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Initial Gate */
        #hype-trigger { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 10000; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: opacity 2s; }
        #trigger-btn { padding: 18px 45px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; letter-spacing: 6px; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.85rem; transition: 0.5s; z-index: 10001; }
        #trigger-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 30px var(--gold); }

        /* Background - Gentle Mystery Blur */
        .bg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,8,20,0.85), rgba(0,8,20,0.2), rgba(0,8,20,0.95)),
                        url('images/memories.jpg') no-repeat center center; 
            background-size: cover;
            filter: grayscale(100%) blur(15px); /* Starts slightly blurry per your request */
            z-index: 1; opacity: 0; 
            transition: opacity 4s ease, filter 25s ease-in-out; 
        }

        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; display: none; }
        
        #battlecry-box { 
            max-width: 85%; font-family: 'Prata', serif; font-size: clamp(1.5rem, 5vw, 2.8rem); 
            color: #ffffff; line-height: 1.6; font-style: italic; min-height: 150px; 
            transition: opacity 1.5s ease; opacity: 0;
        }

        /* The "Loud" Timer */
        #timer { display: flex; gap: 20px; margin-bottom: 50px; opacity: 1; transition: opacity 2s; }
        .time-block { text-align: center; border-bottom: 4px solid var(--gold); padding: 10px; min-width: 85px; }
        .time-num { display: block; font-size: 3rem; font-weight: 600; color: var(--gold); font-family: 'Montserrat'; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .time-label { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: white; font-weight: 400; }

        /* Finale Text Layout */
        #invitation-text { 
            display: none; font-family: 'Montserrat', sans-serif; font-weight: 200; 
            font-size: 1.5rem; letter-spacing: 5px; color: var(--luminous-blue); 
            margin-bottom: 30px; opacity: 0; transition: opacity 2s; line-height: 2;
        }

        #enter-heritage { 
            display: none; opacity: 0; transition: opacity 2s; padding: 20px 60px; 
            border: 2px solid var(--luminous-blue); background: transparent; 
            color: var(--luminous-blue); text-decoration: none; font-weight: 600; 
            letter-spacing: 6px; animation: pulseBlue 2s infinite; text-transform: uppercase; 
        }
        @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 25px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }

        /* Visible Footer */
        footer { 
            position: absolute; bottom: 25px; width: 100%; text-align: center; 
            font-size: 0.85rem; letter-spacing: 5px; color: rgba(255,255,255,0.9); 
            z-index: 10; font-weight: 400; text-transform: uppercase; text-shadow: 0 2px 4px black;
        }
    </style>
</head>
<body>

    <div id="hype-trigger">
        <button id="trigger-btn">The Clarion Call of Legacy</button>
    </div>

    <div class="bg-overlay" id="bg"></div>
    
    <div class="content" id="salvo-content">
        <div id="timer">
            <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>
        <div id="battlecry-box"></div>
        <div id="invitation-text"></div>
        <a href="branches.html" id="enter-heritage">ENTER THE HERITAGE</a>
    </div>

    <footer>Marzon Hotel Kalibo - Aklan | #SAZON2027GRANDREUNION</footer>

    <script>
        const teaserAudio = new Audio('audio/teaser_jingle.mp3'); 
        teaserAudio.preload = 'auto';

        const messages = ["We have missed HOME.", "We have missed FAMILY.", "The time has come...", "To honor the Legacy."];
        const trigger = document.getElementById('hype-trigger');
        const bg = document.getElementById('bg');
        const content = document.getElementById('salvo-content');
        const box = document.getElementById('battlecry-box');
        const invite = document.getElementById('invitation-text');
        const enterBtn = document.getElementById('enter-heritage');

        // NEW: 4-Beat Rhythmic Heartbeat
        function playCinematicHeartbeat() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const strike = (time) => {
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(50, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.8);
                gain.gain.setValueAtTime(0.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start(time);
                osc.stop(time + 0.8);
            };

            // 4 Beats, 1 second apart
            strike(context.currentTime); 
            strike(context.currentTime + 1.0);
            strike(context.currentTime + 2.0);
            strike(context.currentTime + 3.0);
        }

        document.getElementById('trigger-btn').onclick = function() {
            playCinematicHeartbeat();
            
            // Wait for all 4 beats to finish before music starts
            setTimeout(() => {
                teaserAudio.play().catch(e => console.log("Audio play blocked."));
            }, 4100);

            trigger.style.opacity = '0';
            setTimeout(() => { 
                trigger.style.display = 'none'; 
                bg.style.opacity = '1';
                bg.style.filter = 'grayscale(100%) blur(8px)'; /* Becomes slightly clearer over time */
                content.style.display = 'flex';
                runBattlecry();
            }, 2000);

            // Final Invitation at 30 seconds
            setTimeout(() => {
                bg.style.filter = 'grayscale(100%) blur(40px)'; 
                bg.style.opacity = '0.4';
                box.style.display = 'none';
                
                // Final staggered message
                invite.innerHTML = "We are Sazon 🌳<br>See you in Kalibo! 🎭";
                invite.style.display = 'block';
                setTimeout(() => { 
                    invite.style.opacity = '1';
                    // Show button 2 seconds after the text appears
                    setTimeout(() => {
                        enterBtn.style.display = 'inline-block';
                        setTimeout(() => enterBtn.style.opacity = '1', 100);
                    }, 2000);
                }, 100);
            }, 30000);
        };

        async function runBattlecry() {
            await new Promise(r => setTimeout(r, 4100)); // Delay text until jingle starts
            for (let msg of messages) {
                box.innerText = msg;
                box.style.opacity = '1';
                await new Promise(r => setTimeout(r, 5000)); 
                box.style.opacity = '0';
                await new Promise(r => setTimeout(r, 1500)); 
            }
        }

        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const distance = targetDate - new Date().getTime();
            if (distance < 0) { document.getElementById("timer").innerHTML = "WELCOME HOME"; return; }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
