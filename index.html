<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Grand Reunion 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000000; }
        body, html { margin: 0; padding: 0; background-color: var(--black); color: white; font-family: 'Raleway', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Gate Screen */
        #gate-screen { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 2s ease; }
        .tap-text { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 3px; margin-bottom: 20px; font-size: 0.9rem; }
        .enter-btn { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 15px 40px; font-family: 'Cinzel', serif; font-size: 1.2rem; cursor: pointer; letter-spacing: 5px; transition: 0.5s; text-transform: uppercase; }
        .enter-btn:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 20px var(--gold); }

        /* Main Stage */
        #main-stage { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/banner.jpg'); background-size: cover; background-position: center; }

        .fade-text { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 6px; opacity: 0; position: absolute; width: 100%; color: var(--gold); }

        /* The SOON Transformation */
        #soon-container { display: none; flex-direction: column; align-items: center; position: relative; }
        .soon-wrap { display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: clamp(4rem, 18vw, 10rem); font-weight: 700; color: var(--gold); }
        .moon-o { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .celestial-logo { height: 0.8em; width: auto; border-radius: 50%; filter: drop-shadow(0 0 15px var(--gold)); animation: moonGlow 4s infinite alternate; }

        @keyframes moonGlow { from { filter: drop-shadow(0 0 10px var(--gold)); } to { filter: drop-shadow(0 0 25px #fff); } }
        @keyframes cinemaFade { 0% { opacity: 0; transform: scale(0.95); } 20% { opacity: 1; transform: scale(1); } 80% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0; transform: scale(1.1); } }
        .run-fade { animation: cinemaFade 5s forwards; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="tap-text">TAP THE SCREEN</div>
        <button class="enter-btn" onclick="startCinema()">ENTER SAZON LEGACY</button>
    </div>

    <audio id="audio-open"><source src="https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/open.mp3" type="audio/mpeg"></audio>
    <audio id="audio-shimmer"><source src="https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/shimmer.mp3" type="audio/mpeg"></audio>
    <audio id="bg-jingle"><source src="https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/jingle.mp3" type="audio/mpeg"></audio>

    <div id="main-stage">
        <div id="c1" class="fade-text">A SAZON FAMILY PRODUCTION</div>
        <div id="c2" class="fade-text">IN HONOR OF TERESO & TEOFISTA SAZON</div>
        <div id="c3" class="fade-text">JULY 23-24, 2027<br><small style="font-size: 0.8rem; letter-spacing: 4px;">KALIBO, AKLAN</small></div>

        <div id="soon-container">
            <div class="soon-wrap">
                <span>S</span>
                <div class="moon-o">
                    <img src="https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/logo.jpg" class="celestial-logo" alt="Moon">
                </div>
                <span>OON</span>
            </div>
        </div>
    </div>

    <script>
        const audioOpen = document.getElementById('audio-open');
        const audioShim = document.getElementById('audio-shimmer');
        const jingle = document.getElementById('bg-jingle');

        function startCinema() {
            document.getElementById('gate-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                runSequence();
            }, 2000);
        }

        function runSequence() {
            // 1. Open sound + First credit
            audioOpen.play();
            document.getElementById('c1').classList.add('run-fade');

            // 2. Shimmer sound syncs with In Honor Of...
            setTimeout(() => {
                audioShim.play();
                document.getElementById('c2').classList.add('run-fade');
            }, 5000);

            // 3. Location credit
            setTimeout(() => {
                document.getElementById('c3').classList.add('run-fade');
            }, 10000);

            // 4. Fade to Jingle (Ramping Volume) & SOON reveal
            setTimeout(() => {
                jingle.volume = 0.1;
                jingle.play();
                rampVolume(jingle, 0.6); // Soft to minimal loudness
                
                document.getElementById('soon-container').style.display = 'flex';
            }, 15000);
        }

        function rampVolume(audio, target) {
            let vol = 0.1;
            const interval = setInterval(() => {
                if (vol < target) {
                    vol += 0.05;
                    audio.volume = vol;
                } else {
                    clearInterval(interval);
                }
            }, 200);
        }
    </script>
</body>
</html>
