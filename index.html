<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --glow: rgba(197, 160, 89, 0.6); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; }

        /* THE GATE */
        #gate-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000000; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .enter-btn { 
            padding: 20px 50px; border: 2px solid var(--gold); color: var(--gold); 
            font-family: 'Cinzel'; text-transform: uppercase; letter-spacing: 5px;
            box-shadow: 0 0 25px var(--glow); text-align: center;
        }

        /* CREDITS */
        #credits-stage { 
            position: fixed; inset: 0; background: #000; z-index: 999999; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        .credit-line { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1.5s ease; margin: 10px 0; padding: 0 20px; }
        
        .patriarch-names { 
            font-size: clamp(1.8rem, 6vw, 4rem); 
            font-weight: 700; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: sparkle 3s linear infinite;
            background-size: 200% auto;
        }
        @keyframes sparkle { to { background-position: 200% center; } }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* HERO */
        #main-hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 3s; 
        }

        .brand-text { display: flex; align-items: center; font-family: 'Cinzel'; font-size: clamp(2.5rem, 10vw, 9rem); color: var(--gold); font-weight: 700; }
        .vanish { transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1); display: inline-block; overflow: hidden; }
        .vanish.hide { opacity: 0; width: 0; transform: scale(0.1); margin: 0; }

        .moon-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-45deg); 
            transition: 2s cubic-bezier(0.17, 0.89, 0.32, 1.28); 
            border-radius: 50%;
            background: url('images/emblem.jpg') center/cover no-repeat; 
            box-shadow: 0 0 40px var(--glow); 
        }
        .moon-o.show { width: clamp(3.2rem, 12vw, 9.5rem); height: clamp(3.2rem, 12vw, 9.5rem); opacity: 1; transform: scale(1) rotate(0deg); margin: 0 10px; }

        /* TIMER */
        .timer { display: flex; gap: 8px; margin-top: 30px; opacity: 0; transition: 2s; }
        .timer.show { opacity: 1; }
        .t-box { border: 1px solid var(--gold); padding: 10px; background: rgba(0,0,0,0.8); min-width: 60px; text-align: center; }
        .t-num { display: block; font-size: 1.5rem; color: #fcf6ba; font-weight: 700; }
        .t-lab { font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
    </style>
</head>
<body>

    <audio id="audio-open" src="audio/open.mp3" playsinline></audio>
    <audio id="audio-shimmer" src="audio/shimmer.mp3" playsinline></audio>
    <audio id="audio-jingle" src="audio/jingle.mp3" playsinline></audio>

    <div id="gate-overlay" onclick="launchExperience()">
        <div class="enter-btn">Enter Sazon Legacy</div>
    </div>

    <div id="credits-stage">
        <div class="credit-line" id="l1">A Sazon Family Production</div>
        <div class="credit-line patriarch-names" id="l2">Tereso & Teofista Sazon</div>
        <div class="credit-line" id="l3">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="main-hero">
        <div class="brand-text">
            <span>S</span>
            <span class="vanish" id="a">A</span>
            <span class="vanish" id="z">Z</span>
            <div class="moon-o" id="moon"></div>
            <span>O</span>
            <span>N</span>
        </div>
        
        <div class="timer" id="countdown">
            <div class="t-box"><span class="t-num" id="days">00</span><span class="t-lab">Days</span></div>
            <div class="t-box"><span class="t-num" id="hours">00</span><span class="t-lab">Hrs</span></div>
            <div class="t-box"><span class="t-num" id="mins">00</span><span class="t-lab">Min</span></div>
            <div class="t-box" style="border-color: #fcf6ba;"><span class="t-num" id="secs">00</span><span class="t-lab">Sec</span></div>
        </div>
    </main>

    <script>
        const aOpen = document.getElementById('audio-open');
        const aShim = document.getElementById('audio-shimmer');
        const aJingle = document.getElementById('audio-jingle');

        function launchExperience() {
            // MOBILE UNLOCK: Force start and immediate pause to bypass mobile security
            aOpen.play();
            aShim.play(); aShim.pause(); aShim.currentTime = 0;
            aJingle.play(); aJingle.pause(); aJingle.currentTime = 0;
            
            const gate = document.getElementById('gate-overlay');
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.remove(); 
                document.getElementById('credits-stage').style.display = 'flex';
                startCredits();
            }, 800);
        }

        function startCredits() {
            setTimeout(() => document.getElementById('l1').classList.add('reveal'), 500);
            
            setTimeout(() => {
                aShim.play();
                document.getElementById('l2').classList.add('reveal');
            }, 3000); 

            setTimeout(() => document.getElementById('l3').classList.add('reveal'), 5000);

            setTimeout(() => {
                document.getElementById('credits-stage').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('credits-stage').style.display = 'none';
                    const hero = document.getElementById('main-hero');
                    hero.style.display = 'flex';
                    
                    // MOBILE LOOP FIX: Manual Loop
                    aJingle.loop = true;
                    aJingle.play();
                    
                    setTimeout(() => {
                        hero.style.opacity = '1';
                        setTimeout(transformToSoon, 3000);
                    }, 100);
                }, 1000);
            }, 9000);
        }

        function transformToSoon() {
            document.getElementById('a').classList.add('hide');
            document.getElementById('z').classList.add('hide');
            setTimeout(() => {
                document.getElementById('moon').classList.add('show');
                setTimeout(() => {
                    document.getElementById('countdown').classList.add('show');
                }, 1000);
            }, 600);
        }

        function updateClock() {
            const diff = new Date("July 23, 2027 00:00:00") - new Date();
            if(diff < 0) return;
            document.getElementById('days').innerText = Math.floor(diff/86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2, '0');
            document.getElementById('secs').innerText = Math.floor((diff%60000)/1000).toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
