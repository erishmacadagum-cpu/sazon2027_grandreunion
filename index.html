<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOON | Sazon Family Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #gate { cursor: pointer; text-align: center; }
        .tap-btn { padding: 20px 40px; border: 2px solid var(--gold); color: var(--gold); text-transform: uppercase; letter-spacing: 5px; font-family: 'Cinzel'; }

        #intro { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .credits { font-family: 'Cinzel'; color: var(--gold); opacity: 0; transform: translateY(20px); transition: 1.5s ease; margin: 10px 0; }
        .patriarch { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; text-shadow: 0 0 20px rgba(197, 160, 89, 0.6); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        #hero { display: none; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/banner.jpg') center/cover; }
        
        .soon-text { display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: clamp(4rem, 15vw, 10rem); color: var(--gold); font-weight: 700; text-shadow: 0 0 20px rgba(197,160,89,0.5); }
        
        .az-span { transition: 1.5s; width: auto; opacity: 1; }
        .az-span.hide { width: 0; opacity: 0; }

        .moon-o {
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-180deg);
            transition: 2s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            border-radius: 50%; border: 3px solid var(--gold);
            position: relative;
            background: url('images/emblem.jpg') center/cover;
            box-shadow: 0 0 60px rgba(197, 160, 89, 0.8);
            z-index: 5;
        }
        .moon-o.show { width: clamp(4.5rem, 16vw, 11rem); height: clamp(4.5rem, 16vw, 11rem); opacity: 1; transform: scale(1) rotate(0deg); margin: 0 15px; }
        
        .timer { display: flex; gap: 20px; margin-top: 40px; opacity: 0; transition: 1s; }
        .timer.show { opacity: 1; }
        .box { border: 1px solid var(--gold); padding: 10px; background: rgba(0,0,0,0.8); min-width: 70px; text-align: center; }
    </style>
</head>
<body>

    <audio id="openS" src="audio/open.mp3"></audio>
    <audio id="shim" src="audio/shimmer.mp3"></audio>
    <audio id="loop" src="audio/jingle.mp3" loop></audio>

    <div id="gate" onclick="start()">
        <div class="tap-btn">Enter Sazon Legacy</div>
    </div>

    <div id="intro">
        <div class="credits" id="c1">Sazon Family Production</div>
        <div class="credits patriarch" id="c2">Tereso & Teofista Sazon</div>
        <div class="credits" id="c3">Honoring the Lineage • July 2027 • Aklan</div>
    </div>

    <main id="hero">
        <div class="soon-text">
            <span>S</span><span class="az-span" id="a">A</span><span class="az-span" id="z">Z</span>
            <div class="moon-o" id="moon-o"></div>
            <span>O</span><span>N</span>
        </div>
        <div class="timer" id="timer">
            <div class="box"><span id="days">00</span><br><small>Days</small></div>
            <div class="box"><span id="hours">00</span><br><small>Hrs</small></div>
            <div class="box"><span id="minutes">00</span><br><small>Min</small></div>
        </div>
    </main>

    <script>
        function start() {
            document.getElementById('openS').play();
            document.getElementById('gate').style.display = 'none';
            document.getElementById('intro').style.display = 'flex';

            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 500);
            setTimeout(() => {
                document.getElementById('shim').play();
                document.getElementById('c2').classList.add('reveal');
            }, 3000); // Shimmer at exact moment family names appear
            setTimeout(() => document.getElementById('c3').classList.add('reveal'), 4500);

            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                const h = document.getElementById('hero');
                h.style.display = 'flex';
                document.getElementById('loop').play();
                setTimeout(() => {
                    h.style.opacity = '1';
                    // Sazon to Soon legwork
                    setTimeout(() => {
                        document.getElementById('a').classList.add('hide');
                        document.getElementById('z').classList.add('hide');
                        setTimeout(() => {
                            document.getElementById('moon-o').classList.add('show');
                            setTimeout(() => document.getElementById('timer').classList.add('show'), 1200);
                        }, 500);
                    }, 2500);
                }, 100);
            }, 7500);
        }

        const countdown = () => {
            const count = new Date("July 23, 2027 00:00:00").getTime();
            const now = new Date().getTime();
            const gap = count - now;
            if(gap < 0) return;
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById('days').innerText = Math.floor(gap / day);
            document.getElementById('hours').innerText = Math.floor((gap % day) / hour);
            document.getElementById('minutes').innerText = Math.floor((gap % hour) / minute);
        }
        setInterval(countdown, 1000);
    </script>
</body>
</html>
