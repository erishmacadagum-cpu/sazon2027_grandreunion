<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Grand Reunion 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00f2ff;
            --coral: #ff4d6d;
            --navy: #0a0e17;
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--navy);
            color: white;
            font-family: 'Raleway', sans-serif;
            overflow: hidden; /* Keeps the cinematic focus */
            height: 100vh;
        }

        /* Initial Gate */
        #gate-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--navy);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 2s ease;
        }

        .enter-btn {
            background: none; border: 2px solid var(--aqua); color: var(--aqua);
            padding: 15px 40px; font-family: 'Cinzel', serif; font-size: 1.2rem;
            cursor: pointer; letter-spacing: 5px; transition: 0.5s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .enter-btn:hover { background: var(--aqua); color: var(--navy); box-shadow: 0 0 30px var(--aqua); }

        /* Cinematic Content Layer */
        #main-stage {
            display: none; height: 100vh;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: radial-gradient(circle, #1a1f2c 0%, #0a0e17 100%);
        }

        /* Intro Text Fades */
        .fade-text {
            font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 8px;
            opacity: 0; position: absolute; width: 100%;
        }

        /* The Transformation Container */
        #transform-container {
            display: none; flex-direction: column; align-items: center;
        }

        /* THE "SOON" BREATHE & SHIMMER EFFECT */
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 700;
            letter-spacing: 15px;
            position: relative;
            display: inline-block;
            
            /* The Shimmer Base */
            background: linear-gradient(120deg, 
                rgba(0,242,255,1) 30%, 
                rgba(255,255,255,0.8) 50%, 
                rgba(0,242,255,1) 70%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Breathing & Glowing Animation */
            animation: 
                shimmerRun 4s linear infinite,
                breathePulse 4s ease-in-out infinite;
            
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        @keyframes shimmerRun {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        @keyframes breathePulse {
            0%, 100% { transform: scale(1); filter: brightness(1); opacity: 0.9; }
            50% { transform: scale(1.03); filter: brightness(1.3); opacity: 1; }
        }

        /* Emblem Styling */
        .emblem-img {
            height: clamp(60px, 12vw, 120px);
            vertical-align: middle;
            margin: 0 10px;
            filter: drop-shadow(0 0 15px var(--aqua));
            animation: emblemPulse 4s ease-in-out infinite;
        }

        @keyframes emblemPulse {
            0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
            50% { transform: scale(1.1) rotate(2deg); filter: brightness(1.5) drop-shadow(0 0 25px var(--aqua)); }
        }

        /* Timer Section */
        .countdown-wrap {
            margin-top: 40px; display: flex; gap: 20px; opacity: 0;
            transition: opacity 2s ease;
        }
        .timer-box {
            text-align: center; min-width: 70px;
        }
        .num { font-size: 2rem; font-weight: bold; color: var(--aqua); display: block; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); }

        /* Animations for Fades */
        @keyframes cinemaFade {
            0% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .run-fade { animation: cinemaFade 4s forwards; }

    </style>
</head>
<body>

    <div id="gate-screen">
        <button class="enter-btn" onclick="startCinema()">ENTER SAZON LEGACY</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="main-stage">
        <div id="intro-1" class="fade-text">A SAZON FAMILY PRODUCTION</div>
        <div id="intro-2" class="fade-text">IN HONOR OF TERESO & TEOFISTA SAZON</div>

        <div id="transform-container">
            <div id="logo-reveal">
                <span class="logo-text">S</span>
                <img src="https://erishmacadagum-cpu.github.io/sazon2027_grandreunion/Sazon_Emblem.png" class="emblem-img" alt="Emblem">
                <span class="logo-text">OON</span>
            </div>

            <div class="countdown-wrap" id="timer-ui">
                <div class="timer-box"><span class="num" id="days">00</span><span class="label">Days</span></div>
                <div class="timer-box"><span class="num" id="hours">00</span><span class="label">Hrs</span></div>
                <div class="timer-box"><span class="num" id="mins">00</span><span class="label">Min</span></div>
                <div class="timer-box"><span class="num" id="secs">00</span><span class="label">Sec</span></div>
            </div>
        </div>
    </div>

    <script>
        function startCinema() {
            document.getElementById('gate-screen').style.opacity = '0';
            document.getElementById('bg-music').play();
            
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                runSequence();
            }, 2000);
        }

        function runSequence() {
            const i1 = document.getElementById('intro-1');
            const i2 = document.getElementById('intro-2');
            const tc = document.getElementById('transform-container');
            const tui = document.getElementById('timer-ui');

            // Fade 1
            i1.classList.add('run-fade');
            
            // Fade 2
            setTimeout(() => {
                i1.style.display = 'none';
                i2.classList.add('run-fade');
            }, 4500);

            // Final Reveal
            setTimeout(() => {
                i2.style.display = 'none';
                tc.style.display = 'flex';
                setTimeout(() => { tui.style.opacity = '1'; }, 1000);
                startTimer();
            }, 9000);
        }

        function startTimer() {
            const target = new Date("July 23, 2027 08:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const d = target - now;
                document.getElementById("days").innerText = Math.floor(d / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("secs").innerText = Math.floor((d % (1000 * 60)) / 1000);
            }, 1000);
        }
    </script>
</body>
</html>
