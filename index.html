<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f7fa;
            color: #2c3e50;
        }

        /* Banner Section - Adjusted height to show more of your beautiful artwork */
        .header {
            min-height: 80vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('images/banner.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Moves content up slightly */
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--champagne-silver);
            padding-top: 40px;
        }

        /* Elegant Logo Frame */
        .logo {
            max-width: 130px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2rem, 8vw, 4rem); /* Adjusts for mobile automatically */
            margin: 0; 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7); 
        }

        /* Sophisticated Timer Box */
        #timer {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: bold;
            margin-top: 25px;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent background for readability */
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 2px solid var(--champagne-silver);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: inline-block;
        }

        .tagline-sub { 
            font-style: italic; 
            font-size: 1.2rem; 
            margin-top: 10px; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .container { max-width: 800px; margin: -60px auto 50px; padding: 0 20px; position: relative; z-index: 10; }

        .content-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            border-top: 8px solid var(--luminous-blue);
        }

        .btn-play {
            background: var(--luminous-blue);
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 71, 171, 0.4);
            margin-top: 20px;
        }

        .btn-play:hover { transform: scale(1.05); background: #003580; }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/logo.png" alt="Sazon Logo" class="logo">
        <h1>🏝️ SAZON 2027 🏝️</h1>
        <p class="tagline-sub">"Gikan sa Gamut, Tubtob sa Langit"</p>
        
        <div id="timer">Calculating...</div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2 style="color: var(--luminous-blue); font-family: 'Playfair Display', serif;">1st Edition Grand Family Reunion</h2>
            <p style="font-size: 1.1rem; color: #555;">July 22-23, 2027 • Marzon Resort, Kalibo, Aklan</p>
            <hr style="width: 60px; border: 2px solid var(--champagne-silver); margin: 25px auto;">
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Family Jingle</button>
            <p style="font-size: 0.9rem; color: #7f8c8d; margin-top: 15px;">Tap to listen to the Sazon Theme</p>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            if (diff < 0) {
                document.getElementById("timer").innerHTML = "THE REUNION HAS BEGUN!";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = d + "d " + h + "h " + m + "m " + s + "s";
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            
            if (audio.paused) {
                audio.play()
                    .then(() => { btn.innerHTML = "⏸️ Pause Jingle"; })
                    .catch(() => { alert("Please tap the screen first to enable audio."); });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Family Jingle";
            }
        }
    </script>
</body>
</html>
