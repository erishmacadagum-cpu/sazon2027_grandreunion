<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        h1, h2, h3, h4, .gold-letter, .branch-name, .p-name, .nav-links a { font-family: 'Cinzel', serif !important; letter-spacing: 2px; }

        /* NAV */
        #main-nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(197,160,89,0.2); transform: translateY(-100%); transition: 1s; }
        #main-nav.active { transform: translateY(0); }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; margin-left: 20px; opacity: 0.7; }

        /* SECTIONS */
        .section { padding: 80px 20px; text-align: center; }
        .white-bg { background: #fff; color: #333; }
        .navy-bg { background: var(--sazon-navy); color: #fff; }

        /* TREE & APPAREL */
        .tree-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .branch-card { background: #fff; border: 1px solid #eee; border-top: 4px solid var(--sazon-gold); padding: 20px; flex: 1 1 200px; max-width: 240px; }
        .apparel-grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .apparel-card { background: #fff; padding: 20px; width: 350px; }
        .apparel-label { color: var(--sazon-navy); font-weight: 700; font-size: 0.75rem; margin-top: 15px; border-left: 3px solid var(--sazon-gold); padding-left: 10px; text-align: left; text-transform: uppercase; }
        
        /* MAP & QR */
        .map-box { height: 300px; border: 2px solid var(--sazon-gold); margin-top: 20px; }
        .qr-container { display: inline-block; margin: 15px; text-align: center; }
    </style>
</head>
<body>

    <nav id="main-nav" class="active">
        <img src="images/logo.png" height="30">
        <div class="nav-links">
            <a href="#tree">Legacy</a>
            <a href="#venue">Venue</a>
            <a href="#apparel">Apparel</a>
        </div>
    </nav>

    <section class="section white-bg" id="tree" style="margin-top:70px;">
        <h2>The 13 Branches</h2>
        <div class="tree-grid" id="tree-engine"></div>
    </section>

    <section class="section navy-bg" id="venue">
        <h2>Venue: Marzon Hotel Kalibo</h2>
        <p>Jaime Cardinal Sin Ave, Andagao, Kalibo, Aklan</p>
        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3886.969894451631!2d122.3582458750734!3d11.708862988514194!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33a593322b10a26d%3A0x62953282b8a07f6e!2sMarzon%20Hotel%20Kalibo!5e0!3m2!1sen!2sph!4v1683156000000" width="100%" height="100%" allowfullscreen=""></iframe>
        </div>
    </section>

    <section class="section" id="apparel" style="background:#f4f4f4;">
        <h2>Official Apparel</h2>
        <div class="apparel-grid">
            <div class="apparel-card">
                <img src="images/apparel_back.jpg" width="100%">
                <div class="apparel-label">T-SHIRT BACK (Nutrition Facts)</div>
            </div>
            <div class="apparel-card">
                <img src="images/apparel_front.jpg" width="100%">
                <div class="apparel-label">T-SHIRT/HOODIE FRONT (Logo Tree)</div>
            </div>
        </div>
    </section>

    <section class="section white-bg">
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://tinyurl.com/SazonGrandReunion">
            <p>Web: tinyurl.com/SazonGrandReunion</p>
        </div>
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform">
            <p>Scan to Register</p>
        </div>
    </section>

    <script>
        const branches = [
            {n: "Serafin", k: "Lolo Apin"}, {n: "Monserat", k: "Lola Monching"}, {n: "Felomina", k: "Lola Mening"},
            {n: "Estrella", k: "Lola Estring"}, {n: "Gregorio", k: "Lolo Gorio"}, {n: "Regino", k: "Lolo Taba"},
            {n: "Maria", k: "Lola Maria"}, {n: "Concepcion", k: "Lola Moret"}, {n: "Cezar", k: "Lolo Cezar"},
            {n: "Priscilla", k: "Lola Mamay"}, {n: "Gloria", k: "Lola Goly"}, {n: "Reynaldo", k: "Lolo Lope"}, {n: "Nilda", k: "Lola Nilda"}
        ];
        const container = document.getElementById('tree-engine');
        branches.forEach(b => {
            container.innerHTML += `<div class="branch-card"><span style="color:var(--sazon-gold); font-size:0.7rem;">(${b.k})</span><h3>${b.n}</h3></div>`;
        });
    </script>
</body>
</html>
