<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon Family Legacy 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --light-gold: #f3e5ab; --black: #000000; }
        body, html { margin: 0; padding: 0; background-color: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* Gate Screen - Fixed Clickability */
        #gate-screen { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1.2s ease; }
        .tap-text { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 5px; margin-bottom: 25px; font-size: 0.7rem; opacity: 0.8; }
        .enter-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 18px 50px; font-family: 'Cinzel', serif; font-size: 1.1rem; cursor: pointer; letter-spacing: 6px; text-transform: uppercase; transition: 0.5s; z-index: 10000; pointer-events: auto; }
        .enter-btn:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 40px var(--gold); }

        /* Main Stage */
        #main-stage { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        #final-banner { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), url('images/banner.jpg'); background-size: cover; background-position: center; opacity: 0; transition: opacity 5s ease; }

        /* Credits Style */
        .credit { font-family: 'Cinzel', serif; font-weight: 400; font-size: clamp(1.2rem, 6vw, 2.2rem); letter-spacing: 12px; color: var(--gold); opacity: 0; position: absolute; width: 100%; transition: all 2s ease; z-index: 10; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); transform: translateY(15px); }
        .sub-credit { font-family: 'Montserrat', sans-serif; font-weight: 200; font-size: 0.8rem; letter-spacing: 8px; color: var(--light-gold); display: block; margin-top: 15px; text-transform: uppercase; }

        /* SOON Reveal - Rectified Alignment */
        #soon-wrap { display: none; flex-direction: column; align-items: center; z-index: 20; opacity: 0; transition: opacity 3s ease; }
        .soon-text { font-family: 'Cinzel', serif; font-size: clamp(4.5rem, 18vw, 10rem); font-weight: 700; color: var(--gold); display: flex; align-items: center; justify-content: center; letter-spacing: 10px; }
        
        /* Proactive Moon O */
        .celestial-o-container { position: relative; width: 1.1em; height: 1.1em; margin: 0 0.1em; display: flex; align-items: center; justify-content: center; }
        .moon-ring { position: absolute; inset: -5%; border: 2px solid var(--gold); border-radius: 50%; animation: rotateHalo 15s linear infinite; opacity: 0.6; box-shadow: 0 0 20px var(--gold); }
        .logo-tree { width: 85%; height: 85%; border-radius: 50%; box-shadow: 0 0 30px var(--gold); object-fit: cover; z-index: 2; border: 1px solid var(--gold); }

        /* Countdown Grid */
        #countdown { margin-top: 40px; font-family: 'Cinzel', serif; color: var(--gold); display: flex; gap: 30px; opacity: 0; transition: opacity 2s ease; z-index: 20; border-top: 1px solid rgba(212, 175, 55, 0.3); padding-top: 20px; }
        .timer-unit { display: flex; flex-direction: column; min-width: 75px; }
        .timer-num { font-size: 2.2rem; font-weight: 700; text-shadow: 0 0 10px var(--gold); }
        .timer-label { font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; font-family: 'Montserrat', sans-serif; }

        /* Animations */
        .visible { opacity: 1 !important; transform: translateY(0) !important; }
        .exit-up { opacity: 0 !important; transform: translateY(-30px) !important; }
        .jive-pulse { animation: jiveBeat 0.58s infinite alternate ease-in-out; }

        @keyframes rotateHalo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes jiveBeat { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.03); filter: brightness(1.2); } }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="tap-text">A LEGACY UNFOLDING</div>
        <button class="enter-btn" id="gateButton">ENTER SAZON LEGACY</button>
    </div>

    <audio id="snd-click" src="audio/click.mp3"></audio>
    <audio id="snd-open" src="audio/open.mp3"></audio>
    <audio id="snd-shimmer" src="audio/shimmer.mp3"></audio>
    <audio id="snd-jingle" src="audio/Gikan_sa_Gamot%2030secTEASER.mp3"></audio>

    <div id="main-stage">
        <div id="final-banner"></div>
        
        <div id="t1" class="credit">A SAZON FAMILY PRODUCTION</div>
        <div id="t2" class="credit">IN HONOR OF<br><span style="font-size: 1.1em; letter-spacing: 15px;">TERESO & TEOFISTA SAZON</span></div>
        <div id="t3" class="credit">JULY 23-24, 2027<span class="sub-credit">MARZON HOTEL • KALIBO, AKLAN</span></div>

        <div id="soon-wrap">
            <div class="soon-text" id="jiveTarget">
                <span>S</span>
                <span>O</span>
                <div class="celestial-o-container">
                    <div class="moon-ring"></div>
                    <img src="images/logo.jpg" class="logo-tree" alt="O">
                </div>
                <span>N</span>
            </div>

            <div id="countdown">
                <div class="timer-unit"><span class="timer-num" id="days">00</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-num" id="hours">00</span><span class="timer-label">Hrs</span></div>
                <div class="timer-unit"><span class="timer-num" id="mins">00</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-num" id="secs">00</span><span class="timer-label">Secs</span></div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('gateButton');
        const aud = {
            click: document.getElementById('snd-click'),
            open: document.getElementById('snd-open'),
            shim: document.getElementById('snd-shimmer'),
            jingle: document.getElementById('snd-jingle')
        };

        btn.addEventListener('click', function() {
            // Unlocking Audio Context
            Object.values(aud).forEach(track => {
                track.play().then(() => {
                    track.pause();
                    track.currentTime = 0;
                }).catch(e => console.log("Init"));
            });

            aud.click.play();
            document.getElementById('gate-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                runCinematic();
            }, 1200);
        });

        function runCinematic() {
            // 0s: Scene 1
            aud.open.play();
            showText('t1', 4000);

            // 5s: Scene 2
            setTimeout(() => {
                aud.shim.play();
                showText('t2', 4500);
            }, 5000);

            // 10s: Scene 3
            setTimeout(() => showText('t3', 4500), 10000);

            // 15s: Finale
            setTimeout(() => {
                document.getElementById('final-banner').classList.add('visible');
                const wrap = document.getElementById('soon-wrap');
                wrap.style.display = 'flex';
                
                setTimeout(() => {
                    wrap.classList.add('visible');
                    document.getElementById('jiveTarget').classList.add('jive-pulse');
                    document.getElementById('countdown').classList.add('visible');
                    startTimer();
                }, 100);

                aud.jingle.volume = 0.1;
                aud.jingle.play();
                let v = 0.1;
                let ramp = setInterval(() => {
                    if (v < 0.7) { v += 0.05; aud.jingle.volume = v; }
                    else clearInterval(ramp);
                }, 400);
            }, 15000);
        }

        function showText(id, delay) {
            const el = document.getElementById(id);
            el.classList.add('visible');
            setTimeout(() => el.classList.add('exit-up'), delay);
        }

        function startTimer() {
            const target = new Date("July 23, 2027 00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const d = target - now;
                document.getElementById('days').innerText = Math.floor(d / 86400000);
                document.getElementById('hours').innerText = Math.floor((d % 86400000) / 3600000);
                document.getElementById('mins').innerText = Math.floor((d % 3600000) / 60000);
                document.getElementById('secs').innerText = Math.floor((d % 60000) / 1000);
            }, 1000);
        }
    </script>
</body>
</html>
