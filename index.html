<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Official Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        /* Banner Section - Optimized for both Desktop and Mobile */
        .header {
            position: relative;
            min-height: 100vh; /* Full screen height on mobile */
            background: url('images/banner.jpg') top center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 10px solid var(--luminous-blue);
        }

        /* Elegant Top Navigation */
        .top-nav {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .nav-logo {
            max-width: 70px;
            background: white;
            padding: 6px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .nav-text {
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            font-size: 0.7rem;
            text-align: right;
        }

        /* Sophisticated Timer Box - Adjusted for Mobile Visibility */
        .timer-container {
            align-self: center; /* Centered on mobile for balance */
            margin: 0 0 60px 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 4px;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        #timer {
            display: flex;
            gap: 15px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            text-align: center;
            color: white;
        }

        .timer-number {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }

        .timer-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Content Area - Pushed down on mobile to reveal the roots */
        .container { 
            max-width: 900px; 
            margin: 0 auto 100px; /* Removed negative margin for mobile */
            padding: 40px 20px; 
            position: relative; 
            z-index: 10; 
        }

        .content-box {
            background: white;
            padding: 60px 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid var(--champagne-silver);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--luminous-blue);
            margin-bottom: 15px;
        }

        .date-location {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #718096;
            font-size: 0.8rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-play {
            background: transparent;
            color: var(--luminous-blue);
            padding: 15px 40px;
            border: 1px solid var(--luminous-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-play:hover {
            background: var(--luminous-blue);
            color: white;
        }

        /* Desktop specific adjustments */
        @media (min-width: 900px) {
            .header { height: 95vh; }
            .container { margin-top: -100px; }
            .timer-container { align-self: flex-end; margin-right: 50px; }
            .nav-logo { max-width: 90px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <img src="images/logo.png" alt="Sazon Logo" class="nav-logo">
            <div class="nav-text">22-23 July 2027<br>Kalibo, Aklan</div>
        </div>

        <div class="timer-container">
            <div id="timer">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2>The Grand Reunion</h2>
            <p class="date-location">Marzon Hotel & Resort • Aklan, Philippines</p>
            
            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <button class="btn-play" onclick="toggleJingle()">🎵 Play Theme</button>
            
            <p style="margin-top: 50px; font-style: italic; color: #cbd5e0; font-size: 0.9rem;">
                "Gikan sa Gamut, Tubtob sa Langit"
            </p>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-number">${h}</span><span class="timer-label">Hrs</span></div>
                <div class="timer-unit"><span class="timer-number">${m}</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-number">${s}</span><span class="timer-label">Secs</span></div>
            `;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            const btn = event.currentTarget;
            if (audio.paused) {
                audio.play().then(() => { btn.innerHTML = "⏸️ Pause Theme"; });
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Theme";
            }
        }
    </script>
</body>
</html>
