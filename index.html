<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* CEREMONIAL ENTRANCE */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; }
        .tap-box { padding: 25px 50px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; text-align: center; background: rgba(197, 160, 89, 0.05); }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 20px; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.6), transparent 50%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 20s ease-out; }
        .bg-active { transform: scale(1.15); }

        /* THE "SOON" GLOSSY TITLE */
        .soon-container { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(20px); transition: 3s 0.5s; }
        .active-ui.soon-container { opacity: 1; transform: translateY(0); }
        .gold-letter { font-family: 'Playfair Display', serif; font-size: clamp(3.8rem, 18vw, 10rem); background: linear-gradient(135deg, #fff 20%, var(--sazon-gold) 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: shine 6s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        /* THE CELESTIAL LOGO "O" */
        .logo-circle-o { width: clamp(3.2rem, 15vw, 8.5rem); height: clamp(3.2rem, 15vw, 8.5rem); margin: 0 8px; border-radius: 50%; overflow: hidden; border: 1.5px solid rgba(197, 160, 89, 0.6); box-shadow: 0 0 40px rgba(197, 160, 89, 0.4); position: relative; background: #000; animation: pulse-glow 4s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); transform: scale(1); } 50% { box-shadow: 0 0 50px rgba(197, 160, 89, 0.6); transform: scale(1.02); } }
        .logo-circle-o img { width: 100%; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .tagline { color: var(--sazon-gold); letter-spacing: clamp(6px, 3vw, 12px); text-transform: uppercase; font-size: 0.65rem; font-weight: 600; margin: 25px 0 35px 0; opacity: 0; transition: 2s 1.5s; z-index: 10; text-align: center; }

        /* POLISHED COUNTDOWN TIMER */
        .timer-wrapper { position: relative; z-index: 10; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); padding: 20px 40px; border-radius: 2px; opacity: 0; transition: 2.5s 2.2s; }
        .timer-container { display: flex; gap: 25px; align-items: center; }
        .timer-box { text-align: center; min-width: 75px; }
        .timer-val { display: block; font-size: clamp(2rem, 7vw, 2.8rem); font-weight: 700; font-family: 'Playfair Display', serif; background: linear-gradient(180deg, #fff 40%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-label { font-size: 0.55rem; letter-spacing: 3px; text-transform: uppercase; color: #fff; opacity: 0.6; margin-top: 5px; display: block; }
        .timer-divider { font-size: 1.5rem; color: var(--sazon-gold); opacity: 0.5; font-family: 'Playfair Display', serif; padding-bottom: 20px; }

        /* ELEGANT AUDIO CONTROL */
        .audio-control { position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.3); padding: 12px; border-radius: 50%; cursor: pointer; opacity: 0; transition: 2s 3s; }
        .active-ui.audio-control { opacity: 1; }

        .ticket-section { background: #fff; padding: 100px 20px; text-align: center; color: var(--sazon-navy); }
        .ticket-container { max-width: 800px; margin: 0 auto; background: #fffdf5; border: 1px solid var(--sazon-gold); padding: 50px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff !important; padding: 20px 50px; text-decoration: none; font-weight: 700; letter-spacing: 4px; margin-top: 30px; font-size: 0.75rem; text-transform: uppercase; transition: 0.4s; cursor: pointer; }
        .credits-bar { position: absolute; bottom: 30px; width: 90%; display: flex; justify-content: space-between; opacity: 0; transition: 2s 2.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; z-index: 10; }
        
        @media (max-width: 600px) { .timer-wrapper { padding: 15px 10px; } .timer-container { gap: 10px; } .timer-box { min-width: 45px; } .timer-divider { display: none; } .credits-bar { flex-direction: column; text-align: center; gap: 10px; align-items: center; } }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">SAZON 2027<br><br><span style="font-size:0.5rem; letter-spacing:4px;">ENTER THE LEGACY</span></div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        <div class="soon-container" id="soon-ui">
            <span class="gold-letter">S</span><span class="gold-letter">O</span>
            <div class="logo-circle-o"><img src="images/logo.png" alt="Sazon Logo"></div>
            <span class="gold-letter">N</span>
        </div>
        <p class="tagline" id="tag-ui">Gikan sa gamut, tubtob sa langit</p>
        <div class="timer-wrapper" id="timer-ui">
            <div class="timer-container">
                <div class="timer-box"><span class="timer-val" id="days">00</span><span class="timer-label">Days</span></div>
                <div class="timer-divider">:</div>
                <div class="timer-box"><span class="timer-val" id="hours">00</span><span class="timer-label">Hours</span></div>
                <div class="timer-divider">:</div>
                <div class="timer-box"><span class="timer-val" id="mins">00</span><span class="timer-label">Mins</span></div>
                <div class="timer-divider">:</div>
                <div class="timer-box"><span class="timer-val" id="secs">00</span><span class="timer-label">Secs</span></div>
            </div>
        </div>
        <div class="credits-bar" id="credits-ui">
            <div>A SAZON PRODUCTION</div>
            <div style="text-align:right;">JULY 23-24, 2027<br>MARZON HOTEL, KALIBO</div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:2.2rem; margin:0;">The Golden Ticket</h2>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=sharing" target="_blank" class="btn-gold" id="ticket-btn">SECURE YOUR SPOT →</a>
        </div>
    </div>

    <div class="audio-control" id="mute-btn" onclick="toggleMute()">
        <span id="audio-icon" style="color:var(--sazon-gold); font-size: 1.2rem;">🔊</span>
    </div>

    <audio id="sfx-open" src="audio/open.mp3"></audio>
    <audio id="sfx-jingle" src="audio/jingle.mp3" loop></audio>
    <audio id="sfx-click" src="audio/click.mp3"></audio>

    <script>
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();

        function toggleMute() {
            const jingle = document.getElementById('sfx-jingle');
            const icon = document.getElementById('audio-icon');
            jingle.muted = !jingle.muted;
            icon.innerText = jingle.muted ? "🔇" : "🔊";
        }

        document.getElementById('ticket-btn').addEventListener('click', () => {
            document.getElementById('sfx-click').play();
        });

        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1200);
            
            // Audio Sequence
            const openSfx = document.getElementById('sfx-open');
            const jingle = document.getElementById('sfx-jingle');
            
            openSfx.play();
            
            // Fade-in Jingle
            setTimeout(() => {
                jingle.volume = 0;
                jingle.play();
                let vol = 0;
                const fadeIn = setInterval(() => {
                    if (vol < 0.5) {
                        vol += 0.05;
                        jingle.volume = vol;
                    } else {
                        clearInterval(fadeIn);
                    }
                }, 200);
            }, 1000);

            // UI Reveals
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('soon-ui').classList.add('active-ui');
            document.getElementById('mute-btn').classList.add('active-ui');
            setTimeout(() => { document.getElementById('tag-ui').style.opacity = '1'; }, 1000);
            setTimeout(() => { document.getElementById('timer-ui').style.opacity = '1'; }, 1800);
            setTimeout(() => { document.getElementById('credits-ui').style.opacity = '1'; }, 2500);
        }
    </script>
</body>
</html>
