<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .gold-txt { color: var(--sazon-gold); }
        /* INTRO OVERLAY */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; transition: opacity 1.5s; }
        .credit { font-family:'Cinzel'; color:var(--sazon-gold); font-size:1.5rem; letter-spacing:8px; opacity:0; transform:translateY(20px); transition:0.8s; margin:10px 0; }
        .reveal { opacity:1; transform:translateY(0); }
        /* HERO */
        .stage { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; position:relative; background: linear-gradient(to bottom, rgba(0,26,77,0.7), #000); }
        .timer-box { background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); padding:30px; border:1px solid var(--sazon-gold); display:flex; gap:20px; }
        /* CONTENT */
        .section { padding:100px 20px; text-align:center; }
        .tree-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; max-width:1200px; margin:50px auto; }
        .branch-card { background:#fff; color:#333; padding:20px; border-top:4px solid var(--sazon-gold); }
        .apparel-grid { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; }
        .apparel-card { width:350px; background:#fff; padding:20px; color:#333; }
        .nav { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.9); padding:20px; z-index:1000; text-align:center; transform:translateY(-100%); transition:1s; }
        .nav.active { transform:translateY(0); }
    </style>
</head>
<body onload="init()">
    <div id="overlay" onclick="enter()">
        <h1 class="credit" id="c1">SAZON PRODUCTION</h1>
        <h1 class="credit" id="c2">MARZON HOTEL KALIBO</h1>
        <h1 class="credit" id="c3">JULY 2027</h1>
        <div class="credit" id="c4" style="border:1px solid var(--sazon-gold); padding:10px 30px;">TAP TO ENTER</div>
    </div>

    <nav class="nav" id="nav">
        <a href="#tree" style="color:white; margin:0 20px; text-decoration:none;">LEGACY</a>
        <a href="#venue" style="color:white; margin:0 20px; text-decoration:none;">VENUE</a>
        <a href="#apparel" style="color:white; margin:0 20px; text-decoration:none;">APPAREL</a>
    </nav>

    <section class="stage" id="home">
        <h1 style="font-family:'Cinzel'; font-size:5rem;">SAZON</h1>
        <div class="timer-box" id="timer"></div>
    </section>

    <section class="section" id="tree">
        <h2>THE 13 BRANCHES</h2>
        <div class="tree-grid" id="grid"></div>
    </section>

    <section class="section" id="venue" style="background:var(--sazon-navy)">
        <h2>VENUE: MARZON HOTEL KALIBO</h2>
        <p>Aklan's Premier Heritage Destination</p>
        <div class="qr-card" style="margin-top:40px; background:#fff; display:inline-block; padding:20px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform">
            <p style="color:#000; font-size:0.7rem;">SCAN TO REGISTER</p>
        </div>
    </section>

    <section class="section" id="apparel" style="background:#f4f4f4; color:#000;">
        <h2>OFFICIAL APPAREL</h2>
        <div class="apparel-grid">
            <div class="apparel-card">
                <div style="height:300px; background:#ddd; margin-bottom:10px;"></div>
                <div style="font-weight:700; border-left:4px solid var(--sazon-gold); padding-left:10px; text-align:left;">T-SHIRT BACK (NUTRITION FACTS)</div>
            </div>
            <div class="apparel-card">
                <div style="height:300px; background:#ddd; margin-bottom:10px;"></div>
                <div style="font-weight:700; border-left:4px solid var(--sazon-gold); padding-left:10px; text-align:left;">T-SHIRT/HOODIE FRONT (LOGO TREE)</div>
            </div>
        </div>
    </section>

    <script>
        function init() {
            const branches = [
                {n:"Serafin",k:"Lolo Apin"}, {n:"Monserat",k:"Lola Monching"}, {n:"Felomina",k:"Lola Mening"},
                {n:"Estrella",k:"Lola Estring"}, {n:"Gregorio",k:"Lolo Gorio"}, {n:"Regino",k:"Lolo Taba"},
                {n:"Maria",k:"Lola Maria"}, {n:"Concepcion",k:"Lola Moret"}, {n:"Cezar",k:"Lolo Cezar"},
                {n:"Priscilla",k:"Lola Mamay"}, {n:"Gloria",k:"Lola Goly"}, {n:"Reynaldo",k:"Lolo Lope"}, {n:"Nilda",k:"Lola Nilda"}
            ];
            const g = document.getElementById('grid');
            branches.forEach(b => g.innerHTML += `<div class="branch-card"><small style="color:var(--sazon-gold)">(${b.k})</small><h3>${b.n}</h3></div>`);
            
            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 300);
            setTimeout(() => document.getElementById('c2').classList.add('reveal'), 1100);
            setTimeout(() => document.getElementById('c3').classList.add('reveal'), 1900);
            setTimeout(() => document.getElementById('c4').classList.add('reveal'), 2700);
        }
        function enter() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display='none'; document.getElementById('nav').classList.add('active'); }, 1000);
        }
        setInterval(() => {
            const d = new Date("July 23, 2027");
            const diff = d - new Date();
            document.getElementById('timer').innerHTML = `<div>${Math.floor(diff/86400000)}<br><small>DAYS</small></div><div>${Math.floor((diff%86400000)/3600000)}<br><small>HRS</small></div>`;
        }, 1000);
    </script>
</body>
</html>
