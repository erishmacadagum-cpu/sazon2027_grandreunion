<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; --sazon-silver: #c0c0c0; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* THE CEREMONIAL ENTRANCE */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; }
        .tap-box { padding: 30px 60px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.8rem; text-align: center; }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; overflow: hidden; padding: 40px 0; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.5), transparent 40%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 15s ease-out; }
        .bg-active { transform: scale(1.15); }
        
        /* CELESTIAL LOGO SYSTEM */
        .logo-anchor { position: relative; z-index: 20; opacity: 0; transform: translateY(-30px); transition: 3s; }
        .logo-img { width: 180px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); position: relative; z-index: 5; }
        
        /* The Glow Effect (Dynamic) */
        .celestial-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border-radius: 50%; filter: blur(40px); opacity: 0; transition: 5s 1.2s; z-index: 1; }
        .active-ui .celestial-glow { opacity: 0.6; }
        .day-glow { background: radial-gradient(circle, var(--sazon-gold) 0%, transparent 70%); }
        .night-glow { background: radial-gradient(circle, var(--sazon-silver) 0%, transparent 70%); }

        /* COUNTDOWN TIMER */
        .timer-container { position: relative; z-index: 10; display: flex; gap: 20px; margin-bottom: 20px; opacity: 0; transition: 2.5s 2s; }
        .timer-box { text-align: center; min-width: 70px; }
        .timer-val { display: block; font-size: 2rem; font-weight: 600; font-family: 'Playfair Display', serif; color: var(--sazon-gold); }
        .timer-label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; }

        .hero-center { position: relative; z-index: 10; text-align: center; opacity: 0; transition: 2.5s 0.5s; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6.5rem); margin: 0; background: linear-gradient(180deg, #fff 50%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .credits-bar { position: relative; z-index: 10; width: 90%; max-width: 1400px; display: flex; justify-content: space-between; align-items: flex-end; opacity: 0; transition: 2.5s 1.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .active-ui { opacity: 1 !important; transform: translateY(0) !important; }

        /* REGISTRATION BOX */
        .ticket-section { background: #fdfdfd; padding: 100px 20px; text-align: center; color: var(--sazon-navy); }
        .ticket-container { max-width: 850px; margin: 0 auto; background: #fffdf5; border: 2px solid var(--sazon-gold); padding: 60px 40px; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.15); }
        .btn-gold { display: inline-block; background: var(--sazon-navy); color: #fff !important; padding: 22px 60px; text-decoration: none !important; font-weight: 700; letter-spacing: 5px; margin-top: 40px; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        .btn-gold:hover { background: var(--sazon-gold); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">SAZON GRAND FAMILY REUNION 2027<br><br><span style="font-size:0.6rem; letter-spacing:4px;">TAP TO ENTER THE EXPERIENCE</span></div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        
        <div class="logo-anchor" id="logo-ui">
            <div id="celestial-body" class="celestial-glow"></div>
            <img src="images/logo.png" class="logo-img">
        </div>

        <div class="hero-center" id="title-ui">
            <h1 class="main-title">SAZON 2027</h1>
            <p style="color:var(--sazon-gold); letter-spacing:12px; font-weight:600; text-transform:uppercase; font-size:0.8rem; margin: 10px 0;">Gikan sa gamut, tubtob sa langit</p>
            
            <div class="timer-container" id="timer-ui">
                <div class="timer-box"><span class="timer-val" id="days">00</span><span class="timer-label">Days</span></div>
                <div class="timer-box"><span class="timer-val" id="hours">00</span><span class="timer-label">Hrs</span></div>
                <div class="timer-box"><span class="timer-val" id="mins">00</span><span class="timer-label">Min</span></div>
                <div class="timer-box"><span class="timer-val" id="secs">00</span><span class="timer-label">Sec</span></div>
            </div>
        </div>

        <div class="credits-bar" id="credits-ui">
            <div style="font-size:0.7rem; letter-spacing:4px; font-weight:600;">A SAZON PRODUCTION<br><span style="color:var(--sazon-gold)">FAMILY HERITAGE HUB</span></div>
            <div style="font-size:0.7rem; letter-spacing:4px; text-align:right; font-weight:600;">JULY 23-24, 2027<br><span style="color:var(--sazon-gold)">MARZON HOTEL, KALIBO</span></div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:3rem; margin:0;">The Golden Ticket</h2>
            <p style="letter-spacing:5px; color:var(--sazon-gold); font-weight:600; margin-top:10px;">OFFICIAL REGISTRATION</p>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfEJ7OYVdgZjF3eB7isXCkfIVfjnVz8eZB2zT37pBvHx8JhWg/viewform?usp=sharing" target="_blank" rel="noopener noreferrer" class="btn-gold">SECURE YOUR SPOT →</a>
        </div>
    </div>

    <audio id="sfx" src="audio/open.mp3"></audio>

    <script>
        // 1. CELESTIAL LOGO LOGIC
        const hour = new Date().getHours();
        const celestial = document.getElementById('celestial-body');
        if (hour >= 6 && hour < 18) {
            celestial.classList.add('day-glow'); // Sun glow for daytime
        } else {
            celestial.classList.add('night-glow'); // Moon glow for nighttime
        }

        // 2. PRECISION COUNTDOWN
        const targetDate = new Date("July 23, 2027 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 3. ENTRANCE SEQUENCE
        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1200);
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('logo-ui').classList.add('active-ui');
            setTimeout(() => { document.getElementById('title-ui').classList.add('active-ui'); }, 600);
            setTimeout(() => { document.getElementById('credits-ui').classList.add('active-ui'); }, 1500);
            setTimeout(() => { document.getElementById('timer-ui').classList.add('active-ui'); }, 2200);
            document.getElementById('sfx').play().catch(e => {});
        }
    </script>
</body>
</html>
