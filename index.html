<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Opening</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sazon-navy: #001a4d; 
            --sazon-gold: #c5a059; 
            --white-glass: rgba(255, 255, 255, 0.05);
        }

        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; }

        /* THE CINEMATIC STAGE */
        .stage {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
        }

        /* BACKGROUND WITH SLOW-ZOOM MAGIC */
        .cinematic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(0,26,77,0.85), rgba(0,26,77,0.1) 50%, #000 100%),
                url('images/banner.jpg') center/cover no-repeat;
            animation: masterSlowZoom 25s infinite alternate ease-in-out;
            z-index: 1;
        }

        /* LUMINOUS LOGO ANCHOR */
        .logo-anchor {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            animation: fadeIn 3s ease-in;
        }

        .logo-img {
            width: 140px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* OPENING CREDITS SYSTEM */
        .credits-wrapper {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 5vh;
        }

        .center-brand { text-align: center; opacity: 0; animation: scaleReveal 2.5s forwards 0.5s; }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 10vw, 7rem);
            margin: 0;
            background: linear-gradient(180deg, #ffffff 40%, var(--sazon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }

        /* PROFESSIONAL TIMER PLACEMENT */
        .timer-portal {
            position: relative;
            z-index: 10;
            margin-bottom: 12vh;
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: revealUp 2s forwards 2.5s;
        }

        .timer-unit {
            background: var(--white-glass);
            backdrop-filter: blur(30px);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
        }

        .t-val { display: block; font-family: 'Playfair Display'; font-size: 3.5rem; font-weight: 700; color: #fff; }
        .t-lbl { font-size: 0.6rem; letter-spacing: 5px; color: var(--sazon-gold); text-transform: uppercase; }

        /* ANIMATIONS */
        @keyframes masterSlowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes scaleReveal { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes revealUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* THE DASHBOARD HUB */
        .hub-section { background: white; padding: 120px 0; color: var(--sazon-navy); }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .hub-link { 
            padding: 60px; border: 1px solid #f0f0f0; text-decoration: none; color: inherit; 
            text-align: center; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .hub-link:hover { background: var(--sazon-navy); color: white; transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body onclick="executeOpening()">

    <!-- CINEMATIC AUDIO -->
    <audio id="openingSfx" src="audio/open.mp3"></audio>

    <div class="logo-anchor">
        <img src="images/logo.png" class="logo-img" alt="Sazon Official Logo">
    </div>

    <div class="stage">
        <div class="cinematic-bg"></div>

        <div class="credits-wrapper">
            <div style="width: 25%; text-align: left; opacity: 0; animation: fadeIn 2s forwards 1.5s;">
                <p style="font-size: 0.6rem; letter-spacing: 4px;">THE SAZON CLAN<br>LEGACY SERIES</p>
            </div>

            <div class="center-brand">
                <h1 class="main-title">SAZON 2027</h1>
                <p style="color: var(--sazon-gold); letter-spacing: 12px; font-weight: 300; margin-top: 10px;">GIKAN SA GAMUT, TUBTOB SA LANGIT</p>
            </div>

            <div style="width: 25%; text-align: right; opacity: 0; animation: fadeIn 2s forwards 1.5s;">
                <p style="font-family: 'Playfair Display'; font-size: 1.2rem;">MARZON HOTEL<br><span style="font-size: 0.6rem; font-family: 'Montserrat'; letter-spacing: 3px;">KALIBO, AKLAN</span></p>
            </div>
        </div>

        <div class="timer-portal">
            <div class="timer-unit"><span id="d" class="t-val">00</span><span class="t-lbl">Days</span></div>
            <div class="timer-unit"><span id="h" class="t-val">00</span><span class="t-lbl">Hrs</span></div>
            <div class="timer-unit"><span id="m" class="t-val">00</span><span class="t-lbl">Mins</span></div>
            <div class="timer-unit"><span id="s" class="t-val">00</span><span class="t-lbl">Secs</span></div>
        </div>
    </div>

    <div class="hub-section">
        <div class="hub-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="hub-link">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem;">Registration</h3>
                <p style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.5;">Secure Your Seat</p>
            </a>
            <div class="hub-link" style="cursor:pointer;" onclick="alert('Playing Anthem...')">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem;">Family Anthem</h3>
                <p style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.5;">Roots & Aspirations</p>
            </div>
            <a href="#" class="hub-link">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem;">Digital Hub</h3>
                <p style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.5;">Resource Archive</p>
            </a>
        </div>
    </div>

    <script>
        function executeOpening() {
            const sfx = document.getElementById('openingSfx');
            sfx.volume = 0.6;
            sfx.play();
        }

        // Live Countdown to July 23, 2027
        const eventDate = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = eventDate - now;
            document.getElementById('d').innerText = Math.floor(gap / 86400000);
            document.getElementById('h').innerText = Math.floor((gap % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((gap % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((gap % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
