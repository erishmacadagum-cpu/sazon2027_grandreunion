<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 - Official Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --luminous-blue: #0047AB; 
            --champagne-silver: #E5E4E2;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        .header {
            position: relative;
            height: 90vh;
            background: url('images/banner.jpg') top center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 8px solid var(--luminous-blue);
        }

        .top-nav {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .nav-logo {
            max-width: 75px;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .nav-text {
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            font-size: 0.7rem;
            text-align: right;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .timer-container {
            align-self: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #timer { display: flex; gap: 20px; }
        .timer-unit { display: flex; flex-direction: column; text-align: center; color: white; }
        .timer-number { font-size: 2rem; font-weight: 600; color: var(--gold); line-height: 1; }
        .timer-label { font-size: 0.6rem; text-transform: uppercase; margin-top: 6px; }

        .container { 
            max-width: 900px; 
            margin: 0 auto 80px; 
            padding: 60px 20px; 
            position: relative; 
            z-index: 10; 
        }

        .content-box {
            background: white;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            text-align: center;
            border-radius: 4px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3rem);
            color: var(--luminous-blue);
            margin-bottom: 10px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }

        .hub-btn {
            background: white;
            border: 2px solid var(--luminous-blue);
            border-radius: 8px;
            padding: 20px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .hub-btn:hover {
            background: var(--luminous-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 71, 171, 0.1);
        }

        .hub-btn .icon { font-size: 1.5rem; margin-bottom: 10px; }
        .hub-btn .text { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: var(--luminous-blue); letter-spacing: 1px; }
        .hub-btn:hover .text { color: white; }

        .qr-section {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid #edf2f7;
        }

        .qr-image {
            width: 140px;
            height: 140px;
            padding: 8px;
            border: 1px solid var(--champagne-silver);
            border-radius: 12px;
        }

        .slogan-footer { font-style: italic; color: #a0aec0; font-size: 0.9rem; margin-top: 30px; }

        @media (min-width: 1024px) {
            .header { height: 95vh; }
            .timer-container { align-self: flex-end; margin-right: 60px; }
            .container { margin-top: -60px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <img src="images/logo.png" alt="Sazon Logo" class="nav-logo">
            <div class="nav-text">22-23 JULY 2027<br>KALIBO, AKLAN</div>
        </div>

        <div class="timer-container">
            <div id="timer">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="content-box">
            <h2>Sazon 2027 Hub</h2>
            <p style="color: #718096; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Marzon Hotel & Resort</p>

            <div class="hub-grid">
                <a href="#" class="hub-btn">
                    <span class="icon">📝</span>
                    <span class="text">Register</span>
                </a>
                <button class="hub-btn" onclick="toggleJingle()">
                    <span class="icon">🎵</span>
                    <span class="text">Theme Song</span>
                </button>
                <a href="http://googleusercontent.com/maps.google.com/2" target="_blank" class="hub-btn">
                    <span class="icon">📍</span>
                    <span class="text">Venue Map</span>
                </a>
                <a href="#" class="hub-btn">
                    <span class="icon">👕</span>
                    <span class="text">Apparel</span>
                </a>
            </div>

            <audio id="jingleAudio" src="audio/jingle.mp3"></audio>
            <p class="slogan-footer">"Gikan sa Gamut, Tubtob sa Langit"</p>

            <div class="qr-section">
                <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #a0aec0; margin-bottom: 15px;">Official Clan QR Code</p>
                <img src="images/qr-code.png" alt="Scan for Access" class="qr-image">
            </div>
        </div>
    </div>

    <script>
        const eventDate = new Date("July 22, 2027 08:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `
                <div class="timer-unit"><span class="timer-number">${d}</span><span class="timer-label">Days</span></div>
                <div class="timer-unit"><span class="timer-number">${h}</span><span class="timer-label">Hrs</span></div>
                <div class="timer-unit"><span class="timer-number">${m}</span><span class="timer-label">Mins</span></div>
                <div class="timer-unit"><span class="timer-number">${s}</span><span class="timer-label">Secs</span></div>
            `;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleJingle() {
            const audio = document.getElementById("jingleAudio");
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }
    </script>
</body>
</html>
