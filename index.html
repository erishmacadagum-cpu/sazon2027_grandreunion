<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Opening</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sazon-navy: #002366; 
            --sazon-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; }

        /* CINEMATIC STAGE */
        .stage {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pushes content lower for balance */
            align-items: center;
            overflow: hidden;
        }

        /* BACKGROUND WITH SLOW-ZOOM MAGIC */
        .cinematic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(0,35,102,0.8), rgba(0,35,102,0.2) 60%, #000 100%),
                url('images/banner.jpg') center/cover no-repeat;
            animation: cinematicZoom 25s infinite alternate ease-in-out;
            z-index: 1;
        }

        /* OPENING CREDITS ARCHITECTURE */
        .credits-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5vh;
            animation: fadeIn 3s ease-in;
        }

        .credit-side {
            width: 30%;
            opacity: 0;
            animation: slideIn 2s forwards 1s;
        }

        .credit-center {
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        .hero-h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--sazon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
        }

        /* LOWERED MASTER TIMER */
        .timer-portal {
            position: relative;
            z-index: 10;
            margin-bottom: 8vh; /* Lowered placement */
            display: flex;
            gap: 20px;
            animation: fadeInUp 2s forwards 2s;
            opacity: 0;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 25px 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .timer-num { display: block; font-family: 'Playfair Display'; font-size: 3.5rem; font-weight: 700; color: #fff; }
        .timer-label { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--sazon-gold); }

        /* ANIMATIONS */
        @keyframes cinematicZoom { from { transform: scale(1); } to { transform: scale(1.15); } }
        @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        /* INTERACTIVE DASHBOARD */
        .content-hub { background: white; padding: 100px 50px; color: var(--sazon-navy); text-align: center; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .nav-item { padding: 50px; border: 1px solid #eee; border-radius: 30px; text-decoration: none; color: inherit; transition: 0.5s; font-weight: 600; }
        .nav-item:hover { background: var(--sazon-navy); color: white; transform: translateY(-15px); }

    </style>
</head>
<body onclick="startCinematic()">

    <!-- MAGICAL AUDIO ENGINE -->
    <audio id="ambientMagic" src="audio/magical-sweep.mp3" loop></audio>
    <audio id="clickSound" src="audio/click.mp3"></audio>

    <div class="stage">
        <div class="cinematic-bg"></div>

        <div class="credits-container">
            <div class="credit-side" style="text-align: left; animation: slideIn 2s forwards 1.5s;">
                <img src="images/logo.png" style="width: 100px; filter: invert(1);">
                <p style="font-size: 0.8rem; letter-spacing: 3px;">SAZON CLAN<br>EST. 2027</p>
            </div>

            <div class="credit-center">
                <p style="letter-spacing: 15px; text-transform: uppercase; font-weight: 300; font-size: 0.9rem;">The Grand Family Reunion</p>
                <h1 class="hero-h1">SAZON 2027</h1>
                <p style="color: var(--sazon-gold); letter-spacing: 6px; font-weight: 400;">GIKAN SA GAMUT, TUBTOB SA LANGIT</p>
            </div>

            <div class="credit-side" style="text-align: right; animation: slideInRight 2s forwards 1.5s;">
                <p style="font-size: 0.8rem; letter-spacing: 3px;">OFFICIAL VENUE</p>
                <p style="font-size: 1.2rem; font-family: 'Playfair Display';">MARZON HOTEL<br>KALIBO, AKLAN</p>
            </div>
        </div>

        <div class="timer-portal">
            <div class="timer-box"><span id="d" class="timer-num">00</span><span class="timer-label">Days</span></div>
            <div class="timer-box"><span id="h" class="timer-num">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-box"><span id="m" class="timer-num">00</span><span class="timer-label">Mins</span></div>
            <div class="timer-box"><span id="s" class="timer-num">00</span><span class="timer-label">Secs</span></div>
        </div>
    </div>

    <div class="content-hub">
        <div class="nav-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="nav-item">REUNION REGISTRATION</a>
            <div class="nav-item" style="cursor:pointer;" onclick="alert('Playing Anthem...')">FAMILY ANTHEM</div>
            <a href="#" class="nav-item">RESOURCE HUB</a>
        </div>
    </div>

    <script>
        function startCinematic() {
            document.getElementById('ambientMagic').play();
            document.getElementById('ambientMagic').volume = 0.5;
        }

        const targetDate = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = targetDate - now;
            document.getElementById('d').innerText = Math.floor(gap / 86400000);
            document.getElementById('h').innerText = Math.floor((gap % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((gap % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((gap % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
