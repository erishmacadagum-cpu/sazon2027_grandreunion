<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Grand Family Reunion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sazon-navy: #002366; 
            --sazon-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.97);
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #f4f7f9; color: var(--sazon-navy); }

        /* THE AESTHETIC COVER (HERO) */
        .hero {
            position: relative;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
            overflow: hidden;
            /* Using your artwork with a professional gradient scrim */
            background: 
                linear-gradient(to bottom, rgba(0,35,102,0.7) 0%, rgba(0,35,102,0.3) 40%, rgba(244,247,249,1) 100%),
                url('images/banner.jpg') center/cover no-repeat fixed;
        }

        .hero-logo {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            border-radius: 10px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 10vw, 6rem);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            margin-top: 10px;
            color: var(--sazon-gold);
        }

        /* GLASS COUNTDOWN */
        .timer-row { 
            display: flex; 
            gap: 15px; 
            margin-top: 40px; 
            animation: fadeInUp 1s ease-out;
        }
        .timer-block { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 90px;
        }
        .timer-val { display: block; font-family: 'Playfair Display'; font-size: 2.5rem; font-weight: 700; }
        .timer-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        /* THE MASTER CONTAINER */
        .master-hub { 
            max-width: 1100px; 
            margin: -80px auto 100px; 
            background: var(--glass); 
            padding: 60px; 
            border-radius: 40px 40px 20px 20px; 
            box-shadow: 0 50px 100px rgba(0,35,102,0.1);
            position: relative;
            z-index: 10;
        }

        .qr-box { position: absolute; top: -50px; right: 60px; text-align: center; }
        .qr-img { width: 110px; padding: 10px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .slogan-banner { 
            font-weight: 600; 
            letter-spacing: 5px; 
            color: var(--sazon-navy); 
            text-align: center; 
            display: block; 
            margin-bottom: 50px;
        }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .nav-card { 
            padding: 40px 20px; 
            background: #fff; 
            border: 1px solid #edf2f7; 
            border-radius: 20px; 
            text-decoration: none; 
            color: var(--sazon-navy); 
            transition: 0.4s; 
            text-align: center;
            font-weight: 600;
        }
        .nav-card:hover { transform: translateY(-10px); background: var(--sazon-navy); color: #fff; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="images/logo.png" class="hero-logo" alt="Sazon 2027">
        <h1>SAZON 2027</h1>
        <p>Gikan sa Gamut, Tubtob sa Langit</p>

        <div class="timer-row">
            <div class="timer-block"><span id="d" class="timer-val">00</span><span class="timer-label">Days</span></div>
            <div class="timer-block"><span id="h" class="timer-val">00</span><span class="timer-label">Hours</span></div>
            <div class="timer-block"><span id="m" class="timer-val">00</span><span class="timer-label">Mins</span></div>
            <div class="timer-block"><span id="s" class="timer-val">00</span><span class="timer-label">Secs</span></div>
        </div>
    </div>

    <div class="master-hub">
        <div class="qr-box">
            <img src="images/qr-code.png" class="qr-img">
            <p style="font-size: 0.6rem; color: #fff; margin-top: 10px;">SCAN TO JOIN</p>
        </div>

        <span class="slogan-banner">OFFICIAL DIGITAL HUB & RESOURCE CENTER</span>

        <div class="nav-grid">
            <a href="https://forms.gle/1yqyfMtXBCt3X9Dn6" target="_blank" class="nav-card">REUNION REGISTRATION</a>
            <div class="nav-card" style="cursor:pointer;" onclick="alert('Playing Theme Song...')">PLAY THEME SONG</div>
            <a href="#" class="nav-card">MEMBER RESOURCE HUB</a>
        </div>
    </div>

    <script>
        // Set the reunion date
        const target = new Date("July 23, 2027 08:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = target - now;
            document.getElementById('d').innerText = Math.floor(gap / 86400000);
            document.getElementById('h').innerText = Math.floor((gap % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((gap % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((gap % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
