<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | The Grand Family Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* THE BLACK SCREEN CEREMONY */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s; }
        .tap-box { padding: 30px 60px; border: 1px solid var(--sazon-gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.8rem; text-align: center; pointer-events: none; }

        /* CINEMATIC STAGE */
        .stage { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; overflow: hidden; padding: 60px 0; box-sizing: border-box; }
        .cinematic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,26,77,0.5), transparent 40%, #000 100%), url('images/banner.jpg') center/cover no-repeat; z-index: 1; transition: transform 15s ease-out; }
        .bg-active { transform: scale(1.15); }
        
        .logo-anchor { position: relative; z-index: 20; opacity: 0; transform: translateY(-30px); transition: 3s; }
        .logo-img { width: 160px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        
        .logo-anchor::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(197, 160, 89, 0.25) 0%, transparent 70%); opacity: 0; transition: 5s 1.2s; pointer-events: none; }
        .active-ui.logo-anchor::after { opacity: 1; }

        .hero-center { position: relative; z-index: 10; text-align: center; opacity: 0; transition: 2.5s 0.5s; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 7.5rem); margin: 0; background: linear-gradient(180deg, #fff 50%, var(--sazon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .credits-bar { position: relative; z-index: 10; width: 90%; max-width: 1400px; display: flex; justify-content: space-between; align-items: flex-end; opacity: 0; transition: 2.5s 1.5s; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .active-ui { opacity: 1 !important; transform: translateY(0) !important; }

        /* THE REGISTRATION HUB (The Golden Ticket) */
        .ticket-section { background: #fdfdfd; padding: 120px 20px; text-align: center; color: var(--sazon-navy); position: relative; z-index: 5; }
        .ticket-container { max-width: 850px; margin: 0 auto; background: #fffdf5; border: 2px solid var(--sazon-gold); padding: 80px 40px; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.15); }
        
        /* Inner Border - We set pointer-events:none so it doesn't block the click */
        .ticket-container::before { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 1px solid var(--sazon-gold); pointer-events: none; opacity: 0.3; }

        .qr-frame { width: 200px; height: 200px; margin: 30px auto; background: #fff; padding: 15px; border: 1px solid #eee; display: block; position: relative; z-index: 100; }
        .qr-frame img { width: 100%; height: 100%; }
        
        /* HIGH-PRIORITY BUTTON */
        .btn-action { 
            display: inline-block; 
            background: var(--sazon-navy); 
            color: #ffffff !important; 
            padding: 22px 60px; 
            text-decoration: none !important; 
            font-weight: 700; 
            letter-spacing: 5px; 
            margin-top: 40px; 
            font-size: 0.9rem; 
            text-transform: uppercase;
            position: relative;
            z-index: 1000; /* Moves it to the absolute top layer */
            transition: 0.3s;
            border-radius: 0;
            box-shadow: 0 10px 20px rgba(0,26,77,0.2);
        }
        .btn-action:hover { background: var(--sazon-gold); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchHub()">
        <div class="tap-box">SAZON GRAND FAMILY REUNION 2027<br><br><span style="font-size:0.6rem; letter-spacing:4px;">TAP TO ENTER THE HUB</span></div>
    </div>

    <div class="stage">
        <div class="cinematic-bg" id="bg"></div>
        <div class="logo-anchor" id="logo-ui"><img src="images/logo.png" class="logo-img"></div>
        <div class="hero-center" id="title-ui">
            <h1 class="main-title">SAZON 2027</h1>
            <p style="color:var(--sazon-gold); letter-spacing:12px; font-weight:600; text-transform:uppercase; font-size:0.9rem;">Gikan sa gamut, tubtob sa langit</p>
        </div>
        <div class="credits-bar" id="credits-ui">
            <div style="font-size:0.75rem; letter-spacing:4px; font-weight:600;">A SAZON PRODUCTION<br><span style="color:var(--sazon-gold)">FAMILY HERITAGE HUB</span></div>
            <div style="font-size:0.75rem; letter-spacing:4px; text-align:right; font-weight:600;">JULY 23-24, 2027<br><span style="color:var(--sazon-gold)">MARZON HOTEL, KALIBO</span></div>
        </div>
    </div>

    <div class="ticket-section">
        <div class="ticket-container">
            <h2 style="font-family:'Playfair Display'; font-size:3.5rem; margin:0;">The Golden Ticket</h2>
            <p style="letter-spacing:5px; color:var(--sazon-gold); font-weight:600; margin-top:10px;">OFFICIAL REGISTRATION</p>
            
            <a href="https://tinyurl.com/SazonGrandReunion" target="_blank" class="qr-frame">
                <img src="images/qr-code.png" alt="Sazon QR">
            </a>

            <p style="font-size:1.2rem; font-weight:600; color:var(--sazon-gold); letter-spacing:2px; margin:20px 0;">tinyurl.com/SazonGrandReunion</p>
            
            <a href="https://tinyurl.com/SazonGrandReunion" target="_blank" class="btn-action">
                SECURE YOUR SPOT →
            </a>
        </div>
    </div>

    <audio id="sfx" src="audio/open.mp3"></audio>

    <script>
        function launchHub() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').remove(); }, 1500);
            document.getElementById('bg').classList.add('bg-active');
            document.getElementById('logo-ui').classList.add('active-ui');
            setTimeout(() => { document.getElementById('title-ui').classList.add('active-ui'); }, 600);
            setTimeout(() => { document.getElementById('credits-ui').classList.add('active-ui'); }, 1800);
            document.getElementById('sfx').play().catch(e => {});
        }
    </script>
</body>
</html>
