<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
        .credits, .brand-text { font-family: 'Cinzel', serif !important; letter-spacing: 5px; }

        #intro-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; text-align: center; transition: opacity 1.2s ease-in-out;
        }
        .credits { color: var(--sazon-gold); opacity: 0; transform: translateY(20px); transition: 1.5s ease; margin: 8px 0; }
        .credit-large { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; text-shadow: 0 0 15px rgba(197,160,89,0.3); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }
        
        .tap-btn { 
            margin-top: 50px; padding: 12px 35px; border: 1px solid var(--sazon-gold); color: #fff; 
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 4px; opacity: 0; transition: 1s;
        }

        #hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle, rgba(0,26,77,0.7), #000), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 2s; 
        }

        .brand-text { display: flex; align-items: center; font-size: clamp(3rem, 14vw, 9rem); color: var(--sazon-gold); }
        .az { transition: all 1.2s ease; display: inline-block; }
        .az.hide { opacity: 0; width: 0; transform: scale(0); margin: 0; visibility: hidden; }
        
        .logo-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-45deg); 
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .logo-o.show { 
            width: clamp(3.5rem, 14vw, 9.5rem); height: clamp(3.5rem, 14vw, 9.5rem); 
            opacity: 1; transform: scale(1) rotate(0deg); margin: 0 10px; 
            border: 2px solid var(--sazon-gold); box-shadow: 0 0 40px rgba(197,160,89,0.6); 
        }
        .logo-o img { width: 100%; height: 100%; object-fit: contain; padding: 5px; }

        .countdown { display: flex; gap: 15px; margin-top: 40px; }
        .c-box { background: rgba(0,0,0,0.6); border: 1px solid rgba(197,160,89,0.3); padding: 15px; width: 85px; text-align: center; backdrop-filter: blur(5px); }
        .c-num { font-size: 1.8rem; color: var(--sazon-gold); font-weight: 700; display: block; }
        .c-lab { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
<body>

    <audio id="sfx-shimmer" preload="auto" src="audio/shimmer.mp3"></audio>
    <audio id="sfx-open" preload="auto" src="audio/open.mp3"></audio>
    <audio id="jingle" preload="auto" src="audio/jingle.mp3" loop></audio>

    <div id="intro-overlay" onclick="launch()">
        <div class="credits" id="c1" style="font-size:0.7rem; letter-spacing:10px;">Sazon Family Production</div>
        <div class="credits" id="c2" style="font-size:0.6rem; margin-top:20px; opacity:0.6;">Honoring the Lineage of</div>
        <div class="credits credit-large" id="c3">Tereso & Teofista Sazon</div>
        <div class="credits" id="c4" style="font-size:0.7rem;">July 2027 • Kalibo, Aklan</div>
        <div id="tap" class="tap-btn">Tap to Enter</div>
    </div>

    <main id="hero">
        <div class="brand-text">
            <span>S</span><span class="az" id="la">A</span><span class="az" id="lz">Z</span>
            <div class="logo-o" id="logo-soon"><img src="logo.png"></div>
            <span>O</span><span>N</span>
        </div>
        <div class="countdown">
            <div class="c-box"><span class="c-num" id="d">00</span><span class="c-lab">Days</span></div>
            <div class="c-box"><span class="c-num" id="h">00</span><span class="c-lab">Hrs</span></div>
            <div class="c-box"><span class="c-num" id="m">00</span><span class="c-lab">Min</span></div>
            <div class="c-box"><span class="c-num" id="s">00</span><span class="c-lab">Sec</span></div>
        </div>
    </main>

    <script>
        // High-precision audio triggers
        const shimmer = document.getElementById('sfx-shimmer');
        const openSfx = document.getElementById('sfx-open');
        const jingle = document.getElementById('jingle');

        function start() {
            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 800);
            setTimeout(() => { 
                document.getElementById('c2').classList.add('reveal'); 
                // Play shimmer on the second credit reveal
                shimmer.play().catch(e => console.log("Audio waiting for tap"));
            }, 2200);
            setTimeout(() => document.getElementById('c3').classList.add('reveal'), 3500);
            setTimeout(() => document.getElementById('c4').classList.add('reveal'), 4800);
            setTimeout(() => document.getElementById('tap').style.opacity = '1', 6000);
        }

        function launch() {
            // UNLOCK ALL AUDIO (Essential for Mobile/Chrome)
            openSfx.play(); 
            jingle.play();

            document.getElementById('intro-overlay').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('hero').style.opacity = '1';
                
                // Trigger the branding transformation
                setTimeout(() => {
                    document.getElementById('la').classList.add('hide');
                    document.getElementById('lz').classList.add('hide');
                    document.getElementById('logo-soon').classList.add('show');
                }, 1000);
            }, 1200);
        }

        function clock() {
            const diff = new Date("July 23, 2027 00:00:00") - new Date();
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2,'0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }

        setInterval(clock, 1000);
        window.onload = start;
    </script>
</body>
</html>
