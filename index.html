<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON 2027 | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sazon-navy: #001a4d; --sazon-gold: #c5a059; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
        .credits, .brand-text { font-family: 'Cinzel', serif !important; letter-spacing: 5px; }

        /* THE GATEKEEPER */
        #unlock-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .tap-btn { 
            padding: 15px 45px; border: 1px solid var(--sazon-gold); color: var(--sazon-gold); 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 6px; 
            transition: 0.5s; animation: breathe 3s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* CINEMATIC INTRO */
        #intro-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .credits { color: var(--sazon-gold); opacity: 0; transform: translateY(15px); transition: 1.2s ease; margin: 10px 0; }
        .credit-large { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; text-shadow: 0 0 20px rgba(197,160,89,0.5); }
        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        /* MAIN HERO (Using banner.jpg) */
        #hero { 
            height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('banner.jpg') center/cover no-repeat; 
            opacity: 0; transition: 3s ease-in-out; 
        }

        /* THE SAZON TO SOON ENGINE */
        .brand-text { display: flex; align-items: center; font-size: clamp(3rem, 15vw, 10rem); color: var(--sazon-gold); }
        .az { transition: all 1.2s cubic-bezier(0.645, 0.045, 0.355, 1); display: inline-block; }
        .az.hide { opacity: 0; width: 0; transform: scale(0) rotateX(90deg); margin: 0; visibility: hidden; }
        
        /* CELESTIAL LOGO O */
        .logo-o { 
            width: 0; height: 0; opacity: 0; transform: scale(0) rotate(-180deg); 
            transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 2px solid var(--sazon-gold);
        }
        .logo-o.show { 
            width: clamp(3rem, 13vw, 9rem); height: clamp(3rem, 13vw, 9rem); 
            opacity: 1; transform: scale(1) rotate(0deg); margin: 0 15px; 
            box-shadow: 0 0 60px var(--sazon-gold); 
        }
        .logo-o img { width: 90%; height: auto; }

        /* TIMER BOXES */
        .countdown { display: flex; gap: 20px; margin-top: 50px; opacity: 0; transition: 2s; }
        .countdown.show { opacity: 1; }
        .c-box { background: rgba(0,0,0,0.85); border: 1px solid rgba(197,160,89,0.3); padding: 20px; width: 95px; text-align: center; backdrop-filter: blur(10px); }
        .c-num { font-size: 2rem; color: var(--sazon-gold); font-weight: 700; display: block; }
        .c-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
<body>

    <audio id="sfx-shimmer" src="audio/shimmer.mp3" preload="auto"></audio>
    <audio id="sfx-open" src="audio/open.mp3" preload="auto"></audio>
    <audio id="jingle" src="audio/jingle.mp3" loop preload="auto"></audio>

    <div id="unlock-screen" onclick="startSequence()">
        <div class="tap-btn">Enter Sazon Legacy</div>
    </div>

    <div id="intro-overlay">
        <div class="credits" id="c1" style="font-size:0.75rem; letter-spacing:10px;">Sazon Family Production</div>
        <div class="credits" id="c2" style="font-size:0.65rem; margin-top:20px; opacity:0.7;">Honoring the Lineage of</div>
        <div class="credits credit-large" id="c3">Tereso & Teofista Sazon</div>
        <div class="credits" id="c4" style="font-size:0.75rem;">July 2027 • Kalibo, Aklan</div>
    </div>

    <main id="hero">
        <div class="brand-text">
            <span>S</span>
            <span class="az" id="la">A</span>
            <span class="az" id="lz">Z</span>
            <div class="logo-o" id="logo-soon"><img src="logo.png"></div>
            <span>O</span>
            <span>N</span>
        </div>
        <div class="countdown" id="timer-reveal">
            <div class="c-box"><span class="c-num" id="d">00</span><span class="c-lab">Days</span></div>
            <div class="c-box"><span class="c-num" id="h">00</span><span class="c-lab">Hrs</span></div>
            <div class="c-box"><span class="c-num" id="m">00</span><span class="c-lab">Min</span></div>
            <div class="c-box"><span class="c-num" id="s">00</span><span class="c-lab">Sec</span></div>
        </div>
    </main>

    <script>
        const openSfx = document.getElementById('sfx-open');
        const shimmerSfx = document.getElementById('sfx-shimmer');
        const jingleSfx = document.getElementById('jingle');

        function startSequence() {
            openSfx.play();
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('intro-overlay').style.display = 'flex';

            setTimeout(() => document.getElementById('c1').classList.add('reveal'), 200);
            setTimeout(() => document.getElementById('c2').classList.add('reveal'), 1400);
            setTimeout(() => {
                shimmerSfx.play();
                document.getElementById('c3').classList.add('reveal');
            }, 2600);
            setTimeout(() => document.getElementById('c4').classList.add('reveal'), 4000);

            // TRANSITION TO BANNER HERO
            setTimeout(() => {
                jingleSfx.play();
                document.getElementById('intro-overlay').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    const hero = document.getElementById('hero');
                    hero.style.display = 'flex';
                    setTimeout(() => {
                        hero.style.opacity = '1';
                        performCelestialPivot();
                    }, 100);
                }, 1000);
            }, 7000);
        }

        function performCelestialPivot() {
            // Wait 2 seconds for the banner to be admired
            setTimeout(() => {
                // A and Z dissolve
                document.getElementById('la').classList.add('hide');
                document.getElementById('lz').classList.add('hide');
                
                // Moon/Logo rises to form SOON
                setTimeout(() => {
                    document.getElementById('logo-soon').classList.add('show');
                    // Reveal the countdown after the moon locks in
                    setTimeout(() => {
                        document.getElementById('timer-reveal').classList.add('show');
                    }, 1000);
                }, 400);
            }, 2000);
        }

        function clock() {
            const diff = new Date("July 23, 2027 00:00:00") - new Date();
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2,'0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }
        setInterval(clock, 1000);
    </script>
</body>
</html>
