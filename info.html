<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazon 2027 | The Legacy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --white: #ffffff;
            --dark-grey: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        h1, h2, .cinzel { font-family: 'Cinzel', serif; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo { font-size: 1.5rem; color: var(--gold); text-decoration: none; font-weight: bold; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1519222970733-f546218fa6d7?auto=format&fit=crop&q=80') center/cover;
        }

        .hero h1 { font-size: 4rem; color: var(--gold); margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; }

        /* Legacy Gear Section */
        .section-padding { padding: 80px 20px; text-align: center; }

        .design-split {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .apparel-card {
            background: var(--dark-grey);
            border: 1px solid rgba(212,175,55,0.2);
            padding: 20px;
            max-width: 400px;
            transition: 0.3s;
        }

        .apparel-card:hover { border-color: var(--gold); }

        .design-view { text-align: center; }
        .design-view img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); }
        .label {
            margin-top: 15px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(212,175,55,0.3);
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo cinzel">SAZON 2027</a>
        </div>
    </nav>

    <header class="hero">
        <h1 class="cinzel">The Grand Reunion</h1>
        <p>July 23-24, 2027 | Kalibo, Aklan</p>
    </header>

    <section id="gear" class="section-padding">
        <h2 class="cinzel" style="font-size: 2.5rem; color: var(--gold);">First Edition Legacy Gear</h2>
        <p style="max-width: 700px; margin: 20px auto; opacity: 0.8;">A sophisticated blend of family history and modern style. Reserved for the Sazon Clan.</p>
        
        <div class="design-split">
            <!-- Left Side: Front Design -->
            <div class="apparel-card">
                <div class="design-view">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80" alt="Front Design">
                    <div class="label">Front: Family Tree Logo</div>
                </div>
            </div>

            <!-- Right Side: Back Design -->
            <div class="apparel-card">
                <div class="design-view">
                    <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80" alt="Back Design">
                    <div class="label">Back: Nutrition Facts</div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p class="cinzel">Sazon Family Grand Reunion &copy; 2027</p>
        <p>Marzon Hotel, Kalibo, Aklan</p>
    </footer>

</body>
</html>
